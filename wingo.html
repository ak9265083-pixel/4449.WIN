<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN</title>

<style>

body{
margin:0;
font-family:Arial;
background:#9fa3ad;
display:flex;
justify-content:center;
}

.app{
width:420px;
background:white;
min-height:100vh;
text-align:center;
padding-bottom:90px;
}

.header{
background:#ff6b6b;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.wallet{
background:#f2f2f2;
margin:15px;
padding:15px;
border-radius:12px;
font-size:18px;
}

.timer{
background:#ff6b6b;
color:white;
margin:10px;
padding:10px;
border-radius:10px;
font-size:18px;
}

.centerGame{
margin:20px auto;
width:120px;
height:120px;
border-radius:50%;
background:#eee;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
font-weight:bold;
transition:transform .6s;
}

.colors{
display:flex;
gap:10px;
padding:10px;
}

.colors button{
flex:1;
padding:12px;
border:none;
color:white;
border-radius:8px;
font-size:16px;
}

.green{background:#2ecc71;}
.red{background:#e74c3c;}
.violet{background:#9b59b6;}

.numbers{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
padding:10px;
}

.numbers button{
padding:15px;
border-radius:50%;
border:none;
font-size:18px;
background:#eee;
cursor:pointer;
}

.history{
margin:15px;
text-align:left;
}

.historyItem{
background:#eee;
margin-bottom:6px;
padding:8px;
border-radius:6px;
}

.bottomWallet{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:360px;
background:white;
border-radius:25px;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.25);
}

.navBtn{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
}

.icon{
width:48px;
height:48px;
border-radius:50%;
background:#ff6b6b;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:white;
}

.label{
font-size:13px;
margin-top:4px;
font-weight:bold;
}

/* popup */

.betPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.betBox{
position:relative;
background:white;
padding:25px;
border-radius:18px;
width:260px;
text-align:center;
animation:zoomPop .35s ease;
}

@keyframes zoomPop{
0%{transform:scale(.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

.betBox input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
text-align:center;
margin-top:10px;
}

.betBtn{
margin-top:15px;
padding:12px;
background:#ff6b6b;
color:white;
border:none;
width:100%;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.closeBtn{
position:absolute;
top:10px;
right:10px;
background:#ff6b6b;
color:white;
border:none;
border-radius:50%;
width:28px;
height:28px;
font-size:16px;
cursor:pointer;
}

/* RESULT POPUP */

.resultPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.5);
border-radius:20px;
padding:25px 35px;
text-align:center;
font-size:18px;
font-weight:bold;
color:white;
animation:popupBounce .5s forwards;
z-index:9999;
}

.resultPopup.win{
background:linear-gradient(135deg,#2ecc71,#27ae60);
}

.resultPopup.lose{
background:linear-gradient(135deg,#e74c3c,#c0392b);
}

@keyframes popupBounce{
0%{transform:translate(-50%,-50%) scale(.3);opacity:0;}
60%{transform:translate(-50%,-50%) scale(1.1);opacity:1;}
80%{transform:translate(-50%,-50%) scale(.95);}
100%{transform:translate(-50%,-50%) scale(1);}
}

</style>
</head>

<body>

<div class="app">

<div class="header">4449 WIN</div>

<div class="wallet">
Balance ₹ <span id="balance">0</span>
</div>

<div class="timer">
Next Result In <span id="time">30</span>s
</div>

<div class="centerGame" id="ball">?</div>

<div class="colors">
<button class="green" onclick="selectBet('green')">Green</button>
<button class="violet" onclick="selectBet('violet')">Violet</button>
<button class="red" onclick="selectBet('red')">Red</button>
</div>

<div class="numbers">
<button onclick="selectBet(0)">0</button>
<button onclick="selectBet(1)">1</button>
<button onclick="selectBet(2)">2</button>
<button onclick="selectBet(3)">3</button>
<button onclick="selectBet(4)">4</button>
<button onclick="selectBet(5)">5</button>
<button onclick="selectBet(6)">6</button>
<button onclick="selectBet(7)">7</button>
<button onclick="selectBet(8)">8</button>
<button onclick="selectBet(9)">9</button>
</div>

<div class="history">
<h3>Last Results</h3>
<div id="historyList"></div>
</div>

</div>

<!-- bottom buttons -->

<div class="bottomWallet">

<div class="navBtn" onclick="openWallet()">
<div class="icon">💳</div>
<div class="label">Wallet</div>
</div>

<div class="navBtn" onclick="openHelp()">
<div class="icon">🎧</div>
<div class="label">Help</div>
</div>

<div class="navBtn" onclick="logout()">
<div class="icon">🚪</div>
<div class="label">Logout</div>
</div>

</div>

<div class="betPopup" id="betPopup">
<div class="betBox">

<button class="closeBtn" onclick="closeBetPopup()">✖</button>

<h3>Enter Bet Amount</h3>

<input type="number" id="betInput" placeholder="Amount">

<button class="betBtn" onclick="placeBet()">Place Bet</button>

</div>
</div>

<script>

let balance=1000
let currentBet=null
let betAmount=0
let selectedValue=null

function getColor(n){

if(n==0||n==5) return "violet"
if(n==1||n==3||n==7||n==9) return "green"
return "red"

}

function selectBet(v){

selectedValue=v
document.getElementById("betPopup").style.display="flex"

}

function closeBetPopup(){

document.getElementById("betPopup").style.display="none"

}

function placeBet(){

let amt=parseInt(document.getElementById("betInput").value)

if(balance<amt){

alert("Low Balance")
return

}

balance-=amt
document.getElementById("balance").innerText=balance

currentBet=selectedValue
betAmount=amt

closeBetPopup()

}

function showResultPopup(msg,win){

let popup=document.createElement("div")

popup.className="resultPopup "+(win?"win":"lose")

popup.innerText=msg

document.body.appendChild(popup)

setTimeout(()=>{

popup.remove()

},2000)

}

function animateBall(num){

let ball=document.getElementById("ball")

ball.style.transform="rotate(360deg) scale(1.2)"

setTimeout(()=>{

ball.innerText=num
ball.style.transform="rotate(0deg) scale(1)"

},300)

}

function addHistory(num,color){

let div=document.createElement("div")

div.className="historyItem"

div.innerHTML="Result: "+num+" ("+color+")"

let box=document.getElementById("historyList")

box.prepend(div)

if(box.children.length>10){

box.removeChild(box.lastChild)

}

}

function generateResult(){

return Math.floor(Math.random()*10)

}

let roundTime=30

function getRemainingTime(){

let now=Math.floor(Date.now()/1000)

return roundTime-(now%roundTime)

}

setInterval(()=>{

let time=getRemainingTime()

document.getElementById("time").innerText=time

if(time==1){

let result=generateResult()

let color=getColor(result)

animateBall(result)

addHistory(result,color)

if(currentBet!=null){

if(currentBet===result){

let winAmount=betAmount*(result==0?2:result)

balance+=winAmount

showResultPopup("You Win ₹"+winAmount,true)

}

else if(currentBet===color){

balance+=betAmount*2

showResultPopup("Color Win ₹"+betAmount*2,true)

}

else{

showResultPopup("You Lose",false)

}

document.getElementById("balance").innerText=balance

currentBet=null
betAmount=0

}

}

},1000)

function openWallet(){

window.location.href="wallet.html"

}

function openHelp(){

window.location.href="help.html"

}

function logout(){

window.location.href="login.html"

}

</script>

</body>
</html>
