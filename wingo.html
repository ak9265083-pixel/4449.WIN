```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wingo Game</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

#resultBox{
font-size:40px;
margin-top:20px;
}

/* popup */

.bet-popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1e293b;
padding:20px;
border-radius:12px;
width:260px;
display:none;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.coin-box{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
margin-top:15px;
}

.coin-btn{
padding:8px 14px;
font-size:20px;
border:none;
border-radius:6px;
cursor:pointer;
background:#334155;
color:white;
}

.bet-btn{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

.close-btn{
background:#ef4444;
margin-left:10px;
}

</style>
</head>

<body>

<h2>Wingo Game</h2>

<br>

<div id="resultBox">Result: -</div>

<br><br>

<button onclick="openPopup()">Place Bet</button>

<!-- popup -->

<div class="bet-popup" id="betPopup">

<h3>Place Bet</h3>

<div class="coin-box">

<button class="coin-btn" onclick="changeCoin(-1)">-</button>

<div id="coinValue">1</div>

<button class="coin-btn" onclick="changeCoin(1)">+</button>

</div>

<button class="bet-btn" onclick="confirmBet()">Confirm</button>

<button class="bet-btn close-btn" onclick="closePopup()">Close</button>

</div>


<script>

let coin = 1

function openPopup(){
document.getElementById("betPopup").style.display="block"
}

function closePopup(){
document.getElementById("betPopup").style.display="none"
}

function changeCoin(value){

coin += value

if(coin < 1){
coin = 1
}

document.getElementById("coinValue").innerText = coin

}

function confirmBet(){

closePopup()

// random result
let num = Math.floor(Math.random()*10)

document.getElementById("resultBox").innerText="Result: "+num

}

</script>

</body>
</html>
