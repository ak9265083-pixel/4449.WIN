<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN</title>
<style>
body{margin:0;font-family:Arial;background:#9fa3ad;display:flex;justify-content:center;}
.app{width:420px;background:white;min-height:100vh;text-align:center;padding-bottom:90px;}
.header{background:#ff6b6b;color:white;padding:15px;font-size:22px;font-weight:bold;display:flex;align-items:center;gap:10px;}
.header img{width:32px;height:32px;border-radius:50%;}
.wallet{background:#f2f2f2;margin:15px;padding:15px;border-radius:12px;font-size:18px;}
.timer{background:#ff6b6b;color:white;margin:10px 15px;padding:10px;border-radius:10px;font-size:18px;font-weight:bold;animation: pulse 1.5s infinite alternate;}
@keyframes pulse{0%{background-color:#ff6b6b;}100%{background-color:#ff3b3b;}}

.centerGame{margin:20px auto;width:120px;height:120px;border-radius:50%;background: radial-gradient(circle at 30% 30%, #ffffff, #e0e0e0);display:flex;align-items:center;justify-content:center;font-size:60px;font-weight:bold;box-shadow: inset -5px -5px 15px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.2);transition: all 0.6s ease;}
.centerGame.animate{transform: rotateY(720deg) scale(1.1); filter: brightness(1.2);}

.colors{display:flex;gap:10px;padding:10px 15px;}
.colors button{flex:1;padding:12px;border:none;color:white;border-radius:8px;font-size:16px;cursor:pointer;font-weight: bold;}
.green{background: linear-gradient(180deg, #2ecc71, #27ae60);}
.red{background: linear-gradient(180deg, #e74c3c, #c0392b);}
.violet{background: linear-gradient(180deg, #9b59b6, #8e44ad);}

.numbers{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:10px 15px;}
.numbers button{width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; color: white; cursor: pointer;}
.ball-0 { background: linear-gradient(135deg, #e74c3c 50%, #9b59b6 50%); } 
.ball-1, .ball-3, .ball-7, .ball-9 { background: radial-gradient(circle at 30% 30%, #58d68d, #27ae60); } 
.ball-2, .ball-4, .ball-6, .ball-8 { background: radial-gradient(circle at 30% 30%, #ec7063, #c0392b); } 
.ball-5 { background: linear-gradient(135deg, #2ecc71 50%, #9b59b6 50%); } 

.bigsmall{display:flex;gap:15px;padding:10px 15px;}
.bigsmall button{flex:1;padding:15px;font-weight:bold;border:none;border-radius:10px;color:white;font-size:18px;}
.big{background: #f39c12;}
.small{background: #3498db;}

.history-tabs{display:flex; margin:15px; border-bottom: 2px solid #eee;}
.tab-btn{flex:1; padding: 10px; cursor:pointer; font-weight: bold; color: #777; border:none; background:none;}
.tab-btn.active{color: #ff6b6b; border-bottom: 2px solid #ff6b6b;}

.history{margin:15px;text-align:left;max-height:300px;overflow-y:auto;}
.historyItem{background:#eee;margin-bottom:6px;padding:10px 15px;border-radius:6px;display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px;}
.colorGreen{background:#2ecc71; color:white; padding: 2px 8px; border-radius: 4px;}
.colorRed{background:#e74c3c; color:white; padding: 2px 8px; border-radius: 4px;}
.colorViolet{background:#9b59b6; color:white; padding: 2px 8px; border-radius: 4px;}

.bottomWallet{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:360px;background:white;border-radius:25px;display:flex;justify-content:space-around;padding:10px;box-shadow:0 5px 20px rgba(0,0,0,0.25);z-index:1000;}
.navBtn{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.icon{width:48px;height:48px;border-radius:50%;background:#ff6b6b;display:flex;align-items:center;justify-content:center;font-size:22px;color:white;}
.label{font-size:13px;margin-top:4px;font-weight:bold;}

.betPopup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:2000;}
.betBox{position:relative;background:white;padding:25px;border-radius:18px;width:260px;text-align:center;}
.betBox input{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;margin-top:10px;}
.betBtn{margin-top:15px;padding:12px;background:#ff6b6b;color:white;border:none;width:100%;border-radius:10px;cursor:pointer;}
.closeBtn{position:absolute;top:10px;right:10px;background:#ff6b6b;color:white;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;}

.resultPopup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);border-radius:20px;padding:25px;text-align:center;font-size:20px;font-weight:bold;color:white;display:none;z-index:9999;animation:popupBounce 0.6s forwards;}
.resultPopup.win{background:linear-gradient(45deg,#2ecc71,#27ae60);}
.resultPopup.lose{background:linear-gradient(45deg,#e74c3c,#c0392b);}
@keyframes popupBounce{0%{transform:translate(-50%,-50%) scale(0);}100%{transform:translate(-50%,-50%) scale(1);}}
</style>
</head>
<body>
<div class="app">
  <div class="header"><img src="logo.png"> 4449 WIN</div>
  <div class="wallet">Balance ₹ <span id="balance">0</span></div>
  <div class="timer">Next Result In <span id="time">30</span>s</div>
  <div class="centerGame" id="ball">?</div>
  
  <div class="colors">
    <button class="green" onclick="selectBet('green')">Green</button>
    <button class="violet" onclick="selectBet('violet')">Violet</button>
    <button class="red" onclick="selectBet('red')">Red</button>
  </div>
  <div class="bigsmall">
    <button class="big" onclick="selectBet('big')">BIG</button>
    <button class="small" onclick="selectBet('small')">SMALL</button>
  </div>
  <div class="numbers">
    <button class="ball-0" onclick="selectBet(0)">0</button>
    <button class="ball-1" onclick="selectBet(1)">1</button>
    <button class="ball-2" onclick="selectBet(2)">2</button>
    <button class="ball-3" onclick="selectBet(3)">3</button>
    <button class="ball-4" onclick="selectBet(4)">4</button>
    <button class="ball-5" onclick="selectBet(5)">5</button>
    <button class="ball-6" onclick="selectBet(6)">6</button>
    <button class="ball-7" onclick="selectBet(7)">7</button>
    <button class="ball-8" onclick="selectBet(8)">8</button>
    <button class="ball-9" onclick="selectBet(9)">9</button>
  </div>
  
  <div class="history-tabs">
    <button class="tab-btn active" id="gameTab" onclick="switchTab('game')">Game History</button>
    <button class="tab-btn" id="betTab" onclick="switchTab('bet')">My Bets</button>
  </div>
  <div class="history" id="gameHistoryBox"><div id="historyList"></div></div>
  <div class="history" id="myBetBox" style="display:none;"><div id="myBetList"></div></div>
</div>

<div class="bottomWallet">
  <div class="navBtn" onclick="openWallet()"><div class="icon">💳</div><div class="label">Wallet</div></div>
  <div class="navBtn" onclick="openHelp()"><div class="icon">🎧</div><div class="label">Help</div></div>
  <div class="navBtn" onclick="logout()"><div class="icon">🚪</div><div class="label">Logout</div></div>
</div>

<div class="betPopup" id="betPopup">
  <div class="betBox">
    <button class="closeBtn" onclick="closeBetPopup()">✖</button>
    <h3>Enter Amount</h3>
    <input type="number" id="betInput" placeholder="Amount">
    <button class="betBtn" onclick="placeBet()">Place Bet</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,doc,getDoc,updateDoc,collection,addDoc,query,where,orderBy,limit,onSnapshot,serverTimestamp,deleteDoc,setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain:"win2-512e1.firebaseapp.com", projectId:"win2-512e1" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let balance=0, userId="", currentBet=null, betAmount=0, selectedValue=null, currentBetId=null;
let timerTime = 30;

// Online Status Update
async function updateOnlineStatus() {
  if (userId) {
    await updateDoc(doc(db, "users", userId), { lastActive: Date.now() });
  }
}

// Tab Switcher
window.switchTab = (type) => {
  document.getElementById('gameHistoryBox').style.display = (type==='game')?'block':'none';
  document.getElementById('myBetBox').style.display = (type==='bet')?'block':'none';
  document.getElementById('gameTab').classList.toggle('active', type==='game');
  document.getElementById('betTab').classList.toggle('active', type==='bet');
}

// Listeners
onAuthStateChanged(auth, user => {
  if(user){
    userId=user.uid;
    updateOnlineStatus();
    listenToMyBets(userId);
    getDoc(doc(db,"users",userId)).then(snap => {
      if(snap.exists()){ balance=snap.data().balance||0; document.getElementById("balance").innerText=balance; }
    });
  }
});

onSnapshot(query(collection(db, "history"), orderBy("createdAt", "desc"), limit(10)), (snap) => {
  let list = document.getElementById("historyList"); list.innerHTML = "";
  snap.forEach(d => {
    let item = d.data();
    let colorClass = item.color === "green" ? "colorGreen" : item.color === "red" ? "colorRed" : "colorViolet";
    list.innerHTML += `<div class="historyItem">Res ${item.num} (<span class="${colorClass}">${item.color}</span>) <span>${item.bigsmall}</span></div>`;
  });
});

function listenToMyBets(uid) {
  onSnapshot(query(collection(db, "userBets"), where("uid", "==", uid), orderBy("createdAt", "desc"), limit(10)), (snap) => {
    let list = document.getElementById("myBetList"); list.innerHTML = "";
    snap.forEach(d => {
      let b = d.data();
      list.innerHTML += `<div class="historyItem">Bet: ${b.selection} | ₹${b.amount} | ${b.status}</div>`;
    });
  });
}

// Game Logic
window.selectBet=v=>{ selectedValue=v; document.getElementById("betPopup").style.display="flex"; }
window.closeBetPopup=()=>{ document.getElementById("betPopup").style.display="none"; }
window.placeBet=async()=>{
  let amt=parseInt(document.getElementById("betInput").value);
  if(balance<amt || amt<=0){ alert("Invalid Balance"); return; }
  balance-=amt; document.getElementById("balance").innerText=balance;
  document.getElementById("betPopup").style.display="none";
  let docRef = await addDoc(collection(db, "userBets"), { uid:userId, selection:selectedValue, amount:amt, status:"Pending", createdAt:serverTimestamp() });
  currentBetId = docRef.id; currentBet=selectedValue; betAmount=amt;
  await updateDoc(doc(db,"users",userId), {balance:balance});
  updateOnlineStatus();
}

async function timerTick(){
  document.getElementById("time").innerText=timerTime;
  timerTime--;
  if(timerTime<0){
    timerTime=30;
    updateOnlineStatus();
    let ball=document.getElementById("ball"); ball.classList.add("animate");
    
    // --- SMART RESULT LOGIC ---
    let result;
    try {
      const adminDoc = await getDoc(doc(db, "wingo", "result"));
      if (adminDoc.exists() && adminDoc.data().number !== null && adminDoc.data().number !== undefined) {
          result = adminDoc.data().number;
          // Admin result use hone ke baad use null kar do taaki agli baar random aaye
          await setDoc(doc(db, "wingo", "result"), { number: null, time: Date.now() });
      } else {
          result = Math.floor(Math.random() * 10);
      }
    } catch(e) { 
      result = Math.floor(Math.random() * 10); 
    }

    let color = (result===0||result===5)?"violet":([1,3,7,9].includes(result)?"green":"red");
    let bs = result>=5?"BIG":"SMALL";
    
    await addDoc(collection(db, "history"), { num:result, color:color, bigsmall:bs, createdAt:serverTimestamp() });

    setTimeout(async ()=>{
      ball.innerText=result; ball.classList.remove("animate");
      
      // Ball colors update
      if(result===0) ball.style.background = "linear-gradient(135deg, #e74c3c 50%, #9b59b6 50%)";
      else if(result===5) ball.style.background = "linear-gradient(135deg, #2ecc71 50%, #9b59b6 50%)";
      else if(color==="green") ball.style.background = "radial-gradient(circle at 30% 30%, #58d68d, #27ae60)";
      else ball.style.background = "radial-gradient(circle at 30% 30%, #ec7063, #c0392b)";
      ball.style.color="white";

      if(currentBetId){
        let win = (currentBet===result || currentBet===color || currentBet===bs.toLowerCase());
        let winAmt = (currentBet===result)?betAmount*9:betAmount*2;
        if(win) {
          balance += winAmt; 
          document.getElementById("balance").innerText=balance;
          await updateDoc(doc(db,"users",userId), {balance:balance});
          await updateDoc(doc(db,"userBets",currentBetId), {status:"Win ₹"+winAmt});
          let p=document.createElement("div"); p.className="resultPopup win"; p.innerText="Win ₹"+winAmt;
          document.body.appendChild(p); p.style.display="block"; setTimeout(()=>p.remove(),2500);
        } else {
          await updateDoc(doc(db,"userBets",currentBetId), {status:"Lose"});
          let p=document.createElement("div"); p.className="resultPopup lose"; p.innerText="Lose";
          document.body.appendChild(p); p.style.display="block"; setTimeout(()=>p.remove(),2500);
        }
        currentBetId=null;
      }
    },500);
  }
}

setInterval(timerTick,1000);
window.openWallet=()=>{ window.location.href="wallet.html"; }
window.openHelp=()=>{ window.location.href="help.html"; }
window.logout=()=>{ signOut(auth); window.location.href="login.html"; }
</script>
</body>
</html>
