<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN - PREMIUM</title>
<style>
:root { 
    --primary: #ff6b6b; 
    --big-color: #f39c12; 
    --small-color: #3498db; 
    --bg: #ffffff; /* White background for clean look */
    --app-bg: #f8f9fa; 
}
body{margin:0;font-family:'Segoe UI',Roboto,Arial;background:#9fa3ad;display:flex;justify-content:center;}
.app{width:420px;background:var(--app-bg);min-height:100vh;text-align:center;padding-bottom:90px;overflow-x:hidden;}

/* Updated Header with Logo */
.header-container {
    background: white;
    padding: 20px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    border-bottom: 2px solid #eee;
}
.logo-round {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--primary);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.header-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: 1px;
    text-transform: uppercase;
}

/* Balance Card */
.profile-card{background: linear-gradient(135deg, #2c3e50, #000000); margin: 15px; padding: 25px; border-radius: 20px; color: white; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.25); position: relative;}
.profile-card h2 { margin: 10px 0; font-size: 32px; letter-spacing: 1px; }
.profile-card p { margin: 0; opacity: 0.8; font-size: 14px; }
.uid-box { background: rgba(255,255,255,0.15); padding: 6px 15px; border-radius: 20px; display: inline-flex; align-items: center; gap: 8px; margin-top: 5px; cursor: pointer; font-size: 12px; border: 1px solid rgba(255,255,255,0.2);}

/* Timer Section */
.timer-container{background:white; margin:0 15px; padding:18px; border-radius:18px; display:flex; justify-content:space-between; align-items:center; box-shadow: 0 5px 15px rgba(0,0,0,0.06);}
.timer-label { font-weight: bold; color: #666; font-size: 15px; }
#time { font-size: 26px; color: var(--primary); font-weight: 800; font-family: 'Courier New', monospace; }

/* Result Display & Animations */
.result-area{position:relative; margin:30px auto; width:170px; height:170px; display:flex; align-items:center; justify-content:center;}
.centerGame{width:120px;height:120px;border-radius:50%;background: white;display:flex;align-items:center;justify-content:center;font-size:60px;font-weight:bold;box-shadow: 0 12px 30px rgba(0,0,0,0.12);z-index:2; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); border: 6px solid #f0f0f0;}

@keyframes spinResult {
    0% { transform: rotateY(0deg) scale(1); }
    50% { transform: rotateY(360deg) scale(1.2); }
    100% { transform: rotateY(720deg) scale(1); }
}
.centerGame.animate{animation: spinResult 0.8s ease-in-out;}

.bs-badge{position:absolute; top:-10px; right:-10px; padding:12px 22px; border-radius:15px; color:white; font-weight:900; font-size:24px; transform: scale(0); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index:5; box-shadow: 0 8px 20px rgba(0,0,0,0.2);}
.bs-badge.show{transform: scale(1) rotate(-8deg);}
.bg-big{background: var(--big-color);}
.bg-small{background: var(--small-color);}

/* Betting Buttons */
.colors, .bigsmall{display:flex;gap:12px;padding:12px 15px;}
.colors button, .bigsmall button{flex:1;padding:16px;border:none;color:white;border-radius:15px;font-size:17px;cursor:pointer;font-weight: 800; transition: 0.3s; box-shadow: 0 4px 0 rgba(0,0,0,0.1);}
.colors button:active, .bigsmall button:active { transform: translateY(3px); box-shadow: none; }
.green{background: #2ecc71;} .red{background: #e74c3c;} .violet{background: #9b59b6;}
.big{background: var(--big-color);} .small{background: var(--small-color);}

.numbers{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:12px 15px;}
.numbers button{height: 58px; border-radius: 15px; border: none; font-size: 20px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; box-shadow: 0 3px 6px rgba(0,0,0,0.1);}
.numbers button:hover { transform: scale(1.05); }
.ball-0 { background: linear-gradient(135deg, #e74c3c 50%, #9b59b6 50%); } 
.ball-5 { background: linear-gradient(135deg, #2ecc71 50%, #9b59b6 50%); } 
.ball-odd { background: #2ecc71; } .ball-even { background: #e74c3c; }

/* History */
.history{margin:20px 15px; padding:20px; background:white; border-radius:20px; text-align:left; box-shadow: 0 5px 20px rgba(0,0,0,0.05);}
.historyItem{border-bottom:1px solid #f1f1f1; padding:15px 0; display:flex; justify-content:space-between; font-weight:600; font-size:15px;}
.res-num { width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; margin-right: 12px; font-size: 14px;}
.tag-bs { padding: 4px 12px; border-radius: 8px; color: white; font-size: 12px; }

/* Bottom Nav */
.bottomWallet{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);width:90%; max-width: 380px;background:white;border-radius:35px;display:flex;justify-content:space-around;padding:12px;box-shadow:0 15px 40px rgba(0,0,0,0.15);z-index:1000; border: 1px solid #eee;}
.navBtn{display:flex;flex-direction:column;align-items:center;cursor:pointer; color: #95a5a6; transition: 0.3s;}
.navBtn:hover { color: var(--primary); }
.icon{font-size:24px;}
.label{font-size:12px;margin-top:5px;font-weight:700;}

/* Popup Animation */
.resultPopup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);border-radius:25px;padding:40px;text-align:center;font-size:26px;font-weight:bold;color:white;display:none;z-index:9999; animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;}
@keyframes bounceIn {
    0% { transform: translate(-50%,-50%) scale(0); }
    100% { transform: translate(-50%,-50%) scale(1); }
}
.resultPopup.win{background:linear-gradient(135deg,#00b894,#55efc4); box-shadow: 0 15px 40px rgba(0, 184, 148, 0.4);}
.resultPopup.lose{background:linear-gradient(135deg,#d63031,#ff7675); box-shadow: 0 15px 40px rgba(214, 48, 49, 0.4);}
</style>
</head>
<body>
<div class="app">
  <div class="header-container">
    <img src="logo.png" alt="Logo" class="logo-round">
    <div class="header-title">4449 WIN</div>
  </div>
  
  <div class="profile-card">
    <p>Available Balance</p>
    <h2>₹ <span id="balance">0.00</span></h2>
    <div class="uid-box" onclick="copyUID()">
      <span>ID: <span id="displayUid">Loading...</span></span>
      <span style="font-size: 14px;">📋</span>
    </div>
  </div>

  <div class="timer-container">
    <div class="timer-label">⏱ Wingo 30s</div>
    <div id="time">00:30</div>
  </div>
  
  <div class="result-area">
    <div id="bsBadge" class="bs-badge">BIG</div>
    <div class="centerGame" id="ball">?</div>
  </div>
  
  <div class="colors">
    <button class="green" onclick="selectBet('green')">Green</button>
    <button class="violet" onclick="selectBet('violet')">Violet</button>
    <button class="red" onclick="selectBet('red')">Red</button>
  </div>
  <div class="bigsmall">
    <button class="big" onclick="selectBet('big')">BIG</button>
    <button class="small" onclick="selectBet('small')">SMALL</button>
  </div>
  <div class="numbers">
    <button class="ball-0" onclick="selectBet(0)">0</button>
    <button class="ball-odd" onclick="selectBet(1)">1</button>
    <button class="ball-even" onclick="selectBet(2)">2</button>
    <button class="ball-odd" onclick="selectBet(3)">3</button>
    <button class="ball-even" onclick="selectBet(4)">4</button>
    <button class="ball-5" onclick="selectBet(5)">5</button>
    <button class="ball-even" onclick="selectBet(6)">6</button>
    <button class="ball-odd" onclick="selectBet(7)">7</button>
    <button class="ball-even" onclick="selectBet(8)">8</button>
    <button class="ball-odd" onclick="selectBet(9)">9</button>
  </div>
  
  <div class="history">
    <h4 style="margin:0 0 15px 0; color:#444; font-size: 18px; border-left: 4px solid var(--primary); padding-left: 10px;">Recent History</h4>
    <div id="historyList"></div>
  </div>
</div>

<div class="bottomWallet">
  <div class="navBtn" onclick="location.reload()"><div class="icon">🏠</div><div class="label">Home</div></div>
  <div class="navBtn" onclick="location.href='wallet.html'"><div class="icon">💳</div><div class="label">Wallet</div></div>
  <div class="navBtn" onclick="location.href='help.html'"><div class="icon">🎧</div><div class="label">Help</div></div>
  <div class="navBtn" onclick="logout()"><div class="icon">🚪</div><div class="label">Logout</div></div>
</div>

<div class="betPopup" id="betPopup">
  <div class="betBox" style="background:white;padding:25px;border-radius:25px;width:280px;text-align:center;">
    <h3 id="betTitle" style="margin:0; color:var(--primary); font-size: 22px;">Bet on </h3>
    <input type="number" id="betInput" placeholder="Enter amount" style="width:100%;padding:15px;border-radius:15px;border:2px solid #eee;margin:20px 0;box-sizing: border-box; font-size: 20px; text-align: center; outline: none;">
    <div style="display:flex; gap:10px;">
        <button class="betBtn" style="background:#f1f2f6; color: #555; padding:12px; border:none; width:100%; border-radius:12px; font-weight:bold;" onclick="closeBetPopup()">Cancel</button>
        <button class="betBtn" style="background:var(--primary); color:white; padding:12px; border:none; width:100%; border-radius:12px; font-weight:bold;" onclick="placeBet()">Confirm</button>
    </div>
  </div>
</div>

<script type="module">
// ... (Aapka original Firebase logic yahan aayega, maine logic change nahi kiya hai)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,doc,getDoc,updateDoc,collection,addDoc,query,orderBy,limit,onSnapshot,serverTimestamp,setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain:"win2-512e1.firebaseapp.com", projectId:"win2-512e1" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let balance=0, userId="", currentBet=null, betAmount=0, selectedValue=null;

window.copyUID = () => {
    navigator.clipboard.writeText(userId);
    alert("User ID Copied: " + userId);
}

function updateTimer() {
    const now = new Date();
    const seconds = now.getSeconds();
    const remaining = 30 - (seconds % 30);
    document.getElementById("time").innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);
    if (remaining === 30) { processResult(); }
}
setInterval(updateTimer, 1000);

onAuthStateChanged(auth, user => {
  if(user){
    userId=user.uid;
    document.getElementById("displayUid").innerText = userId.substring(0,10) + "...";
    getDoc(doc(db,"users",userId)).then(snap => {
      if(snap.exists()){ balance=snap.data().balance||0; document.getElementById("balance").innerText=balance.toFixed(2); }
    });
  }
});

onSnapshot(query(collection(db, "history"), orderBy("createdAt", "desc"), limit(10)), (snap) => {
  let list = document.getElementById("historyList"); list.innerHTML = "";
  snap.forEach(d => {
    let item = d.data();
    let bg = item.num === 0 ? "ball-0" : item.num === 5 ? "ball-5" : (item.color === "green" ? "ball-odd" : "ball-even");
    let bsTag = item.bigsmall === "BIG" ? "bg-big" : "bg-small";
    list.innerHTML += `
      <div class="historyItem">
        <div><span class="res-num ${bg}">${item.num}</span> <span>${item.color.toUpperCase()}</span></div>
        <span class="tag-bs ${bsTag}">${item.bigsmall}</span>
      </div>`;
  });
});

window.selectBet=v=>{ 
    selectedValue=v; 
    document.getElementById("betTitle").innerText = "Bet on " + v.toString().toUpperCase();
    document.getElementById("betPopup").style.display="flex"; 
}
window.closeBetPopup=()=>{ document.getElementById("betPopup").style.display="none"; }

window.placeBet=async()=>{
  let amt=parseInt(document.getElementById("betInput").value);
  if(balance<amt || amt<=0){ alert("Low Balance!"); return; }
  balance-=amt; 
  document.getElementById("balance").innerText=balance.toFixed(2);
  document.getElementById("betPopup").style.display="none";
  currentBet=selectedValue; betAmount=amt;
  await updateDoc(doc(db,"users",userId), {balance:balance});
}

async function processResult(){
    let ball=document.getElementById("ball");
    let badge=document.getElementById("bsBadge");
    ball.classList.add("animate");
    badge.classList.remove("show");

    let result;
    try {
      const adminDoc = await getDoc(doc(db, "wingo", "result"));
      if (adminDoc.exists() && adminDoc.data().number !== null) {
          result = adminDoc.data().number;
          await setDoc(doc(db, "wingo", "result"), { number: null, time: Date.now() });
      } else { result = Math.floor(Math.random() * 10); }
    } catch(e) { result = Math.floor(Math.random() * 10); }

    let color = (result===0||result===5)?"violet":([1,3,7,9].includes(result)?"green":"red");
    let bs = result>=5?"BIG":"SMALL";
    
    if(userId) {
        addDoc(collection(db, "history"), { num:result, color:color, bigsmall:bs, createdAt:serverTimestamp() });
    }

    setTimeout(async ()=>{
      ball.innerText=result; ball.classList.remove("animate");
      badge.innerText = bs;
      badge.className = "bs-badge show " + (bs==="BIG" ? "bg-big" : "bg-small");

      if(result===0) ball.style.borderColor = "#9b59b6";
      else if(result===5) ball.style.borderColor = "#2ecc71";
      else ball.style.borderColor = (color==="green") ? "#2ecc71" : "#e74c3c";

      if(currentBet !== null){
        let win = (currentBet===result || currentBet===color || currentBet===bs.toLowerCase());
        let winAmt = (currentBet===result)?betAmount*9:betAmount*2;
        if(win) {
          balance += winAmt; 
          document.getElementById("balance").innerText=balance.toFixed(2);
          await updateDoc(doc(db,"users",userId), {balance:balance});
          showPopup("Win ₹" + winAmt, "win");
        } else { showPopup("Lose", "lose"); }
        currentBet=null;
      }
    },1000);
}

function showPopup(txt, type) {
    let p=document.createElement("div"); p.className="resultPopup "+type; p.innerText=txt;
    document.body.appendChild(p); p.style.display="block"; 
    setTimeout(()=>p.remove(),2500);
}

window.logout=()=>{ signOut(auth); window.location.href="login.html"; }
</script>
</body>
</html>
