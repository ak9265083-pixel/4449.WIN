<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN</title>

<style>

body{
margin:0;
font-family:Arial;
background:#9fa3ad;
display:flex;
justify-content:center;
}

.app{
width:420px;
background:white;
min-height:100vh;
text-align:center;
}

.header{
background:#ff6b6b;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.wallet{
background:#f2f2f2;
margin:15px;
padding:15px;
border-radius:12px;
font-size:18px;
}

.timer{
background:#ff6b6b;
color:white;
margin:10px;
padding:10px;
border-radius:10px;
font-size:18px;
}

.centerGame{
margin:20px auto;
width:120px;
height:120px;
border-radius:50%;
background:#eee;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
font-weight:bold;
}

.colors{
display:flex;
gap:10px;
padding:10px;
}

.colors button{
flex:1;
padding:12px;
border:none;
color:white;
border-radius:8px;
font-size:16px;
}

.green{background:#2ecc71;}
.red{background:#e74c3c;}
.violet{background:#9b59b6;}

.numbers{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
padding:10px;
}

.numbers button{
padding:15px;
border-radius:50%;
border:none;
font-size:18px;
background:#eee;
cursor:pointer;
}

.history{
margin:15px;
text-align:left;
}

.historyItem{
background:#eee;
margin-bottom:6px;
padding:8px;
border-radius:6px;
}

.bottomWallet{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:420px;
background:white;
border-top:2px solid #ddd;
padding:10px;
text-align:center;
}

.circleBtn{
width:60px;
height:60px;
border-radius:50%;
border:none;
font-size:24px;
margin:10px;
background:#ff6b6b;
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.circleBtn:hover{
transform:scale(1.15);
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

</style>
</head>

<body>

<div class="app">

<div class="header">4449 WIN</div>

<div class="wallet">
Balance ₹ <span id="balance">0</span>
</div>

<div class="timer">
Next Result In <span id="time">60</span>s
</div>

<div class="centerGame" id="ball">0</div>

<div class="colors">
<button class="green" onclick="selectBet('green')">Green</button>
<button class="violet" onclick="selectBet('violet')">Violet</button>
<button class="red" onclick="selectBet('red')">Red</button>
</div>

<div class="numbers">
<button onclick="selectBet(0)">0</button>
<button onclick="selectBet(1)">1</button>
<button onclick="selectBet(2)">2</button>
<button onclick="selectBet(3)">3</button>
<button onclick="selectBet(4)">4</button>
<button onclick="selectBet(5)">5</button>
<button onclick="selectBet(6)">6</button>
<button onclick="selectBet(7)">7</button>
<button onclick="selectBet(8)">8</button>
<button onclick="selectBet(9)">9</button>
</div>

<div class="history">
<h3>Last Results</h3>
<div id="historyList"></div>
</div>

</div>

<div class="bottomWallet">

<button class="circleBtn" onclick="openWallet()">💰</button>

<button class="circleBtn" onclick="openHelp()">❓</button>

<button class="circleBtn" onclick="logout()">🚪</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A",
authDomain: "win2-512e1.firebaseapp.com",
projectId: "win2-512e1",
storageBucket: "win2-512e1.firebasestorage.app",
messagingSenderId: "577913579227",
appId: "1:577913579227:web:1e073059c2d3d881720efe"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let balance=0;
let userId="";

onAuthStateChanged(auth, async (user)=>{

if(user){

userId=user.uid;

let ref=doc(db,"users",userId);

let snap=await getDoc(ref);

if(snap.exists()){

balance=snap.data().balance || 0;

document.getElementById("balance").innerText=balance;

}

}

});

function getColor(n){

if(n==0||n==5)return"violet";

if(n%2==0)return"red";

return"green";

}

function addHistory(num,color){

let div=document.createElement("div");

div.className="historyItem";

div.innerHTML="Result: "+num+" ("+color+")";

document.getElementById("historyList").prepend(div);

}

window.selectBet=async function(v){

let amt=prompt("Enter Bet Amount");

if(!amt)return;

amt=parseInt(amt);

if(balance<amt){

alert("Low Balance");

return;

}

balance-=amt;

let result=Math.floor(Math.random()*10);

let color=getColor(result);

if(v===result||v===color){

balance+=amt*2;

alert("You Win");

}else{

alert("You Lose");

}

document.getElementById("ball").innerText=result;

document.getElementById("balance").innerText=balance;

addHistory(result,color);

await updateDoc(doc(db,"users",userId),{

balance:balance

});

}

let time=60;

setInterval(()=>{

time--;

document.getElementById("time").innerText=time;

if(time==0){

time=60;

let result=Math.floor(Math.random()*10);

let color=getColor(result);

document.getElementById("ball").innerText=result;

addHistory(result,color);

}

},1000);

window.openWallet=function(){

window.location.href="wallet.html";

}

window.openHelp=function(){

window.location.href="help.html";

}

window.logout=function(){

signOut(auth);

alert("Logged Out");

window.location.href="login.html";

}

</script>

</body>
</html>
