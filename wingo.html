<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN</title>

<!-- confetti lib for win animation -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>

<style>
/* ————— YOUR ORIGINAL CSS START ————— */

body {
  margin: 0;
  font-family: Arial;
  background: #9fa3ad;
  display: flex;
  justify-content: center;
}

.app {
  width: 420px;
  background: white;
  min-height: 100vh;
  text-align: center;
  padding-bottom: 90px;
}

.header {
  background: #ff6b6b;
  color: white;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 10px;
}

.header img {
  width: 32px;
  height: 32px;
  border-radius: 50%;
}

.wallet {
  background: #f2f2f2;
  margin: 15px;
  padding: 15px;
  border-radius: 12px;
  font-size: 18px;
}

.timer {
  background: #ff6b6b;
  color: white;
  margin: 10px 15px;
  padding: 10px;
  border-radius: 10px;
  font-size: 18px;
  font-weight: bold;
  animation: pulse 1.5s infinite alternate;
}

@keyframes pulse {
  0% {
    background-color: #ff6b6b;
  }
  100% {
    background-color: #ff3b3b;
  }
}

.centerGame {
  margin: 20px auto;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: #eee;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 60px;
  font-weight: bold;
  box-shadow: inset -5px -5px 15px rgba(0, 0, 0, 0.1), inset 5px 5px 15px rgba(255, 255, 255, 0.7),
    0 5px 15px rgba(0, 0, 0, 0.2);
  transition: transform 0.6s ease, box-shadow 0.6s ease;
  text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.2);
  color: #000;
}

.centerGame.animate {
  transform: rotateY(360deg) scale(1.2);
  box-shadow: 0 0 20px #ff6b6b, 0 0 35px #ff3b3b inset;
}

/* COLORS */
.colors {
  display: flex;
  gap: 10px;
  padding: 10px 15px;
}

.colors button {
  flex: 1;
  padding: 12px;
  border: none;
  color: white;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.3s ease;
}

.green {
  background: #2ecc71;
}

.red {
  background: #e74c3c;
}

.violet {
  background: #9b59b6;
}

/* NUMBERS & BIG SMALL */
.numbers {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  padding: 10px 15px;
}

.numbers button {
  padding: 20px;
  border-radius: 50%;
  border: none;
  font-size: 18px;
  background: #eee;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
  transition: box-shadow 0.3s ease;
}

.bigsmall {
  display: flex;
  gap: 15px;
  padding: 10px 15px;
  margin-top: 10px;
}

.bigsmall button {
  flex: 1;
  padding: 15px;
  font-weight: bold;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 18px;
  color: white;
  transition: background 0.3s ease;
}

.big {
  background: #f39c12;
}

.small {
  background: #3498db;
}

/* HISTORY */
.history {
  margin: 15px;
  text-align: left;
  max-height: 250px;
  overflow-y: auto;
}
.historyItem {
  background: #eee;
  margin-bottom: 6px;
  padding: 10px 15px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 15px;
  animation: fadeIn 0.5s ease forwards;
}
.historyItem .colorBox {
  padding: 3px 10px;
  border-radius: 6px;
  font-weight: bold;
  color: white;
  font-size: 13px;
  text-transform: uppercase;
}
.colorGreen {
  background: #2ecc71;
}
.colorRed {
  background: #e74c3c;
}
.colorViolet {
  background: #9b59b6;
}
.bigTag {
  background: #f39c12;
  color: white;
  padding: 3px 10px;
  border-radius: 6px;
  font-weight: bold;
  font-size: 13px;
  text-transform: uppercase;
}

/* RESULT POPUP */
.resultPopup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  border-radius: 20px;
  padding: 25px 35px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  color: white;
  display: none;
  z-index: 9999;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
  animation: popupBounce 0.6s forwards;
  text-shadow: 1px 1px 8px rgba(0,0,0,0.3);
}
.resultPopup.win {
  background: linear-gradient(45deg,#2ecc71,#27ae60);
  box-shadow: 0 0 25px #2ecc71, 0 0 40px #27ae60;
}
.resultPopup.lose {
  background: linear-gradient(45deg,#e74c3c,#c0392b);
  box-shadow: 0 0 25px #e74c3c,0 0 40px #c0392b;
}

@keyframes popupBounce{
  0%{transform:translate(-50%,-50%) scale(0);}
  60%{transform:translate(-50%,-50%) scale(1.2);}
  80%{transform:translate(-50%,-50%) scale(0.9);}
  100%{transform:translate(-50%,-50%) scale(1);}
}
@keyframes fadeIn{
  from{opacity:0; transform: translateY(10px);}
  to{opacity:1; transform: translateY(0);}
}

/* Confetti */
.confettiPiece {
  position:absolute;
  width:8px;
  height:8px;
  background: red;
  animation: confettiFall 2s linear;
}
@keyframes confettiFall{
  0%{opacity:1; transform:translateY(0) rotate(0);}
  100%{opacity:0; transform:translateY(500px) rotate(720deg);}
}

/* ————— YOUR ORIGINAL CSS END ————— */
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <img src="logo.png" alt="logo"> 4449 WIN
  </div>

  <div class="wallet">Balance ₹ <span id="balance">0</span></div>

  <div class="timer">Next Result In <span id="time">30</span>s</div>

  <div class="centerGame" id="ball">?</div>

  <div class="colors">
    <button class="green" onclick="selectBet('green')">Green</button>
    <button class="violet" onclick="selectBet('violet')">Violet</button>
    <button class="red" onclick="selectBet('red')">Red</button>
  </div>

  <div class="bigsmall">
    <button class="big" onclick="selectBet('big')">BIG</button>
    <button class="small" onclick="selectBet('small')">SMALL</button>
  </div>

  <div class="numbers">
    <button onclick="selectBet(0)">0</button>
    <button onclick="selectBet(1)">1</button>
    <button onclick="selectBet(2)">2</button>
    <button onclick="selectBet(3)">3</button>
    <button onclick="selectBet(4)">4</button>
    <button onclick="selectBet(5)">5</button>
    <button onclick="selectBet(6)">6</button>
    <button onclick="selectBet(7)">7</button>
    <button onclick="selectBet(8)">8</button>
    <button onclick="selectBet(9)">9</button>
  </div>

  <div class="history">
    <h3>Last Results</h3>
    <div id="historyList"></div>
  </div>

</div>

<!-- Bottom Nav (unchanged) -->
<div class="bottomWallet">
  <div class="navBtn" onclick="openWallet()">
    <div class="icon">💳</div>
    <div class="label">Wallet</div>
  </div>
  <div class="navBtn" onclick="openHelp()">
    <div class="icon">🎧</div>
    <div class="label">Help</div>
  </div>
  <div class="navBtn" onclick="logout()">
    <div class="icon">🚪</div>
    <div class="label">Logout</div>
  </div>
</div>

<!-- Bet Popup (unchanged) -->
<div class="betPopup" id="betPopup">
  <div class="betBox">
    <button class="closeBtn" onclick="closeBetPopup()">✖</button>
    <h3>Enter Bet Amount</h3>
    <input type="number" id="betInput" placeholder="Amount">
    <button class="betBtn" onclick="placeBet()">Place Bet</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,doc,getDoc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain:"win2-512e1.firebaseioapp.com", projectId:"win2-512e1" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let balance=0, userId="", currentBet=null, betAmount=0, selectedValue=null;
let lastResults = JSON.parse(localStorage.getItem("gameHistory") || "[]");
let endTime = parseInt(localStorage.getItem("gameEnd")) || 0;

/* Balance from Firebase */
onAuthStateChanged(auth, async (user)=>{
  if(user){
    userId=user.uid;
    let ref=doc(db,"users",userId);
    let snap=await getDoc(ref);
    if(snap.exists()){ balance = snap.data().balance || 0; document.getElementById("balance").innerText=balance; }
  }
});

function getColor(n){ if(n==0||n==5) return "violet"; if([1,3,7,9].includes(n)) return "green"; return "red"; }
function getBigSmall(n){ return (n>=5)?"BIG":"SMALL"; }

window.selectBet=function(v){ selectedValue=v; document.getElementById("betPopup").style.display="flex"; }
window.closeBetPopup=function(){ document.getElementById("betPopup").style.display="none"; }
window.placeBet=function(){ let amt=parseInt(document.getElementById("betInput").value); if(balance<amt){alert("Low Balance");return;} balance-=amt;currentBet=selectedValue;betAmount=amt;document.getElementById("balance").innerText=balance;document.getElementById("betPopup").style.display="none";}

function renderHistory(){ let list=document.getElementById("historyList"); list.innerHTML=""; for(let item of lastResults){ let div=document.createElement("div"); div.className="historyItem"; let cls = item.color==="green"?"colorGreen":item.color==="red"?"colorRed":"colorViolet"; div.innerHTML=`Result ${item.num} (<span class="colorBox ${cls}">${item.color}</span>) <span class="bigTag">${item.bigsmall}</span>`; list.appendChild(div);} }
renderHistory();

// Timer: Continue on refresh
let now=Date.now();
if(endTime > now){} else{ endTime = now + 30000; localStorage.setItem("gameEnd", endTime); }
function confettiWin(){ confetti({ particleCount: 200, spread: 180, origin:{ y:0.6 }}); }

function showResultPopup(msg,isWin){
  let div=document.createElement("div"); div.className="resultPopup "+(isWin?"win":"lose"); div.innerText=msg; document.body.appendChild(div); div.style.display="block"; if(isWin)confettiWin(); setTimeout(()=>div.remove(),2500);
}

async function fetchAdminResult(){ try{ let resDoc=await getDoc(doc(db,"wingo","result")); return resDoc.data().number; }catch(e){ return Math.floor(Math.random()*10); } }

setInterval(async ()=>{
  let remaining = Math.ceil((endTime - Date.now())/1000);
  document.getElementById("time").innerText = remaining>0?remaining:0;
  if(remaining <= 0){
    endTime = Date.now() + 30000; localStorage.setItem("gameEnd", endTime);
    let ball=document.getElementById("ball"); ball.classList.add("animate");
    let res = await fetchAdminResult(); let color=getColor(res); let bs=getBigSmall(res);
    setTimeout(()=>{ ball.innerText = res; ball.style.color=color; ball.classList.remove("animate");},500);
    lastResults.unshift({num:res,color,bs}); if(lastResults.length>10) lastResults.pop(); localStorage.setItem("gameHistory",JSON.stringify(lastResults)); renderHistory();
    if(currentBet!=null){
      if(currentBet===res){ balance+=betAmount*(res==0?2:res); showResultPopup("You Win ₹"+(betAmount*(res==0?2:res)),true); }
      else if(currentBet===color){ balance+=betAmount*2; showResultPopup("Color Win ₹"+(betAmount*2),true); }
      else if(currentBet===bs.toLowerCase()){ balance+=betAmount*2; showResultPopup("Big/Small Win ₹"+(betAmount*2),true); }
      else showResultPopup("You Lose",false);
      document.getElementById("balance").innerText=balance;
      await updateDoc(doc(db,"users",userId),{balance});
      currentBet=null; betAmount=0;
    }
  }
},1000);

window.openWallet=function(){ window.location.href="wallet.html"; }
window.openHelp=function(){ window.location.href="help.html"; }
window.logout=function(){ signOut(auth); window.location.href="login.html"; }

</script>

</body>
</html>
