<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN - Upgraded</title>
<style>
body{margin:0;font-family:Arial;background:#9fa3ad;display:flex;justify-content:center}
.app{width:420px;background:white;min-height:100vh;text-align:center;padding-bottom:120px}
.header{background:#ff6b6b;color:white;padding:15px;font-size:22px;font-weight:bold}
.wallet{background:#f2f2f2;margin:15px;padding:15px;border-radius:12px;font-size:18px}
.timer{background:#ff6b6b;color:white;margin:10px;padding:10px;border-radius:10px;font-size:18px}
.centerGame{margin:20px auto;width:120px;height:120px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:50px;font-weight:bold;transition:all 0.5s ease;}
.colors{display:flex;gap:10px;padding:10px}
.colors button{flex:1;padding:12px;border:none;color:white;border-radius:8px;font-size:16px;cursor:pointer;transition:.2s}
.colors button:hover{transform:scale(1.05)}
.green{background:#2ecc71}
.red{background:#e74c3c}
.violet{background:#9b59b6}
.numbers{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px}
.numbers button{padding:15px;border-radius:50%;border:none;font-size:18px;background:#eee;cursor:pointer;transition:.2s}
.numbers button:hover{transform:scale(1.1)}
.history{margin:15px;text-align:left;max-height:250px;overflow-y:auto}
.historyItem{background:#eee;margin-bottom:6px;padding:8px;border-radius:6px}
.bottomWallet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:420px;background:white;border-top:2px solid #ddd;padding:10px;text-align:center;display:flex;justify-content:space-around}
.walletBtn{background:#ff6b6b;color:white;border:none;padding:12px 30px;border-radius:25px;font-size:16px;cursor:pointer;transition:.2s}
.walletBtn:hover{transform:scale(1.05);}

/* Popup */
.bet-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e293b;padding:20px;border-radius:12px;width:280px;display:none;box-shadow:0 0 20px rgba(0,0,0,0.6);animation:zoomPop .35s ease}
@keyframes zoomPop{0%{transform:translate(-50%,-50%) scale(0.5);opacity:0}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
.coin-box{display:flex;justify-content:center;align-items:center;gap:15px;margin-top:15px}
.coin-btn{padding:8px 14px;font-size:20px;border:none;border-radius:6px;cursor:pointer;background:#334155;color:white}
.bet-popup input{width:100%;padding:10px;border-radius:6px;margin-top:10px;border:1px solid #ccc;text-align:center;}
.bet-popup .confirm-btn{margin-top:15px;padding:10px;background:#22c55e;color:white;border:none;width:100%;border-radius:6px;cursor:pointer;}
.bet-popup .close-btn{background:#ef4444;margin-top:10px;color:white;}
</style>
</head>
<body>
<div class="app">
<div class="header">4449 WIN</div>
<div class="wallet">Balance ₹ <span id="balance">0</span></div>
<div class="timer">Next Result In <span id="time">60</span>s</div>
<div class="centerGame" id="ball">0</div>

<div class="colors">
<button class="green" onclick="selectBet('green')">Green</button>
<button class="violet" onclick="selectBet('violet')">Violet</button>
<button class="red" onclick="selectBet('red')">Red</button>
</div>

<div class="bottomWallet">
<button class="walletBtn" onclick="openWallet()">WALLET</button>
<button class="walletBtn" onclick="openHelp()">HELP</button>
<button class="walletBtn" onclick="logout()">LOGOUT</button>
</div>

<div class="numbers">
<button onclick="selectBet(0)">0</button>
<button onclick="selectBet(1)">1</button>
<button onclick="selectBet(2)">2</button>
<button onclick="selectBet(3)">3</button>
<button onclick="selectBet(4)">4</button>
<button onclick="selectBet(5)">5</button>
<button onclick="selectBet(6)">6</button>
<button onclick="selectBet(7)">7</button>
<button onclick="selectBet(8)">8</button>
<button onclick="selectBet(9)">9</button>
</div>

<div class="history">
<h3>Last Results & Bets</h3>
<div id="historyList"></div>
</div>
</div>

<!-- Bet popup -->
<div class="bet-popup" id="betPopup">
<h3>Place Your Bet</h3>
<div class="coin-box">
<button class="coin-btn" onclick="changeCoin(-1)">-</button>
<div id="coinValue">1</div>
<button class="coin-btn" onclick="changeCoin(1)">+</button>
</div>
<input type="number" id="betAmount" placeholder="Enter Amount">
<button class="confirm-btn" onclick="confirmBet()">Confirm Bet</button>
<button class="close-btn" onclick="closePopup()">Close</button>
</div>

<script>
// User balance persist
let balance = parseInt(localStorage.getItem("balance")||0)
if(balance==0) balance=1000
localStorage.setItem("balance",balance)
document.getElementById("balance").innerText = balance

let selected=null,currentBet=null,betAmount=0,coin=1
let time=60

// Color logic
function getColor(n){
if(n==0||n==5) return "violet"
if([1,3,7,9].includes(n)) return "green"
return "red"
}

// Multiplier logic
function getMultiplier(n){return n==0?2:n}

// Bet selection
function selectBet(v){selected=v;openPopup()}

// Popup functions
function openPopup(){document.getElementById("betPopup").style.display="block"}
function closePopup(){document.getElementById("betPopup").style.display="none"}
function changeCoin(val){coin+=val;if(coin<1)coin=1;document.getElementById("coinValue").innerText=coin}

// Confirm Bet
function confirmBet(){
betAmount=parseInt(document.getElementById("betAmount").value)
if(!selected||!betAmount||betAmount<1){alert("Select bet & enter amount");return;}
if(balance<betAmount){alert("Low Balance");return;}
balance-=betAmount
currentBet=selected
closePopup()
document.getElementById("balance").innerText=balance
}

// History
function addHistory(num,color,bet,amount){
let div=document.createElement("div")
div.className="historyItem"
div.innerHTML="Result: "+num+" ("+color+") | Bet: "+bet+" | Amount: "+amount
document.getElementById("historyList").prepend(div)
if(document.getElementById("historyList").children.length>50)
document.getElementById("historyList").removeChild(document.getElementById("historyList").lastChild)
}

// Timer & result
setInterval(()=>{
time--
document.getElementById("time").innerText=time
if(time<=0){
time=60
let admin=localStorage.getItem("adminResult")
let result=admin?parseInt(admin):Math.floor(Math.random()*10)
localStorage.removeItem("adminResult")
let color=getColor(result)
let multiplier=getMultiplier(result)
let win=0
if(currentBet===result) win=betAmount*multiplier
else if(currentBet===color) win=betAmount*2
balance+=win
alert(win>0?("You Win ₹"+win):"You Lose")
document.getElementById("balance").innerText=balance
document.getElementById("ball").innerText=result
addHistory(result,color,currentBet,betAmount)
currentBet=null
betAmount=0
}},1000)

// Wallet/Help/Logout
function openWallet(){window.location.href="wallet.html"}
function openHelp(){window.location.href="help.html"}
function logout(){window.location.href="login.html"}
</script>
</body>
</html>
