<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN</title>

<style>
body{margin:0;font-family:Arial;background:#9fa3ad;display:flex;justify-content:center}
.app{width:420px;background:white;min-height:100vh;text-align:center}
.header{background:#ff6b6b;color:white;padding:15px;font-size:22px;font-weight:bold}
.wallet{background:#f2f2f2;margin:15px;padding:15px;border-radius:12px;font-size:18px}
.timer{background:#ff6b6b;color:white;margin:10px;padding:10px;border-radius:10px;font-size:18px}
.centerGame{margin:20px auto;width:120px;height:120px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:50px;font-weight:bold}
.colors{display:flex;gap:10px;padding:10px}
.colors button{flex:1;padding:12px;border:none;color:white;border-radius:8px}
.green{background:#2ecc71}
.red{background:#e74c3c}
.violet{background:#9b59b6}
.numbers{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px}
.numbers button{padding:15px;border-radius:50%;border:none;font-size:18px;background:#eee}
.betBox{margin:15px}
.betBox input{padding:10px;width:120px}
.betBtn{padding:10px 20px;background:#ff6b6b;color:white;border:none;border-radius:8px}
.history{margin:15px;text-align:left}
.historyItem{background:#eee;margin-bottom:6px;padding:8px;border-radius:6px}

.bottomWallet{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:420px;
background:white;
border-top:2px solid #ddd;
padding:10px;
text-align:center;
}

.walletBtn{
background:#ff6b6b;
color:white;
border:none;
padding:12px 30px;
border-radius:25px;
font-size:16px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">4449 WIN</div>

<div class="wallet">Balance ₹ <span id="balance">0</span></div>

<div class="timer">Next Result In <span id="time">60</span>s</div>

<div class="centerGame" id="ball">0</div>

<div class="colors">
<button class="green" onclick="selectBet('green')">Green</button>
<button class="violet" onclick="selectBet('violet')">Violet</button>
<button class="red" onclick="selectBet('red')">Red</button>
</div>

<div class="bottomWallet">
<button class="walletBtn" onclick="openWallet()">WALLET</button>
<button class="walletBtn" onclick="openHelp()">HELP</button>
</div>

<div class="numbers">
<button onclick="selectBet(0)">0</button>
<button onclick="selectBet(1)">1</button>
<button onclick="selectBet(2)">2</button>
<button onclick="selectBet(3)">3</button>
<button onclick="selectBet(4)">4</button>
<button onclick="selectBet(5)">5</button>
<button onclick="selectBet(6)">6</button>
<button onclick="selectBet(7)">7</button>
<button onclick="selectBet(8)">8</button>
<button onclick="selectBet(9)">9</button>
</div>

<div class="betBox">
<input type="number" id="amount" placeholder="Bet Amount">
<button class="betBtn" onclick="placeBet()">BET</button>
</div>

<div class="history">
<h3>Last Results</h3>
<div id="historyList"></div>
</div>

</div>

<script>

/* Balance Start from 0 */

if(localStorage.getItem("balance")==null){
localStorage.setItem("balance",0)
}

let balance=parseInt(localStorage.getItem("balance"))
document.getElementById("balance").innerText=balance

let selected=null
let time=60

function selectBet(v){
selected=v
}

function getColor(n){
if(n==0||n==5)return"violet"
if(n%2==0)return"red"
return"green"
}

function addHistory(num,color){

let div=document.createElement("div")
div.className="historyItem"
div.innerHTML="Result: "+num+" ("+color+")"

let list=document.getElementById("historyList")
list.prepend(div)

if(list.children.length>20){
list.removeChild(list.lastChild)
}

}

function placeBet(){

let amt=parseInt(document.getElementById("amount").value)

if(!selected)return alert("Select bet")
if(!amt || amt<=0)return alert("Enter amount")
if(balance<amt)return alert("Low balance")

balance-=amt

let admin=localStorage.getItem("adminResult")
let result=admin?parseInt(admin):Math.floor(Math.random()*10)

localStorage.removeItem("adminResult")

let color=getColor(result)

if(selected===result||selected===color){
balance+=amt*2
alert("You Win")
}

localStorage.setItem("balance",balance)

document.getElementById("balance").innerText=balance
document.getElementById("ball").innerText=result

addHistory(result,color)

}

function deposit(){
let amt=prompt("Enter deposit amount (min 100)")
if(amt<100)return alert("Minimum 100")
alert("Send money to UPI 7857801650@fam then contact admin")
}

function withdraw(){
let amt=prompt("Withdraw amount (min 100)")
let upi=prompt("Enter UPI ID")
alert("Withdraw request sent")
}

setInterval(()=>{

time--
document.getElementById("time").innerText=time

if(time==0){

time=60

let admin=localStorage.getItem("adminResult")
let result=admin?parseInt(admin):Math.floor(Math.random()*10)

localStorage.removeItem("adminResult")

let color=getColor(result)

document.getElementById("ball").innerText=result

addHistory(result,color)

}

},1000)

function openWallet(){
window.location.href="wallet.html"
}

function openHelp(){
window.location.href="help.html"
}

</script>

</body>
</html>
