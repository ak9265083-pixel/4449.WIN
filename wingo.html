.app{
width:420px;

min-height:100vh;

.header{

.centerGame{
margin:20px auto;

height:120px;
border-radius:50%;

align-items:center;
justify-content:center;

}

.spinningBall{
position:absolute;
width:20px;
height:20px;
border-radius:50%;
background:#ff6b6b;
top:50%;
left:50%;
transform-origin:50% 60px;
animation:spinCircle 1s linear infinite;
display:none;
}

@keyframes spinCircle{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.colors{
display:flex;
gap:10px;
padding:10px;
}

.colors button{
flex:1;
padding:12px;
border:none;
color:white;
border-radius:8px;
font-size:16px;
}
