<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN </title>
<style>
:root { 
    --primary: #00f2ff; /* Neon Cyan */
    --secondary: #ff007a; /* Neon Pink */
    --big-color: #fccf31; /* Neon Yellow/Gold */
    --bg: #0b0e14; 
    --card-bg: #161b22; 
    --green: #2ecc71;
    --red: #e74c3c;
    --violet: #9b59b6;
    --glass: rgba(255, 255, 255, 0.05);
}

body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); display: flex; justify-content: center; color: white; }
.app { width: 420px; background: var(--bg); min-height: 100vh; text-align: center; padding-bottom: 110px; overflow-x: hidden; border-left: 1px solid rgba(0, 242, 255, 0.1); border-right: 1px solid rgba(0, 242, 255, 0.1); position: relative; }

/* Header */
.header { background: rgba(22, 27, 34, 0.95); padding: 12px 15px; font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--primary); color: var(--primary); position: sticky; top:0; z-index: 1000; backdrop-filter: blur(10px); box-shadow: 0 0 15px rgba(0,242,255,0.3); }
.header-logo { width: 35px; height: 35px; border-radius: 50%; background: white; border: 2px solid var(--primary); box-shadow: 0 0 10px var(--primary); }

/* Profile Card */
.profile-card { background: linear-gradient(135deg, #1c2333, #0b0e14); margin: 15px; padding: 20px; border-radius: 20px; border: 1px solid rgba(0, 242, 255, 0.2); text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.profile-card p { margin: 0; font-size: 11px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
.profile-card h2 { margin: 5px 0; font-size: 32px; color: var(--primary); text-shadow: 0 0 15px rgba(0,242,255,0.4); }
.uid-box { background: rgba(0, 242, 255, 0.05); padding: 6px 12px; border-radius: 10px; display: inline-flex; align-items: center; gap: 8px; margin-top: 5px; font-size: 12px; border: 1px solid rgba(0, 242, 255, 0.2); cursor: pointer; }

/* Timer Section */
.timer-container { background: var(--card-bg); margin: 0 15px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--glass); }
.timer-label { font-weight: bold; color: #8b949e; display: flex; align-items: center; gap: 6px; }
#time { font-size: 28px; color: var(--secondary); font-weight: 900; text-shadow: 0 0 10px var(--secondary); font-family: monospace; }

/* RECTANGULAR RESULT BOX (CYBER SLOT STYLE) */
.result-area { margin: 25px auto; width: 90%; }
.centerGame { width: 100%; height: 130px; background: #1a1f29; border-radius: 20px; border: 2px solid var(--primary); box-shadow: 0 0 25px rgba(0, 242, 255, 0.2), inset 0 0 20px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 70px; font-weight: 900; position: relative; transition: 0.5s; overflow: hidden; }
.centerGame.animate { animation: neonGlitch 0.3s infinite; }
@keyframes neonGlitch { 0% { border-color: var(--primary); box-shadow: 0 0 20px var(--primary); } 50% { border-color: var(--secondary); box-shadow: 0 0 20px var(--secondary); } 100% { border-color: var(--primary); box-shadow: 0 0 20px var(--primary); } }

.bs-badge { position: absolute; bottom: 12px; right: 20px; padding: 5px 15px; border-radius: 8px; font-size: 16px; font-weight: 900; transform: skew(-15deg) scale(0); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
.bs-badge.show { transform: skew(-15deg) scale(1); }

/* Classic Number Colors */
.numbers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 10px 15px; }
.numbers button { height: 55px; border-radius: 12px; border: none; font-size: 20px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
.numbers button:active { transform: translateY(2px); box-shadow: none; }
.ball-0 { background: linear-gradient(135deg, var(--red) 50%, var(--violet) 50%); } 
.ball-5 { background: linear-gradient(135deg, var(--green) 50%, var(--violet) 50%); } 
.ball-odd { background: var(--green); } 
.ball-even { background: var(--red); }

/* Betting Buttons */
.colors, .bigsmall { display: flex; gap: 10px; padding: 10px 15px; }
.colors button, .bigsmall button { flex: 1; padding: 16px; border: none; color: white; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
.green-btn { background: var(--green); box-shadow: 0 4px 0 #1b8a4d; }
.red-btn { background: var(--red); box-shadow: 0 4px 0 #b02d1f; }
.violet-btn { background: var(--violet); box-shadow: 0 4px 0 #733d8a; }
.big { background: var(--big-color); color: black !important; box-shadow: 0 4px 0 #c48a0d; }
.small { background: var(--primary); color: black !important; box-shadow: 0 4px 0 #00b8c2; }

/* History List with Original Colors */
.history { margin: 15px; padding: 15px; background: var(--card-bg); border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: left; }
.historyItem { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
.res-num { width: 34px; height: 34px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

/* UPGRADED BOTTOM NAVIGATION WITH LOGOS */
.bottomWallet { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 420px; background: #161b22; border-top: 1px solid var(--primary); display: flex; justify-content: space-around; padding: 15px 0; z-index: 2000; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
.navBtn { display: flex; flex-direction: column; align-items: center; color: #8b949e; cursor: pointer; transition: 0.3s; flex: 1; text-decoration: none; }
.navBtn.active, .navBtn:hover { color: var(--primary); text-shadow: 0 0 10px var(--primary); }
.nav-icon { font-size: 22px; margin-bottom: 4px; transition: 0.3s; }
.nav-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

/* Popup (Bet selection) - CENTERED FIXED */
.betPopup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(8px); }
.betBox { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 320px; border: 2px solid var(--primary); box-shadow: 0 0 30px rgba(0,242,255,0.3); animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
@keyframes pop { from{transform:scale(0.8); opacity:0;} to{transform:scale(1); opacity:1;} }
.betBox h3 { margin: 0 0 20px; font-size: 18px; letter-spacing: 1px; color: #fff; text-transform: uppercase; }
.betBox input { width: 100%; padding: 15px; background: #0b0e14; border: 1px solid var(--glass); color: var(--primary); font-size: 28px; text-align: center; margin-bottom: 25px; border-radius: 12px; font-weight: bold; outline: none; transition: 0.3s; }
.betBox input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,242,255,0.2); }
.popup-btns { display:flex; gap:15px; width: 100%; }
.confirmBtn { flex:1; padding:15px; border-radius:12px; border:none; background:var(--primary); color:black; font-weight:bold; cursor:pointer; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.cancelBtn { flex:1; padding:15px; border-radius:12px; border:none; background:#333; color:white; font-weight:bold; cursor:pointer; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

/* Winning/Lose Result Popups (5 seconds attractive) */
.resultPopup { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0); padding: 40px 60px; border-radius: 25px; font-weight: 900; font-size: 32px; z-index: 9999; animation: popupBounce 0.6s forwards; text-transform: uppercase; letter-spacing: 2px; }
@keyframes popupBounce { 0% { transform: translate(-50%,-50%) scale(0); } 80% { transform: translate(-50%,-50%) scale(1.1); } 100% { transform: translate(-50%,-50%) scale(1); } }

/* WIN POPUP STYLE */
.resultPopup.win {
    background: linear-gradient(135deg, #1c2333, #0b0e14);
    color: var(--primary);
    border: 3px solid var(--primary);
    box-shadow: 0 0 50px rgba(0,242,255,0.4);
    text-shadow: 0 0 15px var(--primary);
}
.resultPopup.win::after { content: 'WIN credits Added!'; display: block; font-size: 14px; color: white; margin-top: 10px; font-weight: bold; opacity: 0.8; }

/* LOSE POPUP STYLE */
.resultPopup.lose {
    background: linear-gradient(135deg, #111, #000);
    color: white;
    border: 3px solid #444;
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
    opacity: 0.9;
}
.resultPopup.lose::after { content: 'SYSTEM: Better luck next time'; display: block; font-size: 13px; color: #ff3547; margin-top: 10px; font-weight: bold; }

</style>
</head>
<body>

<div class="app">
  <div class="header">
    <img src="logo.png" alt="Logo" class="header-logo">
    <span>4449 WIN</span>
  </div>
  
  <div class="profile-card">
    <p>Current Credits</p>
    <h2 id="balance">₹ 0.00</h2>
    <div class="uid-box" onclick="copyUID()">
      <span>ID: <span id="displayUid">...</span></span>
      <span style="color: var(--primary);">📋</span>
    </div>
  </div>

  <div class="timer-container">
    <div class="timer-label">⏱ <span>WINGO 30S</span></div>
    <div id="time">00:30</div>
  </div>
  
  <div class="result-area">
    <div class="centerGame" id="ball">
        <span id="resText">?</span>
        <div id="bsBadge" class="bs-badge">BIG</div>
    </div>
  </div>
  
  <div class="colors">
    <button class="green-btn" onclick="selectBet('green')">Green</button>
    <button class="violet-btn" onclick="selectBet('violet')">Violet</button>
    <button class="red-btn" onclick="selectBet('red')">Red</button>
  </div>
  <div class="bigsmall">
    <button class="big" onclick="selectBet('big')">BIG</button>
    <button class="small" onclick="selectBet('small')">SMALL</button>
  </div>

  <div class="numbers">
    <button class="ball-0" onclick="selectBet(0)">0</button>
    <button class="ball-odd" onclick="selectBet(1)">1</button>
    <button class="ball-even" onclick="selectBet(2)">2</button>
    <button class="ball-odd" onclick="selectBet(3)">3</button>
    <button class="ball-even" onclick="selectBet(4)">4</button>
    <button class="ball-5" onclick="selectBet(5)">5</button>
    <button class="ball-even" onclick="selectBet(6)">6</button>
    <button class="ball-odd" onclick="selectBet(7)">7</button>
    <button class="ball-even" onclick="selectBet(8)">8</button>
    <button class="ball-odd" onclick="selectBet(9)">9</button>
  </div>
  
  <div class="history">
    <h4 style="margin:0 0 15px 0; color:var(--primary); font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">Live Game History</h4>
    <div id="historyList"></div>
  </div>
</div>

<div class="bottomWallet">
  <div class="navBtn active" onclick="location.reload()">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">Home</div>
  </div>
  <div class="navBtn" onclick="location.href='wallet.html'">
    <div class="nav-icon">💳</div>
    <div class="nav-label">Wallet</div>
  </div>
  <div class="navBtn" onclick="location.href='help.html'">
    <div class="nav-icon">🎧</div>
    <div class="nav-label">Help</div>
  </div>
  <div class="navBtn" onclick="logout()">
    <div class="nav-icon">🚪</div>
    <div class="nav-label">Logout</div>
  </div>
</div>

<div class="betPopup" id="betPopup">
  <div class="betBox">
    <h3 id="betTitle">SELECT Credits</h3>
    <input type="number" id="betInput" placeholder="0">
    <div class="popup-btns">
        <button onclick="closeBetPopup()" class="cancelBtn">CANCEL</button>
        <button onclick="placeBet()" class="confirmBtn">CONFIRM</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,doc,getDoc,updateDoc,collection,addDoc,query,orderBy,limit,onSnapshot,serverTimestamp,setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain:"win2-512e1.firebaseapp.com", projectId:"win2-512e1" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let balance=0, userId="", currentBet=null, betAmount=0, selectedValue=null;

window.copyUID = () => {
    navigator.clipboard.writeText(userId);
    alert("UID Copied to Clipboard!");
}

function updateTimer() {
    const remaining = 30 - (new Date().getSeconds() % 30);
    document.getElementById("time").innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);
    if (remaining === 30) { processResult(); }
}
setInterval(updateTimer, 1000);

onAuthStateChanged(auth, user => {
  if(user){
    userId=user.uid;
    document.getElementById("displayUid").innerText = userId.substring(0,12).toUpperCase();
    getDoc(doc(db,"users",userId)).then(snap => {
      if(snap.exists()){ balance=snap.data().balance||0; document.getElementById("balance").innerText="₹ " + balance.toFixed(2); }
    });
  }
});

onSnapshot(query(collection(db, "history"), orderBy("createdAt", "desc"), limit(10)), (snap) => {
  let list = document.getElementById("historyList"); list.innerHTML = "";
  snap.forEach(d => {
    let item = d.data();
    let bg = item.num === 0 ? "ball-0" : item.num === 5 ? "ball-5" : (item.color === "green" ? "ball-odd" : "ball-even");
    list.innerHTML += `
      <div class="historyItem">
        <div><span class="res-num ${bg}">${item.num}</span> <span style="font-size:12px; opacity:0.7; margin-left:5px;">${item.color.toUpperCase()}</span></div>
        <span style="color:${item.bigsmall==='BIG'?'var(--big-color)':'var(--primary)'}; font-weight:900; letter-spacing:1px;">${item.bigsmall}</span>
      </div>`;
  });
});

window.selectBet=v=>{ selectedValue=v; document.getElementById("betTitle").innerText="BET ON: "+v.toString().toUpperCase(); document.getElementById("betPopup").style.display="flex"; }
window.closeBetPopup=()=>{ document.getElementById("betPopup").style.display="none"; }

window.placeBet=async()=>{
  let amt=parseInt(document.getElementById("betInput").value);
  if(balance<amt || amt<=0){ alert("Inadequate Credits!"); return; }
  balance-=amt; document.getElementById("balance").innerText="₹ "+balance.toFixed(2);
  document.getElementById("betPopup").style.display="none";
  currentBet=selectedValue; betAmount=amt;
  await updateDoc(doc(db,"users",userId), {balance:balance});
}

async function processResult(){
    let box=document.getElementById("ball"), badge=document.getElementById("bsBadge"), resText=document.getElementById("resText");
    box.classList.add("animate"); badge.classList.remove("show");

    let result;
    try {
      const adminDoc = await getDoc(doc(db, "wingo", "result"));
      if (adminDoc.exists() && adminDoc.data().number !== null) {
          result = adminDoc.data().number;
          await setDoc(doc(db, "wingo", "result"), { number: null, time: Date.now() });
      } else { result = Math.floor(Math.random() * 10); }
    } catch(e) { result = Math.floor(Math.random() * 10); }

    let color = (result===0||result===5)?"violet":([1,3,7,9].includes(result)?"green":"red");
    let bs = result>=5?"BIG":"SMALL";
    if(userId) { addDoc(collection(db, "history"), { num:result, color:color, bigsmall:bs, createdAt:serverTimestamp() }); }

    setTimeout(async ()=>{
      box.classList.remove("animate"); resText.innerText = result;
      badge.innerText = bs; badge.className = "bs-badge show";
      badge.style.background = (bs==="BIG" ? "var(--big-color)" : "var(--primary)");
      badge.style.color = "black";

      if(result===0) box.style.borderColor = "#9b59b6";
      else if(result===5) box.style.borderColor = "#2ecc71";
      else box.style.borderColor = (color==="green") ? "#2ecc71" : "#e74c3c";

      if(currentBet !== null){
        let win = (currentBet===result || currentBet===color || currentBet===bs.toLowerCase());
        if(win) {
          let winAmt = (currentBet===result)?betAmount*9:betAmount*2;
          balance += winAmt; document.getElementById("balance").innerText="₹ "+balance.toFixed(2);
          await updateDoc(doc(db,"users",userId), {balance:balance});
          showPopup("WIN ₹" + winAmt, "win");
        } else { showPopup("LOSE", "lose"); }
        currentBet=null;
      }
    },1000);
}

function showPopup(txt, type) {
    let p=document.createElement("div"); p.className="resultPopup "+type; p.innerText=txt;
    document.body.appendChild(p); p.style.display="block"; 
    // Auto-close after 5 seconds (5000 ms)
    setTimeout(()=>p.remove(),5000);
}
window.logout=()=>{ signOut(auth); window.location.href="login.html"; }
</script>
</body>
</html>
