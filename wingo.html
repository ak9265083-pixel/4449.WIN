<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#9fa3ad;
  display:flex;
  justify-content:center;
}
.app{
  width:420px;
  background:white;
  min-height:100vh;
  text-align:center;
  padding-bottom:90px;
}
.header{
  background:#ff6b6b;
  color:white;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  display:flex;
  align-items:center;
  gap:10px;
}
.header img{
  width:32px;
  height:32px;
  border-radius:50%;
}
.wallet{
  background:#f2f2f2;
  margin:15px;
  padding:15px;
  border-radius:12px;
  font-size:18px;
}
.timer{
  background:#ff6b6b;
  color:white;
  margin:10px 15px;
  padding:10px;
  border-radius:10px;
  font-size:18px;
  font-weight:bold;
  animation: pulse 1.5s infinite alternate;
}
@keyframes pulse {
  0% { background-color: #ff6b6b; }
  100% { background-color: #ff3b3b; }
}
.centerGame{
  margin:20px auto;
  width:120px;
  height:120px;
  border-radius:50%;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:60px;
  font-weight:bold;
  box-shadow: inset -5px -5px 15px rgba(0,0,0,0.1),
              inset 5px 5px 15px rgba(255,255,255,0.7),
              0 5px 15px rgba(0,0,0,0.2);
  transition: transform 0.3s ease;
}
.centerGame.animate {
  transform: scale(1.15);
}
.colors{
  display:flex;
  gap:10px;
  padding:10px 15px;
}
.colors button{
  flex:1;
  padding:12px;
  border:none;
  color:white;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  transition: background 0.3s ease;
}
.green{background:#2ecc71;}
.red{background:#e74c3c;}
.violet{background:#9b59b6;}
.numbers{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  padding:10px 15px;
}
.numbers button{
  padding:20px;
  border-radius:50%;
  border:none;
  font-size:18px;
  background:#eee;
  cursor:pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: box-shadow 0.3s ease;
}
.numbers button:hover{
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
.bigsmall{
  display:flex;
  gap:15px;
  padding:10px 15px;
  margin-top:10px;
}
.bigsmall button{
  flex:1;
  padding:15px;
  font-weight:bold;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:18px;
  color:white;
  transition: background 0.3s ease;
}
.big{ background:#f39c12; }
.small{ background:#3498db; }
.history{
  margin:15px;
  text-align:left;
  max-height:250px;
  overflow-y:auto;
}
.history h3{
  margin-bottom:10px;
}
.historyItem{
  background:#eee;
  margin-bottom:6px;
  padding:10px 15px;
  border-radius:6px;
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:600;
  font-size:15px;
  animation: fadeIn 0.5s ease forwards;
}
.historyItem .colorBox {
  padding: 3px 10px;
  border-radius: 6px;
  font-weight: bold;
  color: white;
  font-size: 13px;
  text-transform: uppercase;
}
.colorGreen { background: #2ecc71; }
.colorRed { background: #e74c3c; }
.colorViolet { background: #9b59b6; }
.bigTag {
  background: #f39c12;
  color: white;
  padding: 3px 10px;
  border-radius: 6px;
  font-weight: bold;
  font-size: 13px;
  text-transform: uppercase;
}
/* Bottom Navigation */
.bottomWallet{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:360px;
  background:white;
  border-radius:25px;
  display:flex;
  justify-content:space-around;
  padding:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.25);
  z-index: 1000;
}
.navBtn{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
}
.icon{
  width:48px;
  height:48px;
  border-radius:50%;
  background:#ff6b6b;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  color:white;
}
.label{
  font-size:13px;
  margin-top:4px;
  font-weight:bold;
}
/* POPUP */
.betPopup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index: 2000;
}
.betBox{
  position:relative;
  background:white;
  padding:25px;
  border-radius:18px;
  width:260px;
  text-align:center;
  animation:zoomPop .35s ease;
}
@keyframes zoomPop{
  0%{transform:scale(.5);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}
.betBox input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
  text-align:center;
  margin-top:10px;
}
.betBtn{
  margin-top:15px;
  padding:12px;
  background:#ff6b6b;
  color:white;
  border:none;
  width:100%;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}
.closeBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #ff6b6b;
  color: white;
  border: none;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  font-size: 16px;
  cursor: pointer;
}
.resultPopup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  border-radius: 20px;
  padding: 25px 35px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  color: white;
  display: none;
  animation: popupBounce 0.5s forwards;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  z-index: 9999;
}
.resultPopup.win { background: linear-gradient(135deg, #2ecc71, #27ae60); }
.resultPopup.lose { background: linear-gradient(135deg, #e74c3c, #c0392b); }
@keyframes popupBounce {
  0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
  60%  { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
  80%  { transform: translate(-50%, -50%) scale(0.95); }
  100% { transform: translate(-50%, -50%) scale(1); }
}
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>

</head>
<body>

<div class="app">

  <div class="header">
    <img src="logo.png" alt="logo">
    4449 WIN
  </div>

  <div class="wallet">
    Balance ₹ <span id="balance">0</span>
  </div>

  <div class="timer">
    Next Result In <span id="time">30</span>s
  </div>

  <div class="centerGame" id="ball">?</div>

  <div class="colors">
    <button class="green" onclick="selectBet('green')">Green</button>
    <button class="violet" onclick="selectBet('violet')">Violet</button>
    <button class="red" onclick="selectBet('red')">Red</button>
  </div>

  <div class="bigsmall">
    <button class="big" onclick="selectBet('big')">BIG</button>
    <button class="small" onclick="selectBet('small')">SMALL</button>
  </div>

  <div class="numbers">
    <button onclick="selectBet(0)">0</button>
    <button onclick="selectBet(1)">1</button>
    <button onclick="selectBet(2)">2</button>
    <button onclick="selectBet(3)">3</button>
    <button onclick="selectBet(4)">4</button>
    <button onclick="selectBet(5)">5</button>
    <button onclick="selectBet(6)">6</button>
    <button onclick="selectBet(7)">7</button>
    <button onclick="selectBet(8)">8</button>
    <button onclick="selectBet(9)">9</button>
  </div>

  <div class="history">
    <h3>Last Results</h3>
    <div id="historyList"></div>
  </div>

</div>

<div class="bottomWallet">
  <div class="navBtn" onclick="openWallet()">
    <div class="icon">💳</div>
    <div class="label">Wallet</div>
  </div>
  <div class="navBtn" onclick="openHelp()">
    <div class="icon">🎧</div>
    <div class="label">Help</div>
  </div>
  <div class="navBtn" onclick="logout()">
    <div class="icon">🚪</div>
    <div class="label">Logout</div>
  </div>
</div>

<div class="betPopup" id="betPopup">
  <div class="betBox">
    <button class="closeBtn" onclick="closeBetPopup()">✖</button>
    <h3>Enter Bet Amount</h3>
    <input type="number" id="betInput" placeholder="Amount">
    <button class="betBtn" onclick="placeBet()">Place Bet</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,doc,getDoc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain:"win2-512e1.firebaseapp.com", projectId:"win2-512e1" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let balance=0, userId="", currentBet=null, betAmount=0, selectedValue=null, lastResults=[];

// Load history & balance from localStorage
if(localStorage.getItem("gameHistory")) lastResults = JSON.parse(localStorage.getItem("gameHistory"));
if(localStorage.getItem("balance")) balance = parseInt(localStorage.getItem("balance"));

document.getElementById("balance").innerText = balance;

function renderHistory(){
  let historyList = document.getElementById("historyList");
  historyList.innerHTML="";
  for(let item of lastResults){
    let div = document.createElement("div");
    div.className="historyItem";
    let colorClass = item.color==="green"?"colorGreen":item.color==="red"?"colorRed":"colorViolet";
    div.innerHTML=`Result ${item.num} (<span class="colorBox ${colorClass}">${item.color}</span>) <span class="bigTag">${item.bigsmall}</span>`;
    historyList.appendChild(div);
  }
}
renderHistory();

function getColor(n){ if(n==0||n==5) return "violet"; if([1,3,7,9].includes(n)) return "green"; return "red"; }
function getBigSmall(n){ return (n>=5)?"BIG":"SMALL"; }

window.selectBet=function(v){ selectedValue=v; document.getElementById("betPopup").style.display="flex"; }
window.closeBetPopup=function(){ document.getElementById("betPopup").style.display="none"; }

window.placeBet=function(){
  let amt=parseInt(document.getElementById("betInput").value);
  if(balance<amt){ alert("Low Balance"); return; }
  balance-=amt; currentBet=selectedValue; betAmount=amt;
  document.getElementById("balance").innerText=balance;
  localStorage.setItem("balance",balance);
  document.getElementById("betPopup").style.display="none";
}

function showResultPopup(msg,win){
  let popup=document.createElement("div");
  popup.className="resultPopup "+(win?"win":"lose");
  popup.innerText=msg;
  document.body.appendChild(popup);
  popup.style.display="block";
  setTimeout(()=>popup.remove(),2000);
}

function addHistory(num,color,bigsmall){
  lastResults.unshift({num,color,bigsmall});
  if(lastResults.length>10) lastResults.pop();
  localStorage.setItem("gameHistory",JSON.stringify(lastResults));
  renderHistory();
}

let time=30;
function timerTick(){
  document.getElementById("time").innerText=time;
  time--;
  if(time<0){
    time=30;
    document.getElementById("ball").classList.add("animate");
    let result=Math.floor(Math.random()*10);
    let color=getColor(result);
    let bigsmall=getBigSmall(result);
    setTimeout(()=>{
      let ball=document.getElementById("ball");
      ball.innerText=result;
      ball.style.color=color;
      ball.classList.remove("animate");
    },300);
    addHistory(result,color,bigsmall);

    if(currentBet!=null){
      if(currentBet===result){ balance += betAmount*(result==0?2:result); showResultPopup("You Win ₹"+(betAmount*(result==0?2:result)),true);}
      else if(currentBet===color){ balance+=betAmount*2; showResultPopup("Color Win ₹"+(betAmount*2),true);}
      else if(currentBet===bigsmall.toLowerCase()){ balance+=betAmount*2; showResultPopup("Big/Small Win ₹"+(betAmount*2),true);}
      else{ showResultPopup("You Lose",false);}
      document.getElementById("balance").innerText=balance;
      localStorage.setItem("balance",balance);
      currentBet=null; betAmount=0;
    }
  }
}
setInterval(timerTick,1000);

window.openWallet=function(){ window.location.href="wallet.html"; }
window.openHelp=function(){ window.location.href="help.html"; }
window.logout=function(){ signOut(auth); window.location.href="login.html"; }

</script>
</body>
</html>
