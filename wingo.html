<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN </title>
<style>
:root { 
    --primary: #00f2ff; 
    --secondary: #ff007a; 
    --big-color: #fccf31; 
    --bg: #0b0e14; 
    --card-bg: #161b22; 
    --green: #2ecc71;
    --red: #e74c3c;
    --violet: #9b59b6;
    --glass: rgba(255, 255, 255, 0.05);
}

body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); display: flex; justify-content: center; color: white; }
.app { width: 420px; background: var(--bg); min-height: 100vh; text-align: center; padding-bottom: 110px; overflow-x: hidden; border-left: 1px solid rgba(0, 242, 255, 0.1); border-right: 1px solid rgba(0, 242, 255, 0.1); position: relative; }

/* Header */
.header { background: rgba(22, 27, 34, 0.95); padding: 12px 15px; font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--primary); color: var(--primary); position: sticky; top:0; z-index: 1000; backdrop-filter: blur(10px); box-shadow: 0 0 15px rgba(0,242,255,0.3); }
.header-logo { width: 35px; height: 35px; border-radius: 50%; background: white; border: 2px solid var(--primary); box-shadow: 0 0 10px var(--primary); }

/* Profile Card */
.profile-card { background: linear-gradient(135deg, #1c2333, #0b0e14); margin: 15px 15px 5px 15px; padding: 20px; border-radius: 20px; border: 1px solid rgba(0, 242, 255, 0.2); text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.profile-card p { margin: 0; font-size: 11px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
.profile-card h2 { margin: 5px 0; font-size: 32px; color: var(--primary); text-shadow: 0 0 15px rgba(0,242,255,0.4); }
.uid-box { background: rgba(0, 242, 255, 0.05); padding: 6px 12px; border-radius: 10px; display: inline-flex; align-items: center; gap: 8px; margin-top: 5px; font-size: 12px; border: 1px solid rgba(0, 242, 255, 0.2); cursor: pointer; }

/* REFERRAL BOX */
.refer-container { margin: 10px 15px 20px 15px; padding: 15px; background: var(--glass); border-radius: 15px; border: 1px dashed var(--primary); display: flex; justify-content: space-between; align-items: center; }
.refer-info p { margin: 0; font-size: 10px; color: #8b949e; text-transform: uppercase; }
.refer-info b { font-size: 18px; color: var(--primary); letter-spacing: 1px; }
.copy-btn { background: var(--primary); color: black; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 12px; cursor: pointer; }

/* Timer Section */
.timer-container { background: var(--card-bg); margin: 0 15px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--glass); }
#time { font-size: 28px; color: var(--secondary); font-weight: 900; text-shadow: 0 0 10px var(--secondary); font-family: monospace; }
.lock-msg { color: #ff3e3e; font-size: 12px; font-weight: bold; display: none; animation: blink 0.5s infinite; }
@keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

/* RESULT BOX */
.result-area { margin: 25px auto; width: 90%; }
.centerGame { width: 100%; height: 130px; background: #1a1f29; border-radius: 20px; border: 2px solid var(--primary); box-shadow: 0 0 25px rgba(0, 242, 255, 0.2), inset 0 0 20px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 70px; font-weight: 900; position: relative; transition: 0.5s; overflow: hidden; }
.centerGame.animate { animation: neonGlitch 0.3s infinite; }
@keyframes neonGlitch { 0% { border-color: var(--primary); } 50% { border-color: var(--secondary); } 100% { border-color: var(--primary); } }
.bs-badge { position: absolute; bottom: 12px; right: 20px; padding: 5px 15px; border-radius: 8px; font-size: 16px; font-weight: 900; transform: skew(-15deg) scale(0); transition: 0.4s; }
.bs-badge.show { transform: skew(-15deg) scale(1); }

/* Classic Number Colors */
.numbers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 10px 15px; }
.numbers button { height: 55px; border-radius: 12px; border: none; font-size: 20px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
.ball-0 { background: linear-gradient(135deg, var(--red) 50%, var(--violet) 50%); } 
.ball-5 { background: linear-gradient(135deg, var(--green) 50%, var(--violet) 50%); } 
.ball-odd { background: var(--green); } 
.ball-even { background: var(--red); }

/* Betting Buttons */
.colors, .bigsmall { display: flex; gap: 10px; padding: 10px 15px; }
.colors button, .bigsmall button { flex: 1; padding: 16px; border: none; color: white; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
.green-btn { background: var(--green); }
.red-btn { background: var(--red); }
.violet-btn { background: var(--violet); }
.big { background: var(--big-color); color: black !important; }
.small { background: var(--primary); color: black !important; }

/* History */
.history { margin: 15px; padding: 15px; background: var(--card-bg); border-radius: 15px; text-align: left; }
.historyItem { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
.res-num { width: 34px; height: 34px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; font-weight: bold; }

/* NEW BET POPUP STYLE */
.betPopup { position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: flex-end; justify-content: center; z-index: 3000; }
.betBox { background: #1c2333; padding: 25px 20px; border-top-left-radius: 30px; border-top-right-radius: 30px; width: 420px; border-top: 3px solid var(--primary); animation: slideUp 0.3s ease-out; box-sizing: border-box; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.preset-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
.preset-btns button { padding: 10px; border-radius: 8px; border: 1px solid var(--primary); background: transparent; color: white; cursor: pointer; font-weight: bold; }
.multiplier-btns { display: flex; gap: 10px; margin-bottom: 20px; }
.multiplier-btns button { flex: 1; padding: 8px; border-radius: 5px; border: none; background: #333; color: white; cursor: pointer; }
.betBox input { width: 100%; padding: 12px; background: #0b0e14; border: 1px solid var(--primary); color: var(--primary); font-size: 20px; text-align: center; border-radius: 10px; margin-bottom: 15px; outline: none; }

/* BDG STYLE WIN POPUP */
.result-win-loss { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); z-index: 9999; text-align: center; pointer-events: none; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.result-win-loss.show { transform: translate(-50%, -50%) scale(1); }
.win-content { background: linear-gradient(180deg, #ffde59 0%, #ff914d 100%); padding: 40px; border-radius: 30px; box-shadow: 0 0 50px rgba(255, 222, 89, 0.5); border: 4px solid #fff; }
.win-content h1 { margin: 0; color: #fff; font-size: 40px; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
.win-content .amt { font-size: 30px; font-weight: 900; color: #733d8a; margin: 10px 0; }
.loss-content { background: #2c3e50; padding: 30px 50px; border-radius: 20px; border: 2px solid #95a5a6; }

/* Bottom Nav */
.bottomWallet { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 420px; background: #161b22; border-top: 1px solid var(--primary); display: flex; justify-content: space-around; padding: 15px 0; z-index: 2000; }
.navBtn { display: flex; flex-direction: column; align-items: center; color: #8b949e; cursor: pointer; text-decoration: none; }
.nav-label { font-size: 11px; font-weight: 800; text-transform: uppercase; }

.disabled { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <img src="logo.png" alt="Logo" class="header-logo">
    <span>4449 WIN</span>
  </div>
  
  <div class="profile-card">
    <p>Current Credits</p>
    <h2 id="balance">₹ 0.00</h2>
    <div class="uid-box" onclick="copyUID()">
      <span>ID: <span id="displayUid">...</span></span>
      <span style="color: var(--primary);">📋</span>
    </div>
  </div>

  <div class="refer-container">
    <div class="refer-info">
        <p>Your Referral Code</p>
        <b id="myReferCode">LOADING...</b>
    </div>
    <button class="copy-btn" onclick="copyReferCode()">COPY CODE</button>
  </div>

  <div class="timer-container">
    <div class="timer-label">⏱ <span id="modeName">WINGO 30S</span></div>
    <div>
        <div id="time">00:30</div>
        <div id="lockMsg" class="lock-msg">LOCKING...</div>
    </div>
  </div>
  
  <div class="result-area">
    <div class="centerGame" id="ball">
        <span id="resText">?</span>
        <div id="bsBadge" class="bs-badge">BIG</div>
    </div>
  </div>
  
  <div id="betButtonsArea">
      <div class="colors">
        <button class="green-btn" onclick="selectBet('green')">Green</button>
        <button class="violet-btn" onclick="selectBet('violet')">Violet</button>
        <button class="red-btn" onclick="selectBet('red')">Red</button>
      </div>
      <div class="bigsmall">
        <button class="big" onclick="selectBet('big')">BIG</button>
        <button class="small" onclick="selectBet('small')">SMALL</button>
      </div>

      <div class="numbers">
        <button class="ball-0" onclick="selectBet(0)">0</button>
        <button class="ball-odd" onclick="selectBet(1)">1</button>
        <button class="ball-even" onclick="selectBet(2)">2</button>
        <button class="ball-odd" onclick="selectBet(3)">3</button>
        <button class="ball-even" onclick="selectBet(4)">4</button>
        <button class="ball-5" onclick="selectBet(5)">5</button>
        <button class="ball-even" onclick="selectBet(6)">6</button>
        <button class="ball-odd" onclick="selectBet(7)">7</button>
        <button class="ball-even" onclick="selectBet(8)">8</button>
        <button class="ball-odd" onclick="selectBet(9)">9</button>
      </div>
  </div>
  
  <div class="history">
    <h4 style="margin:0 0 15px 0; color:var(--primary); font-size: 13px; text-transform: uppercase;">Live Game History</h4>
    <div id="historyList"></div>
  </div>
</div>

<div class="bottomWallet">
  <div class="navBtn" onclick="location.href='refer.html'">📢<div class="nav-label">Refer</div></div>
  <div class="navBtn" onclick="location.href='wallet.html'">💳<div class="nav-label">Wallet</div></div>
  <div class="navBtn" onclick="location.href='help.html'">🎧<div class="nav-label">Help</div></div>
  <div class="navBtn" onclick="logout()">🚪<div class="nav-label">Logout</div></div>
</div>

<div class="betPopup" id="betPopup">
  <div class="betBox">
    <h3 id="betTitle" style="color:var(--primary); margin-top:0;">SELECT AMOUNT</h3>
    <input type="number" id="betInput" value="10">
    
    <div class="preset-btns">
        <button onclick="setBetAmt(10)">10</button>
        <button onclick="setBetAmt(50)">50</button>
        <button onclick="setBetAmt(100)">100</button>
        <button onclick="setBetAmt(500)">500</button>
    </div>

    <div class="multiplier-btns">
        <button onclick="multiplyAmt(1)">x1</button>
        <button onclick="multiplyAmt(5)">x5</button>
        <button onclick="multiplyAmt(10)">x10</button>
    </div>

    <div style="display:flex; gap:10px;">
        <button onclick="closeBetPopup()" style="flex:1; padding:15px; border-radius:10px; border:none; background:#333; color:white;">CANCEL</button>
        <button onclick="placeBet()" style="flex:2; padding:15px; border-radius:10px; border:none; background:var(--primary); color:black; font-weight:bold;">CONFIRM BET</button>
    </div>
  </div>
</div>

<div id="winLossPopup" class="result-win-loss"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,doc,getDoc,updateDoc,collection,addDoc,query,orderBy,limit,onSnapshot,serverTimestamp,setDoc,increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain:"win2-512e1.firebaseapp.com", projectId:"win2-512e1" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let balance=0, userId="", currentBet=null, betAmount=0, selectedValue=null, firstBetDone=false;

// --- TIMER & LOCK LOGIC ---
function updateTimer() {
    const seconds = new Date().getSeconds();
    const remaining = 30 - (seconds % 30);
    document.getElementById("time").innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);
    
    const btnArea = document.getElementById("betButtonsArea");
    const lockMsg = document.getElementById("lockMsg");

    if (remaining <= 5) {
        btnArea.classList.add("disabled");
        lockMsg.style.display = "block";
        closeBetPopup();
    } else {
        btnArea.classList.remove("disabled");
        lockMsg.style.display = "none";
    }

    if (remaining === 30) { processResult(); }
}
setInterval(updateTimer, 1000);

// --- BET POPUP HELPERS ---
window.setBetAmt = (a) => { document.getElementById("betInput").value = a; }
window.multiplyAmt = (m) => { 
    let val = parseInt(document.getElementById("betInput").value) || 10;
    document.getElementById("betInput").value = val * m; 
}

// --- REST OF YOUR ORIGINAL FIREBASE LOGIC ---
onAuthStateChanged(auth, user => {
  if(user){
    userId=user.uid;
    document.getElementById("displayUid").innerText = userId.substring(0,12).toUpperCase();
    onSnapshot(doc(db,"users",userId), snap => {
      if(snap.exists()){ 
          const data = snap.data();
          balance=data.balance||0; 
          firstBetDone = data.firstBetDone || false;
          document.getElementById("balance").innerText="₹ " + balance.toFixed(2); 
          document.getElementById("myReferCode").innerText = data.referralCode || user.uid.substring(0,6).toUpperCase();
      }
    });
  }
});

onSnapshot(query(collection(db, "history"), orderBy("createdAt", "desc"), limit(10)), (snap) => {
  let list = document.getElementById("historyList"); list.innerHTML = "";
  snap.forEach(d => {
    let item = d.data();
    let bg = item.num === 0 ? "ball-0" : item.num === 5 ? "ball-5" : (item.color === "green" ? "ball-odd" : "ball-even");
    list.innerHTML += `<div class="historyItem">
        <div><span class="res-num ${bg}">${item.num}</span> <span style="font-size:12px; opacity:0.7; margin-left:5px;">${item.color.toUpperCase()}</span></div>
        <span style="color:${item.bigsmall==='BIG'?'var(--big-color)':'var(--primary)'}; font-weight:900;">${item.bigsmall}</span>
      </div>`;
  });
});

window.selectBet=v=>{ selectedValue=v; document.getElementById("betTitle").innerText="BET ON: "+v.toString().toUpperCase(); document.getElementById("betPopup").style.display="flex"; }
window.closeBetPopup=()=>{ document.getElementById("betPopup").style.display="none"; }

window.placeBet=async()=>{
  let amt=parseInt(document.getElementById("betInput").value);
  if(balance<amt || amt<=0){ alert("Inadequate Credits!"); return; }
  
  balance-=amt; 
  document.getElementById("balance").innerText="₹ "+balance.toFixed(2);
  document.getElementById("betPopup").style.display="none";
  currentBet=selectedValue; 
  betAmount=amt;

  let updateData = { balance: balance };
  if (amt >= 20 && !firstBetDone) { updateData.firstBetDone = true; }
  await updateDoc(doc(db,"users",userId), updateData);
}

async function processResult(){
    let box=document.getElementById("ball"), badge=document.getElementById("bsBadge"), resText=document.getElementById("resText");
    box.classList.add("animate"); badge.classList.remove("show");

    let result;
    try {
        const adminSnap = await getDoc(doc(db, "wingo", "result"));
        if (adminSnap.exists() && adminSnap.data().manual === true) {
            result = adminSnap.data().number;
            await updateDoc(doc(db, "wingo", "result"), { manual: false });
        } else { result = Math.floor(Math.random() * 10); }
    } catch (e) { result = Math.floor(Math.random() * 10); }

    let color = (result===0||result===5)?"violet":([1,3,7,9].includes(result)?"green":"red");
    let bs = result>=5?"BIG":"SMALL";
    
    if(userId) { await addDoc(collection(db, "history"), { num:result, color:color, bigsmall:bs, createdAt:serverTimestamp() }); }
    
    setTimeout(async ()=>{
      box.classList.remove("animate"); resText.innerText = result;
      badge.innerText = bs; badge.className = "bs-badge show";
      badge.style.background = (bs==="BIG" ? "var(--big-color)" : "var(--primary)");
      
      if(currentBet !== null){
        let win = (currentBet===result || currentBet===color || currentBet===bs.toLowerCase());
        if(win) {
          let winAmt = (currentBet===result)?betAmount*9: (currentBet==='violet' && (result===0||result===5)) ? betAmount*4.5 : betAmount*2;
          balance += winAmt;
          await updateDoc(doc(db,"users",userId), {balance:balance});
          showBdgPopup(winAmt, true);
        } else { showBdgPopup(0, false); }
        currentBet=null;
      }
    },1000);
}

function showBdgPopup(amt, isWin) {
    const pop = document.getElementById("winLossPopup");
    if(isWin) {
        pop.innerHTML = `<div class="win-content">
            <h1>CONGRATULATIONS</h1>
            <div style="color:white; margin:10px 0;">Lottery Result: <b style="color:#733d8a;">${amt/betAmount}x</b></div>
            <div class="amt">₹${amt.toFixed(2)}</div>
            <div style="font-size:12px; color:white;">Bonus has been added to wallet</div>
        </div>`;
    } else {
        pop.innerHTML = `<div class="loss-content">
            <h2 style="color:#bdc3c7; margin:0;">SORRY</h2>
            <p style="color:white;">Better luck next time!</p>
        </div>`;
    }
    pop.classList.add("show");
    setTimeout(() => pop.classList.remove("show"), 4000);
}

window.copyUID = () => { navigator.clipboard.writeText(userId); alert("UID Copied!"); }
window.copyReferCode = () => {
    const code = document.getElementById("myReferCode").innerText;
    navigator.clipboard.writeText(code); alert("Code Copied!");
}
window.logout=()=>{ signOut(auth); window.location.href="login.html"; }
</script>
</body>
</html>
