```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN</title>

<style>

body{
margin:0;
font-family:Arial;
background:#9fa3ad;
display:flex;
justify-content:center;
}

.app{
width:420px;
background:white;
min-height:100vh;
text-align:center;
padding-bottom:100px;
}

/* HEADER */

.header{
background:#ff6b6b;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

/* WALLET */

.wallet{
background:#f2f2f2;
margin:15px;
padding:15px;
border-radius:12px;
font-size:18px;
}

/* TIMER */

.timer{
background:#ff6b6b;
color:white;
margin:10px;
padding:10px;
border-radius:10px;
font-size:20px;
font-weight:bold;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

/* RESULT BALL */

.centerGame{
margin:20px auto;
width:120px;
height:120px;
border-radius:50%;
background:#eee;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
font-weight:bold;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* COLOR BET */

.colors{
display:flex;
gap:10px;
padding:10px;
}

.colors button{
flex:1;
padding:12px;
border:none;
color:white;
border-radius:8px;
font-size:16px;
}

.green{background:#2ecc71;}
.red{background:#e74c3c;}
.violet{background:#9b59b6;}

/* BIG SMALL */

.bigSmall{
display:flex;
gap:10px;
padding:10px;
}

.bigSmall button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
color:white;
font-weight:bold;
}

.big{background:#f39c12;}
.small{background:#3498db;}

/* NUMBER BALLS */

.numbers{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:10px;
}

.ball{
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
color:white;
margin:auto;
cursor:pointer;
box-shadow:0 5px 10px rgba(0,0,0,0.3);
}

.ball.green{
background:radial-gradient(circle,#5eff9f,#1fbf5b);
}

.ball.red{
background:radial-gradient(circle,#ff8a8a,#d60000);
}

.ball.violet{
background:radial-gradient(circle,#d48bff,#7b00ff);
}

/* HISTORY */

.history{
margin:15px;
text-align:left;
}

.historyItem{
background:#eee;
margin-bottom:6px;
padding:8px;
border-radius:6px;
}

/* BOTTOM NAV */

.bottomWallet{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:360px;
background:white;
border-radius:25px;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.25);
}

.navBtn{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
}

.icon{
width:48px;
height:48px;
border-radius:50%;
background:#ff6b6b;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:white;
}

.label{
font-size:13px;
margin-top:4px;
font-weight:bold;
}

/* BET POPUP */

.betPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.betBox{
position:relative;
background:white;
padding:25px;
border-radius:18px;
width:260px;
text-align:center;
}

.betBox input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
text-align:center;
margin-top:10px;
}

.betBtn{
margin-top:15px;
padding:12px;
background:#ff6b6b;
color:white;
border:none;
width:100%;
border-radius:10px;
font-size:16px;
}

.closeBtn{
position:absolute;
top:10px;
right:10px;
background:#ff6b6b;
color:white;
border:none;
border-radius:50%;
width:28px;
height:28px;
}

/* RESULT POPUP */

.resultPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border-radius:20px;
padding:25px 35px;
text-align:center;
font-size:18px;
font-weight:bold;
color:white;
display:none;
z-index:9999;
}

.resultPopup.win{
background:#2ecc71;
}

.resultPopup.lose{
background:#e74c3c;
}

</style>
</head>

<body>

<div class="app">

<div class="header">4449 WIN</div>

<div class="wallet">
Balance ₹ <span id="balance">0</span>
</div>

<div class="timer">
Next Result In <span id="time">30</span>s
</div>

<div class="centerGame" id="ball">?</div>

<div class="colors">
<button class="green" onclick="selectBet('green')">Green</button>
<button class="violet" onclick="selectBet('violet')">Violet</button>
<button class="red" onclick="selectBet('red')">Red</button>
</div>

<div class="bigSmall">
<button class="big" onclick="selectBet('big')">BIG</button>
<button class="small" onclick="selectBet('small')">SMALL</button>
</div>

<div class="numbers">

<div class="ball violet" onclick="selectBet(0)">0</div>
<div class="ball green" onclick="selectBet(1)">1</div>
<div class="ball red" onclick="selectBet(2)">2</div>
<div class="ball green" onclick="selectBet(3)">3</div>
<div class="ball red" onclick="selectBet(4)">4</div>

<div class="ball violet" onclick="selectBet(5)">5</div>
<div class="ball red" onclick="selectBet(6)">6</div>
<div class="ball green" onclick="selectBet(7)">7</div>
<div class="ball red" onclick="selectBet(8)">8</div>
<div class="ball green" onclick="selectBet(9)">9</div>

</div>

<div class="history">
<h3>Last Results</h3>
<div id="historyList"></div>
</div>

</div>

<div class="bottomWallet">

<div class="navBtn" onclick="openWallet()">
<div class="icon">💳</div>
<div class="label">Wallet</div>
</div>

<div class="navBtn" onclick="openHelp()">
<div class="icon">🎧</div>
<div class="label">Help</div>
</div>

<div class="navBtn" onclick="logout()">
<div class="icon">🚪</div>
<div class="label">Logout</div>
</div>

</div>

<div class="betPopup" id="betPopup">
<div class="betBox">

<button class="closeBtn" onclick="closeBetPopup()">✖</button>

<h3>Enter Bet Amount</h3>

<input type="number" id="betInput" placeholder="Amount">

<button class="betBtn" onclick="placeBet()">Place Bet</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth,onAuthStateChanged,signOut} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {getFirestore,doc,getDoc,updateDoc} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A",
authDomain: "win2-512e1.firebaseapp.com",
projectId: "win2-512e1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let balance=0;
let userId="";
let currentBet=null;
let betAmount=0;
let selectedValue=null;

let startTime=localStorage.getItem("startTime");

if(!startTime){
startTime=Date.now();
localStorage.setItem("startTime",startTime);
}

onAuthStateChanged(auth, async (user)=>{

if(user){

userId=user.uid;

let ref=doc(db,"users",userId);
let snap=await getDoc(ref);

if(snap.exists()){

balance=snap.data().balance || 0;
document.getElementById("balance").innerText=balance;

}

}

});

function getColor(n){

if(n==0 || n==5) return "violet";

if(n==1 || n==3 || n==7 || n==9)
return "green";

if(n==2 || n==4 || n==6 || n==8)
return "red";

}

window.selectBet=function(v){

selectedValue=v;
document.getElementById("betPopup").style.display="flex";

}

window.closeBetPopup=function(){

document.getElementById("betPopup").style.display="none";

}

window.placeBet=function(){

let amt=parseInt(document.getElementById("betInput").value);

if(balance<amt){
alert("Low Balance");
return;
}

balance-=amt;
document.getElementById("balance").innerText=balance;

currentBet=selectedValue;
betAmount=amt;

document.getElementById("betPopup").style.display="none";

}

function saveHistory(num,color){

let history=JSON.parse(localStorage.getItem("history")||"[]");

history.unshift({num,color});

history=history.slice(0,10);

localStorage.setItem("history",JSON.stringify(history));

renderHistory();

}

function renderHistory(){

let history=JSON.parse(localStorage.getItem("history")||"[]");

let list=document.getElementById("historyList");

list.innerHTML="";

history.forEach(h=>{

let div=document.createElement("div");
div.className="historyItem";
div.innerHTML="Result: "+h.num+" ("+h.color+")";

list.appendChild(div);

});

}

renderHistory();

function showResultPopup(message,isWin){

let popup=document.createElement("div");

popup.className="resultPopup "+(isWin?"win":"lose");

popup.innerText=message;

document.body.appendChild(popup);

popup.style.display="block";

setTimeout(()=>{popup.remove()},2000);

}

setInterval(async ()=>{

let passed=Math.floor((Date.now()-startTime)/1000);

let time=30-(passed%30);

document.getElementById("time").innerText=time;

if(time==30){

let resultDoc=await getDoc(doc(db,"wingo","result"));
let result=resultDoc.data().number;

let color=getColor(result);

document.getElementById("ball").innerText=result;

saveHistory(result,color);

if(currentBet!=null){

if(currentBet===result){

let winAmount=betAmount*(result==0?2:result);

balance+=winAmount;

showResultPopup("You Win ₹"+winAmount,true);

}

else if(currentBet===color){

balance+=betAmount*2;

showResultPopup("Color Win ₹"+betAmount*2,true);

}

else if(currentBet==="big" && result>=5){

balance+=betAmount*2;

showResultPopup("Big Win ₹"+betAmount*2,true);

}

else if(currentBet==="small" && result<=4){

balance+=betAmount*2;

showResultPopup("Small Win ₹"+betAmount*2,true);

}

else{

showResultPopup("You Lose",false);

}

document.getElementById("balance").innerText=balance;

await updateDoc(doc(db,"users",userId),{
balance:balance
});

currentBet=null;
betAmount=0;

}

}

},1000);

window.openWallet=function(){
window.location.href="wallet.html";
}

window.openHelp=function(){
window.location.href="help.html";
}

window.logout=function(){
signOut(auth);
window.location.href="login.html";
}

</script>

</body>
</html>
```
