<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN </title>
<style>
:root { --primary: #00f2ff; --secondary: #ff007a; --big-color: #fccf31; --bg: #0b0e14; --card-bg: #161b22; --green: #2ecc71; --red: #e74c3c; --violet: #9b59b6; --glass: rgba(255, 255, 255, 0.05); }
body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); display: flex; justify-content: center; color: white; }
.app { width: 420px; background: var(--bg); min-height: 100vh; text-align: center; padding-bottom: 110px; overflow-x: hidden; border-left: 1px solid rgba(0, 242, 255, 0.1); border-right: 1px solid rgba(0, 242, 255, 0.1); position: relative; }
.header { background: rgba(22, 27, 34, 0.95); padding: 12px 15px; font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--primary); }
.logo-top { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); }

.box { background: var(--card-bg); margin: 15px; padding: 20px; border-radius: 20px; border: 1px solid var(--glass); box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
.box::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--primary), var(--secondary)); }

.timer-section { display: flex; justify-content: space-between; align-items: center; margin: 15px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid var(--glass); }
#time { font-size: 32px; font-weight: 900; color: var(--primary); font-variant-numeric: tabular-nums; text-shadow: 0 0 15px rgba(0,242,255,0.4); }

.ball-container { position: relative; height: 120px; display: flex; justify-content: center; align-items: center; margin: 20px 0; }
.ball { width: 90px; height: 90px; background: radial-gradient(circle at 30% 30%, #333, #000); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 45px; font-weight: 900; color: white; border: 4px solid var(--glass); box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 -10px 20px rgba(0,0,0,0.5); transition: 0.5s; }
.ball.animate { animation: bounce 0.6s infinite alternate; filter: blur(2px); }
@keyframes bounce { from { transform: translateY(0) scale(1.05); } to { transform: translateY(-30px) scale(0.95); } }

.bs-badge { position: absolute; bottom: -5px; background: var(--primary); color: black; padding: 4px 15px; border-radius: 50px; font-weight: 900; font-size: 12px; transform: scale(0); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.bs-badge.show { transform: scale(1); }

.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; }
.num-btn { aspect-ratio: 1; border-radius: 15px; border: 1px solid var(--glass); font-size: 20px; font-weight: 900; cursor: pointer; display: flex; justify-content: center; align-items: center; color: white; transition: 0.2s; background: rgba(255,255,255,0.05); }
.num-btn:active { transform: scale(0.9); }
.num-btn.green { background: linear-gradient(135deg, #2ecc71, #27ae60); box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3); }
.num-btn.red { background: linear-gradient(135deg, #e74c3c, #c0392b); box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3); }
.num-btn.violet { background: linear-gradient(135deg, #9b59b6, #8e44ad); box-shadow: 0 5px 15px rgba(155, 89, 182, 0.3); }

.bs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px; }
.bs-btn { padding: 15px; border-radius: 15px; font-weight: 900; font-size: 18px; cursor: pointer; border: none; letter-spacing: 2px; transition: 0.3s; }
.big { background: var(--big-color); color: black; box-shadow: 0 5px 15px rgba(252, 207, 49, 0.3); }
.small { background: var(--primary); color: black; box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3); }

.history-card { background: var(--card-bg); margin: 15px; border-radius: 20px; border: 1px solid var(--glass); overflow: hidden; }
.history-header { padding: 15px; background: rgba(255,255,255,0.02); font-weight: bold; border-bottom: 1px solid var(--glass); color: var(--primary); }
table { width: 100%; border-collapse: collapse; }
th { font-size: 11px; opacity: 0.5; padding: 12px; text-transform: uppercase; }
td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); }
.dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

.bet-modal { position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%); width: 420px; background: #1c2333; border-radius: 30px 30px 0 0; z-index: 2000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 25px; box-sizing: border-box; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); border-top: 2px solid var(--primary); }
.bet-modal.active { bottom: 0; }
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; display: none; backdrop-filter: blur(5px); }
.overlay.active { display: block; }

.amt-input { width: 100%; padding: 15px; background: #0b0e14; border: 1px solid var(--primary); border-radius: 15px; color: white; font-size: 20px; font-weight: bold; text-align: center; margin: 15px 0; outline: none; box-shadow: inset 0 0 10px rgba(0,242,255,0.1); }
.confirm-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--primary); color: black; font-weight: 900; font-size: 18px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,242,255,0.3); }

/* Win Loss Popup */
.win-loss-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); width: 320px; background: #1c2333; border-radius: 25px; z-index: 5000; padding: 30px; display: none; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,1); border: 2px solid var(--glass); transition: 0.3s; }
.win-loss-popup.show { display: block; transform: translate(-50%, -50%) scale(1); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes popIn { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

.win-title { color: #fccf31; font-size: 32px; font-weight: 900; margin-bottom: 10px; text-shadow: 0 0 20px rgba(252,207,49,0.5); }
.loss-title { color: #ff4757; font-size: 32px; font-weight: 900; margin-bottom: 10px; }
.pill-group { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
.pill { padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: 900; color: black; }

.bottom-nav { position: fixed; bottom: 0; width: 420px; background: rgba(22, 27, 34, 0.98); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--glass); backdrop-filter: blur(10px); z-index: 1000; }
.nav-item { color: #8b949e; text-decoration: none; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 5px; opacity: 0.6; transition: 0.3s; }
.nav-item.active { color: var(--primary); opacity: 1; }
.nav-item img { width: 22px; height: 22px; }

/* USER INFO STYLE */
.user-info { display: flex; flex-direction: column; align-items: flex-start; }
.uid-text { font-size: 10px; opacity: 0.5; margin-top: 2px; }
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="bet-modal" id="betModal">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 id="betTitle" style="margin:0; color:var(--primary);">BET ON GREEN</h3>
        <span onclick="closeBet()" style="cursor:pointer; font-size:24px; opacity:0.5;">&times;</span>
    </div>
    <div style="margin-top:20px;">
        <p style="font-size:12px; opacity:0.6; margin:0;">SELECT AMOUNT</p>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="num-btn" style="flex:1; aspect-ratio:unset; padding:10px;" onclick="setAmt(10)">10</button>
            <button class="num-btn" style="flex:1; aspect-ratio:unset; padding:10px;" onclick="setAmt(50)">50</button>
            <button class="num-btn" style="flex:1; aspect-ratio:unset; padding:10px;" onclick="setAmt(100)">100</button>
            <button class="num-btn" style="flex:1; aspect-ratio:unset; padding:10px;" onclick="setAmt(500)">500</button>
        </div>
        <input type="number" id="betAmt" class="amt-input" value="10">
        <button class="confirm-btn" onclick="placeBet()">CONFIRM BET</button>
    </div>
</div>

<div class="win-loss-popup" id="winLossPopup">
    <div id="winContainer" style="display:none;">
        <div class="win-title">CONGRATS!</div>
        <div style="font-size:14px; opacity:0.8;">You Won</div>
        <div id="popWinAmt" style="font-size:40px; font-weight:900; color:var(--big-color); margin:10px 0;">₹0.00</div>
    </div>
    <div id="lossContainer" style="display:none;">
        <div class="loss-title">BET LOST</div>
        <div style="font-size:14px; opacity:0.8;">Better luck next time!</div>
    </div>
    <div class="pill-group">
        <span class="pill" id="popNumPill">0</span>
        <span class="pill" id="popColorPill">RED</span>
        <span class="pill" id="popBsPill">SMALL</span>
    </div>
    <button class="confirm-btn" style="padding:10px; margin-top:10px;" onclick="closeWinLossPopup()">CLOSE</button>
</div>

<div class="app">
    <div class="header">
        <img src="logo.png" class="logo-top">
        <div class="user-info">
            <span>4449 WIN</span>
            <span class="uid-text" id="userUID">Loading...</span>
        </div>
    </div>

    <div class="box" style="margin-top:20px; text-align:left;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <span style="font-size:12px; opacity:0.6; letter-spacing:1px;">TOTAL BALANCE</span>
                <div style="font-size:28px; font-weight:900; color:var(--primary); margin-top:5px;">₹ <span id="balance">0.00</span></div>
            </div>
            <button class="num-btn" style="width:40px; height:40px; border-radius:50%;" onclick="location.reload()">↻</button>
        </div>
    </div>

    <div class="timer-section">
        <div style="text-align:left;">
            <div style="font-size:10px; opacity:0.5; margin-bottom:3px;">PERIOD ID</div>
            <div id="period" style="font-weight:bold; letter-spacing:1px;">20240505123</div>
        </div>
        <div id="time">00:30</div>
    </div>

    <div class="ball-container">
        <div class="ball" id="ball">?</div>
        <div class="bs-badge" id="bsBadge">BIG</div>
    </div>

    <div class="grid">
        <button class="num-btn violet" onclick="openBet('0','violet')">0</button>
        <button class="num-btn green" onclick="openBet('1','green')">1</button>
        <button class="num-btn red" onclick="openBet('2','red')">2</button>
        <button class="num-btn green" onclick="openBet('3','green')">3</button>
        <button class="num-btn red" onclick="openBet('4','red')">4</button>
        <button class="num-btn violet" onclick="openBet('5','violet')">5</button>
        <button class="num-btn red" onclick="openBet('6','red')">6</button>
        <button class="num-btn green" onclick="openBet('7','green')">7</button>
        <button class="num-btn red" onclick="openBet('8','red')">8</button>
        <button class="num-btn green" onclick="openBet('9','green')">9</button>
    </div>

    <div class="bs-grid">
        <button class="bs-btn big" onclick="openBet('big','big')">BIG</button>
        <button class="bs-btn small" onclick="openBet('small','small')">SMALL</button>
    </div>

    <div class="history-card">
        <div class="history-header">PERIOD HISTORY</div>
        <table>
            <thead><tr><th>Period</th><th>Number</th><th>Size</th><th>Color</th></tr></thead>
            <tbody id="history"></tbody>
        </table>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><img src="home.png">HOME</a>
        <a href="wingo.html" class="nav-item active"><img src="wingo.png">WINGO</a>
        <a href="wallet.html" class="nav-item"><img src="wallet.png">WALLET</a>
        <a href="profile.html" class="nav-item"><img src="profile.png">ACCOUNT</a>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain: "win2-512e1.firebaseapp.com", projectId: "win2-512e1" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId = "";
let balance = 0;
let currentBetChoice = "";
let activeBets = [];
let autoCloseTimer;

onAuthStateChanged(auth, async (user) => {
    if(user){
        userId = user.uid;
        document.getElementById("userUID").innerText = "UID: " + userId;
        const ref = doc(db, "users", userId);
        onSnapshot(ref, (snap) => {
            if(snap.exists()){
                balance = snap.data().balance || 0;
                document.getElementById("balance").innerText = balance.toFixed(2);
            }
        });
    } else { window.location = "login.html"; }
});

// Timer Logic
setInterval(() => {
    let now = new Date();
    let sec = now.getSeconds();
    let rem = 60 - sec;
    document.getElementById("time").innerText = "00:" + (rem < 10 ? "0" + rem : rem);
    
    let pid = now.getFullYear().toString() + (now.getMonth()+1).toString().padStart(2,'0') + now.getDate().toString().padStart(2,'0') + (now.getHours()*60 + now.getMinutes()).toString().padStart(3,'0');
    document.getElementById("period").innerText = pid;

    if(rem === 59) processResult();
    if(rem <= 5) { closeBet(); document.getElementById("betModal").style.pointerEvents = "none"; document.getElementById("betModal").style.opacity = "0.5"; }
    else { document.getElementById("betModal").style.pointerEvents = "all"; document.getElementById("betModal").style.opacity = "1"; }
}, 1000);

window.openBet = (choice, color) => {
    currentBetChoice = choice;
    document.getElementById("betTitle").innerText = "BET ON " + choice.toUpperCase();
    document.getElementById("betTitle").style.color = (color === 'green' ? 'var(--green)' : (color === 'red' ? 'var(--red)' : (color === 'violet' ? 'var(--violet)' : 'var(--primary)')));
    document.getElementById("betModal").classList.add("active");
    document.getElementById("overlay").classList.add("active");
};

window.closeBet = () => {
    document.getElementById("betModal").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
};

window.setAmt = (a) => { document.getElementById("betAmt").value = a; };

window.placeBet = async () => {
    let amt = parseInt(document.getElementById("betAmt").value);
    if(amt > balance) return alert("Insufficient Balance");
    if(amt < 1) return alert("Min bet ₹1");

    try {
        balance -= amt;
        await updateDoc(doc(db, "users", userId), { balance: balance });
        
        let betObj = { choice: currentBetChoice, amount: amt, time: Date.now(), user: userId };
        activeBets.push(betObj);
        await addDoc(collection(db, "bets"), betObj);
        
        closeBet();
        alert("Bet Placed: ₹" + amt);
    } catch(e) { alert("Error placing bet"); }
};

// --- UPDATED RESULT PROCESSING FOR WINNING BALANCE ---
async function processResult(){
    let box = document.getElementById("ball"), badge = document.getElementById("bsBadge"), resText = document.getElementById("ball");
    box.classList.add("animate");
    badge.classList.remove("show");
    
    let result;
    try {
        const adminSnap = await getDoc(doc(db, "wingo", "result"));
        if (adminSnap.exists() && adminSnap.data().manual === true) {
            result = adminSnap.data().number;
            await updateDoc(doc(db, "wingo", "result"), { manual: false });
        } else {
            result = Math.floor(Math.random() * 10);
        }
    } catch (e) { result = Math.floor(Math.random() * 10); }

    let color = (result === 0 || result === 5) ? "violet" : ([1, 3, 7, 9].includes(result) ? "green" : "red");
    let bs = result >= 5 ? "BIG" : "SMALL";
    
    await addDoc(collection(db, "history"), { num: result, color: color, bigsmall: bs, createdAt: serverTimestamp() });
    
    setTimeout(async () => {
        box.classList.remove("animate");
        resText.innerText = result;
        badge.innerText = bs;
        badge.className = "bs-badge show";
        badge.style.background = (bs === "BIG" ? "var(--big-color)" : "var(--primary)");
        
        if(activeBets.length > 0){
            let totalWinAmount = 0;
            let wonAnyBet = false;

            activeBets.forEach(bet => {
                let choice = bet.choice;
                let isWin = false;
                let multiplier = 2;

                if(!isNaN(choice)) { // Number bet
                    if(parseInt(choice) === result) { isWin = true; multiplier = 9; }
                } else if(choice === 'big' || choice === 'small') { // Size bet
                    if(choice.toUpperCase() === bs) { isWin = true; multiplier = 2; }
                } else { // Color bet
                    if(choice === color) { isWin = true; multiplier = 2; }
                }

                if(isWin) {
                    wonAnyBet = true;
                    totalWinAmount += (bet.amount * multiplier);
                }
            });

            if(wonAnyBet) {
                // Winning Paisa 'balance' aur 'winning' dono mein jayega
                const userRef = doc(db, "users", userId);
                const userSnap = await getDoc(userRef);
                if(userSnap.exists()){
                    let currentWinBalance = userSnap.data().winning || 0;
                    let currentTotalBalance = userSnap.data().balance || 0;
                    
                    await updateDoc(userRef, {
                        balance: currentTotalBalance + totalWinAmount,
                        winning: currentWinBalance + totalWinAmount
                    });
                    showUpgradedPopup(totalWinAmount, true, result, color, bs);
                }
            } else {
                showUpgradedPopup(0, false, result, color, bs);
            }
            activeBets = [];
        }
    }, 1000);
}

function showUpgradedPopup(amt, isWin, result, color, bs) {
    let pop = document.getElementById("winLossPopup");
    let winCont = document.getElementById("winContainer");
    let lossCont = document.getElementById("lossContainer");
    
    winCont.style.display = "none";
    lossCont.style.display = "none";

    if(isWin) {
        document.getElementById("popWinAmt").innerText = "₹" + amt.toFixed(2);
        winCont.style.display = "block";
    } else {
        lossCont.style.display = "block";
    }

    document.getElementById("popNumPill").innerText = result;
    document.getElementById("popNumPill").style.background = (result===0||result===5)?'var(--violet)':([1,3,7,9].includes(result)?'var(--green)':'var(--red)');
    document.getElementById("popColorPill").innerText = color.toUpperCase();
    document.getElementById("popColorPill").style.background = `var(--${color})`;
    document.getElementById("popBsPill").innerText = bs;
    document.getElementById("popBsPill").style.background = (bs==='BIG'?'var(--big-color)':'var(--primary)');
    
    pop.classList.add("show");
    autoCloseTimer = setTimeout(closeWinLossPopup, 5000);
}

window.closeWinLossPopup = () => {
    document.getElementById("winLossPopup").classList.remove("show");
    if(autoCloseTimer) clearTimeout(autoCloseTimer);
};

// History Loader
onSnapshot(query(collection(db, "history"), orderBy("createdAt", "desc"), limit(10)), (snap) => {
    const list = document.getElementById("history");
    list.innerHTML = "";
    snap.forEach(d => {
        let h = d.data();
        list.innerHTML += `<tr>
            <td><small>${d.id.substring(0,6)}</small></td>
            <td style="font-weight:900;">${h.num}</td>
            <td style="font-size:10px;">${h.bigsmall}</td>
            <td><span class="dot" style="background:var(--${h.color})"></span></td>
        </tr>`;
    });
});
</script>
</body>
</html>
