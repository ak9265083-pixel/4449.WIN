<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN </title>
<style>
:root { 
    --primary: #00f2ff; /* Neon Cyan */
    --secondary: #ff007a; /* Neon Pink */
    --big-color: #fccf31; /* Neon Yellow/Gold */
    --small-color: #00f2ff; 
    --bg: #0b0e14; /* Deep Dark */
    --card-bg: #161b22; 
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    color: white;
}

.app {
    width: 420px;
    background: var(--bg);
    min-height: 100vh;
    text-align: center;
    padding-bottom: 90px;
    overflow-x: hidden;
    border-left: 1px solid rgba(0, 242, 255, 0.1);
    border-right: 1px solid rgba(0, 242, 255, 0.1);
}

/* Header */
.header {
    background: rgba(22, 27, 34, 0.9);
    backdrop-filter: blur(10px);
    color: var(--primary);
    padding: 12px 15px;
    font-size: 20px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--primary);
    text-shadow: 0 0 10px var(--primary);
}

.header-logo {
    width: 35px; height: 35px;
    border-radius: 50%;
    background: white;
    object-fit: cover;
    border: 2px solid var(--primary);
    box-shadow: 0 0 10px var(--primary);
}

/* Profile Card */
.profile-card {
    background: linear-gradient(135deg, #1c2333, #0b0e14);
    margin: 15px; padding: 20px;
    border-radius: 20px;
    border: 1px solid rgba(0, 242, 255, 0.2);
    box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
    text-align: left;
}
.profile-card h2 { margin: 0; font-size: 32px; color: var(--primary); text-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }
.profile-card p { margin: 0; opacity: 0.6; font-size: 11px; text-transform: uppercase; }

.uid-box {
    background: rgba(0, 242, 255, 0.05);
    padding: 6px 15px;
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 15px;
    cursor: pointer;
    font-size: 12px;
    border: 1px solid rgba(0, 242, 255, 0.2);
}

/* Timer */
.timer-container {
    background: var(--card-bg);
    margin: 0 15px; padding: 15px;
    border-radius: 15px;
    display: flex; justify-content: space-between; align-items: center;
    border: 1px solid rgba(255, 255, 255, 0.05);
}
#time { font-size: 26px; color: var(--secondary); font-weight: 900; text-shadow: 0 0 10px var(--secondary); }

/* RECTANGULAR RESULT BOX */
.result-area {
    margin: 25px auto;
    width: 90%;
}

.centerGame {
    width: 100%;
    height: 120px;
    background: #1a1f29;
    border-radius: 15px;
    border: 2px solid var(--primary);
    box-shadow: 0 0 20px rgba(0, 242, 255, 0.2), inset 0 0 15px rgba(0, 242, 255, 0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 65px;
    font-weight: 900;
    color: white;
    position: relative;
    transition: 0.5s;
    overflow: hidden;
}

/* Glow animation when result comes */
.centerGame.animate {
    animation: neonGlitch 0.3s infinite;
}

@keyframes neonGlitch {
    0% { border-color: var(--primary); box-shadow: 0 0 20px var(--primary); }
    50% { border-color: var(--secondary); box-shadow: 0 0 20px var(--secondary); }
    100% { border-color: var(--primary); box-shadow: 0 0 20px var(--primary); }
}

.bs-badge {
    position: absolute;
    bottom: 10px;
    right: 15px;
    padding: 4px 15px;
    border-radius: 5px;
    font-size: 14px;
    font-weight: 900;
    transform: skew(-15deg) scale(0);
    transition: 0.4s;
}
.bs-badge.show { transform: skew(-15deg) scale(1); }

/* Betting Buttons */
.colors, .bigsmall { display: flex; gap: 10px; padding: 10px 15px; }
.colors button, .bigsmall button {
    flex: 1; padding: 15px; border: none; color: white; border-radius: 12px;
    font-weight: 900; cursor: pointer; transition: 0.3s;
    text-transform: uppercase;
}

.green { background: #00c853; box-shadow: 0 0 10px rgba(0, 200, 83, 0.3); }
.red { background: #ff3547; box-shadow: 0 0 10px rgba(255, 53, 71, 0.3); }
.violet { background: #aa66cc; box-shadow: 0 0 10px rgba(170, 102, 204, 0.3); }

.big { background: linear-gradient(45deg, #fccf31, #f55555); color: black !important; }
.small { background: linear-gradient(45deg, #38f9d7, #43e97b); color: black !important; }

.numbers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 10px 15px; }
.numbers button {
    height: 55px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
    background: var(--card-bg); color: white; font-size: 18px; font-weight: bold;
}

/* History */
.history { margin: 15px; padding: 15px; background: var(--card-bg); border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
.historyItem { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
.res-num { width: 32px; height: 32px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; color: white; font-weight: bold; }

/* Navigation */
.bottomWallet {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 420px; background: #161b22; border-top: 1px solid var(--primary);
    display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000;
}
.navBtn { color: #8b949e; cursor: pointer; font-size: 11px; font-weight: bold; text-align: center; }

/* Popup */
.betPopup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); }
.betBox { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 300px; border: 1px solid var(--primary); }
.betBox input { width: 100%; padding: 15px; background: #0b0e14; border: 1px solid var(--primary); color: var(--primary); font-size: 20px; text-align: center; margin-bottom: 15px; border-radius: 10px; }

.resultPopup { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0); padding: 40px; border-radius: 20px; font-weight: 900; z-index: 9999; animation: popupBounce 0.5s forwards; }
.resultPopup.win { background: var(--primary); color: black; box-shadow: 0 0 50px var(--primary); }
.resultPopup.lose { background: #333; color: white; }

@keyframes popupBounce { 0% { transform: translate(-50%,-50%) scale(0); } 100% { transform: translate(-50%,-50%) scale(1); } }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <img src="logo.png" alt="Logo" class="header-logo">
    <span>4449 WIN <small style="font-size: 10px; vertical-align: middle;">NEON</small></span>
  </div>
  
  <div class="profile-card">
    <p>Available Balance</p>
    <h2 id="balance">₹ 0.00</h2>
    <div class="uid-box" onclick="copyUID()">
      <span>ID: <span id="displayUid">Loading...</span></span>
      <span style="color: var(--primary);">📋</span>
    </div>
  </div>

  <div class="timer-container">
    <div style="color: #8b949e; font-weight: bold;">⏱ WINGO 30S</div>
    <div id="time">00:30</div>
  </div>
  
  <div class="result-area">
    <div class="centerGame" id="ball">
        <span id="resText">?</span>
        <div id="bsBadge" class="bs-badge" style="background: var(--big-color); color: black;">BIG</div>
    </div>
  </div>
  
  <div class="colors">
    <button class="green" onclick="selectBet('green')">Green</button>
    <button class="violet" onclick="selectBet('violet')">Violet</button>
    <button class="red" onclick="selectBet('red')">Red</button>
  </div>
  <div class="bigsmall">
    <button class="big" onclick="selectBet('big')">BIG</button>
    <button class="small" onclick="selectBet('small')">SMALL</button>
  </div>

  <div class="numbers">
    <button class="ball-0" onclick="selectBet(0)">0</button>
    <button class="ball-odd" onclick="selectBet(1)">1</button>
    <button class="ball-even" onclick="selectBet(2)">2</button>
    <button class="ball-odd" onclick="selectBet(3)">3</button>
    <button class="ball-even" onclick="selectBet(4)">4</button>
    <button class="ball-5" onclick="selectBet(5)">5</button>
    <button class="ball-even" onclick="selectBet(6)">6</button>
    <button class="ball-odd" onclick="selectBet(7)">7</button>
    <button class="ball-even" onclick="selectBet(8)">8</button>
    <button class="ball-odd" onclick="selectBet(9)">9</button>
  </div>
  
  <div class="history">
    <h4 style="margin:0 0 10px 0; color:var(--primary); font-size: 12px; text-transform: uppercase; text-align: left;">Recent Logs</h4>
    <div id="historyList"></div>
  </div>
</div>

<div class="bottomWallet">
  <div class="navBtn" onclick="location.reload()">HOME</div>
  <div class="navBtn" onclick="location.href='wallet.html'">WALLET</div>
  <div class="navBtn" onclick="location.href='help.html'">SUPPORT</div>
  <div class="navBtn" onclick="logout()">LOGOUT</div>
</div>

<div class="betPopup" id="betPopup">
  <div class="betBox">
    <h3 id="betTitle" style="margin:0 0 15px 0; color:var(--primary);">Bet on </h3>
    <input type="number" id="betInput" placeholder="Enter amount">
    <div style="display:flex; gap:10px;">
        <button class="betBtn" style="background:#333; color:white; border:none; flex:1; border-radius:10px;" onclick="closeBetPopup()">Cancel</button>
        <button class="betBtn" style="background:var(--primary); color:black; border:none; flex:1; border-radius:10px; font-weight:bold;" onclick="placeBet()">Confirm</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,doc,getDoc,updateDoc,collection,addDoc,query,orderBy,limit,onSnapshot,serverTimestamp,setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain:"win2-512e1.firebaseapp.com", projectId:"win2-512e1" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let balance=0, userId="", currentBet=null, betAmount=0, selectedValue=null;

window.copyUID = () => {
    navigator.clipboard.writeText(userId);
    alert("Copied to CyberDeck!");
}

function updateTimer() {
    const now = new Date();
    const seconds = now.getSeconds();
    const remaining = 30 - (seconds % 30);
    document.getElementById("time").innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);
    if (remaining === 30) { processResult(); }
}
setInterval(updateTimer, 1000);

onAuthStateChanged(auth, user => {
  if(user){
    userId=user.uid;
    document.getElementById("displayUid").innerText = userId.substring(0,12).toUpperCase();
    getDoc(doc(db,"users",userId)).then(snap => {
      if(snap.exists()){ balance=snap.data().balance||0; document.getElementById("balance").innerText="₹ " + balance.toFixed(2); }
    });
  }
});

onSnapshot(query(collection(db, "history"), orderBy("createdAt", "desc"), limit(10)), (snap) => {
  let list = document.getElementById("historyList"); list.innerHTML = "";
  snap.forEach(d => {
    let item = d.data();
    let bg = item.num === 0 ? "ball-0" : item.num === 5 ? "ball-5" : (item.color === "green" ? "ball-odd" : "ball-even");
    let bsCol = item.bigsmall === "BIG" ? "var(--big-color)" : "var(--primary)";
    list.innerHTML += `
      <div class="historyItem">
        <div><span class="res-num ${bg}">${item.num}</span> <span style="font-size:12px; opacity:0.7">${item.color.toUpperCase()}</span></div>
        <span style="color:${bsCol}; font-weight:900; font-size:12px;">${item.bigsmall}</span>
      </div>`;
  });
});

window.selectBet=v=>{ 
    selectedValue=v; 
    document.getElementById("betTitle").innerText = "BET ON: " + v.toString().toUpperCase();
    document.getElementById("betPopup").style.display="flex"; 
}
window.closeBetPopup=()=>{ document.getElementById("betPopup").style.display="none"; }

window.placeBet=async()=>{
  let amt=parseInt(document.getElementById("betInput").value);
  if(balance<amt || amt<=0){ alert("CRITICAL: Low Credits!"); return; }
  balance-=amt; 
  document.getElementById("balance").innerText="₹ " + balance.toFixed(2);
  document.getElementById("betPopup").style.display="none";
  currentBet=selectedValue; betAmount=amt;
  await updateDoc(doc(db,"users",userId), {balance:balance});
}

async function processResult(){
    let box=document.getElementById("ball");
    let badge=document.getElementById("bsBadge");
    let resText=document.getElementById("resText");
    
    box.classList.add("animate");
    badge.classList.remove("show");

    let result;
    try {
      const adminDoc = await getDoc(doc(db, "wingo", "result"));
      if (adminDoc.exists() && adminDoc.data().number !== null) {
          result = adminDoc.data().number;
          await setDoc(doc(db, "wingo", "result"), { number: null, time: Date.now() });
      } else { result = Math.floor(Math.random() * 10); }
    } catch(e) { result = Math.floor(Math.random() * 10); }

    let color = (result===0||result===5)?"violet":([1,3,7,9].includes(result)?"green":"red");
    let bs = result>=5?"BIG":"SMALL";
    
    if(userId) { addDoc(collection(db, "history"), { num:result, color:color, bigsmall:bs, createdAt:serverTimestamp() }); }

    setTimeout(async ()=>{
      box.classList.remove("animate");
      resText.innerText = result;
      badge.innerText = bs;
      badge.className = "bs-badge show";
      badge.style.background = (bs==="BIG" ? "var(--big-color)" : "var(--primary)");

      // Neon Border Color Based on Result
      if(result===0) box.style.borderColor = "#9b59b6";
      else if(result===5) box.style.borderColor = "#00c853";
      else box.style.borderColor = (color==="green") ? "#00c853" : "#ff3547";

      if(currentBet !== null){
        let win = (currentBet===result || currentBet===color || currentBet===bs.toLowerCase());
        let winAmt = (currentBet===result)?betAmount*9:betAmount*2;
        if(win) {
          balance += winAmt; 
          document.getElementById("balance").innerText="₹ " + balance.toFixed(2);
          await updateDoc(doc(db,"users",userId), {balance:balance});
          showPopup("SYSTEM: WIN ₹" + winAmt, "win");
        } else { showPopup("SYSTEM: LOSE", "lose"); }
        currentBet=null;
      }
    },1000);
}

function showPopup(txt, type) {
    let p=document.createElement("div"); p.className="resultPopup "+type; p.innerText=txt;
    document.body.appendChild(p); p.style.display="block"; 
    setTimeout(()=>p.remove(),2500);
}

window.logout=()=>{ signOut(auth); window.location.href="login.html"; }
</script>
</body>
</html>
