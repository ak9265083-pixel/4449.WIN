<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN</title>
<style>
/* CSS remains exactly the same as provided by user */
:root { 
    --primary: #00f2ff; --secondary: #ff007a; --big-color: #fccf31; --bg: #0b0e14; 
    --card-bg: #161b22; --green: #2ecc71; --red: #e74c3c; --violet: #9b59b6; --glass: rgba(255, 255, 255, 0.05);
}
body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; color: white; }
.app { width: 420px; background: var(--bg); min-height: 100vh; text-align: center; padding-bottom: 110px; position: relative; border-left: 1px solid rgba(0,242,255,0.1); }
.header { background: rgba(22, 27, 34, 0.95); padding: 12px 15px; font-size: 20px; font-weight: bold; border-bottom: 1px solid var(--primary); color: var(--primary); }
.profile-card { background: linear-gradient(135deg, #1c2333, #0b0e14); margin: 15px; padding: 20px; border-radius: 20px; text-align: left; }
.timer-container { background: var(--card-bg); margin: 0 15px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
#time { font-size: 28px; color: var(--secondary); font-weight: 900; }
.centerGame { width: 90%; height: 130px; background: #1a1f29; border-radius: 20px; border: 2px solid var(--primary); margin: 25px auto; display: flex; align-items: center; justify-content: center; font-size: 70px; font-weight: 900; position: relative; }
.centerGame.animate { animation: neonGlitch 0.3s infinite; }
@keyframes neonGlitch { 0%, 100% { border-color: var(--primary); } 50% { border-color: var(--secondary); } }
.bs-badge { position: absolute; bottom: 12px; right: 20px; padding: 5px 15px; border-radius: 8px; font-size: 16px; transform: scale(0); transition: 0.4s; }
.bs-badge.show { transform: scale(1); }
.numbers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 10px 15px; }
.numbers button { height: 55px; border-radius: 12px; border: none; font-size: 20px; color: white; cursor: pointer; }
.ball-0 { background: linear-gradient(135deg, var(--red) 50%, var(--violet) 50%); } 
.ball-5 { background: linear-gradient(135deg, var(--green) 50%, var(--violet) 50%); } 
.ball-odd { background: var(--green); } .ball-even { background: var(--red); }
.colors button, .bigsmall button { flex: 1; padding: 16px; border: none; color: white; border-radius: 12px; font-weight: 900; cursor: pointer; }
.green-btn { background: var(--green); } .red-btn { background: var(--red); } .violet-btn { background: var(--violet); }
.history { margin: 15px; padding: 15px; background: var(--card-bg); border-radius: 15px; text-align: left; }
.historyItem { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 12px 0; display: flex; justify-content: space-between; }
.res-num { width: 34px; height: 34px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
.bottomWallet { position: fixed; bottom: 0; width: 420px; background: #161b22; border-top: 1px solid var(--primary); display: flex; padding: 15px 0; }
.navBtn { flex: 1; display: flex; flex-direction: column; align-items: center; color: #8b949e; cursor: pointer; }
.betPopup { position: fixed; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; }
.betBox { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 320px; border: 2px solid var(--primary); }
.resultPopup { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); padding: 40px; border-radius: 25px; font-weight: 900; z-index: 9999; display:none; }
.win { border: 3px solid var(--primary); color: var(--primary); background: #0b0e14; }
.lose { border: 3px solid #444; color: white; background: #000; }
</style>
</head>
<body>

<div class="app">
  <div class="header"><span>4449 WIN</span></div>
  <div class="profile-card"><p>Credits</p><h2 id="balance">₹ 0.00</h2></div>
  <div class="timer-container"><div>⏱ WINGO 30S</div><div id="time">00:30</div></div>
  <div class="result-area"><div class="centerGame" id="ball"><span id="resText">?</span><div id="bsBadge" class="bs-badge"></div></div></div>
  <div class="colors"><button class="green-btn" onclick="selectBet('green')">Green</button><button class="violet-btn" onclick="selectBet('violet')">Violet</button><button class="red-btn" onclick="selectBet('red')">Red</button></div>
  <div class="bigsmall" style="display:flex; gap:10px; padding:10px 15px;"><button style="background:var(--big-color); color:black" onclick="selectBet('big')">BIG</button><button style="background:var(--primary); color:black" onclick="selectBet('small')">SMALL</button></div>
  <div class="numbers">
    <button class="ball-0" onclick="selectBet(0)">0</button><button class="ball-odd" onclick="selectBet(1)">1</button><button class="ball-even" onclick="selectBet(2)">2</button><button class="ball-odd" onclick="selectBet(3)">3</button><button class="ball-even" onclick="selectBet(4)">4</button>
    <button class="ball-5" onclick="selectBet(5)">5</button><button class="ball-even" onclick="selectBet(6)">6</button><button class="ball-odd" onclick="selectBet(7)">7</button><button class="ball-even" onclick="selectBet(8)">8</button><button class="ball-odd" onclick="selectBet(9)">9</button>
  </div>
  <div class="history"><h4>History</h4><div id="historyList"></div></div>
</div>

<div class="betPopup" id="betPopup"><div class="betBox"><h3 id="betTitle">BET</h3><input type="number" id="betInput" style="width:90%; padding:10px; margin-bottom:20px;"><div style="display:flex; gap:10px;"><button onclick="closeBetPopup()">CANCEL</button><button onclick="placeBet()" style="background:var(--primary)">CONFIRM</button></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain:"win2-512e1.firebaseapp.com", projectId:"win2-512e1" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let balance=0, userId="", currentBet=null, betAmount=0, selectedValue=null;

function updateTimer() {
    const remaining = 30 - (new Date().getSeconds() % 30);
    document.getElementById("time").innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);
    if (remaining === 30) { processResult(); }
}
setInterval(updateTimer, 1000);

// HYBRID RESULT LOGIC
async function processResult(){
    let box=document.getElementById("ball"), badge=document.getElementById("bsBadge"), resText=document.getElementById("resText");
    box.classList.add("animate"); badge.classList.remove("show");

    let result;
    try {
        const adminDoc = await getDoc(doc(db, "wingo", "result"));
        if (adminDoc.exists() && adminDoc.data().manual === true) {
            result = adminDoc.data().number; // Fix Result from Admin
            await setDoc(doc(db, "wingo", "result"), { manual: false }); // Reset for next round
        } else {
            result = Math.floor(Math.random() * 10); // Random System Result
        }
    } catch(e) { result = Math.floor(Math.random() * 10); }

    let color = (result===0||result===5)?"violet":([1,3,7,9].includes(result)?"green":"red");
    let bs = result>=5?"BIG":"SMALL";

    await addDoc(collection(db, "history"), { num:result, color:color, bigsmall:bs, createdAt:serverTimestamp() });

    setTimeout(async ()=>{
      box.classList.remove("animate"); resText.innerText = result;
      badge.innerText = bs; badge.className = "bs-badge show";
      badge.style.background = (bs==="BIG" ? "var(--big-color)" : "var(--primary)");
      
      if(currentBet !== null){
        let win = (currentBet===result || currentBet===color || currentBet===bs.toLowerCase());
        if(win) {
          let winAmt = (currentBet===result)?betAmount*9:betAmount*2;
          balance += winAmt; document.getElementById("balance").innerText="₹ "+balance.toFixed(2);
          await updateDoc(doc(db, "users", userId), {balance:balance});
          showPopup("WIN ₹" + winAmt, "win");
        } else { showPopup("LOSE", "lose"); }
        currentBet=null;
      }
    },1000);
}

onAuthStateChanged(auth, user => {
  if(user){
    userId=user.uid;
    onSnapshot(doc(db,"users",userId), snap => {
      if(snap.exists()){ balance=snap.data().balance||0; document.getElementById("balance").innerText="₹ " + balance.toFixed(2); }
    });
  }
});

onSnapshot(query(collection(db, "history"), orderBy("createdAt", "desc"), limit(10)), snap => {
  let list = document.getElementById("historyList"); list.innerHTML = "";
  snap.forEach(d => {
    let item = d.data();
    let bg = item.num === 0 ? "ball-0" : item.num === 5 ? "ball-5" : (item.color === "green" ? "ball-odd" : "ball-even");
    list.innerHTML += `<div class="historyItem"><div><span class="res-num ${bg}">${item.num}</span></div><span>${item.bigsmall}</span></div>`;
  });
});

window.selectBet=v=>{ selectedValue=v; document.getElementById("betPopup").style.display="flex"; }
window.closeBetPopup=()=>{ document.getElementById("betPopup").style.display="none"; }
window.placeBet=async()=>{
  let amt=parseInt(document.getElementById("betInput").value);
  if(balance<amt || amt<=0) return;
  balance-=amt; currentBet=selectedValue; betAmount=amt;
  await updateDoc(doc(db,"users",userId), {balance:balance});
  document.getElementById("betPopup").style.display="none";
}
function showPopup(t,c){ let p=document.createElement("div"); p.className="resultPopup "+c; p.innerText=t; document.body.appendChild(p); p.style.display="block"; setTimeout(()=>p.remove(),3000); }
</script>
</body>
</html>
