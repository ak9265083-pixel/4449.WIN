```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wingo Game</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

/* result circle */

.number-circle{
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
margin:auto;
color:white;
}

.green{
background:#00c853;
}

.red{
background:#ff1744;
}

.violet{
background:#9c27b0;
}

/* popup */

.bet-popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1e293b;
padding:20px;
border-radius:12px;
width:260px;
display:none;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.coin-box{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
margin-top:15px;
}

.coin-btn{
padding:8px 14px;
font-size:20px;
border:none;
border-radius:6px;
cursor:pointer;
background:#334155;
color:white;
}

.bet-btn{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

.close-btn{
background:#ef4444;
margin-left:10px;
}

</style>
</head>

<body>

<h2>Wingo Game</h2>

<br>

<div id="resultBox"></div>

<br><br>

<button onclick="openPopup()">Place Bet</button>

<!-- popup -->

<div class="bet-popup" id="betPopup">

<h3>Place Bet</h3>

<div class="coin-box">

<button class="coin-btn" onclick="changeCoin(-1)">-</button>

<div id="coinValue">1</div>

<button class="coin-btn" onclick="changeCoin(1)">+</button>

</div>

<button class="bet-btn" onclick="confirmBet()">Confirm</button>

<button class="bet-btn close-btn" onclick="closePopup()">Close</button>

</div>


<script>

let coin = 1

function openPopup(){
document.getElementById("betPopup").style.display="block"
}

function closePopup(){
document.getElementById("betPopup").style.display="none"
}

function changeCoin(value){

coin += value

if(coin < 1){
coin = 1
}

document.getElementById("coinValue").innerText = coin

}


function confirmBet(){

closePopup()

// random result demo
let num = Math.floor(Math.random()*10)

showResult(num)

}


function showResult(num){

let color=""

if([1,3,7,9].includes(num)){
color="green"
}
else if([2,4,6,8].includes(num)){
color="red"
}
else{
color="violet"
}

document.getElementById("resultBox").innerHTML=
'<div class="number-circle '+color+'">'+num+'</div>'

}

</script>

</body>
</html>
