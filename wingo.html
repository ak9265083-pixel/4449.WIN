<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN - Pro Edition</title>
<style>
:root { 
    --primary: #00f2ff; 
    --secondary: #ff007a; 
    --big-color: #fccf31; 
    --bg: #0b0e14; 
    --card-bg: #161b22; 
    --green: #2ecc71;
    --red: #e74c3c;
    --violet: #9b59b6;
    --glass: rgba(255, 255, 255, 0.05);
}

body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); display: flex; justify-content: center; color: white; }
.app { width: 420px; background: var(--bg); min-height: 100vh; text-align: center; padding-bottom: 110px; overflow-x: hidden; border-left: 1px solid rgba(0, 242, 255, 0.1); border-right: 1px solid rgba(0, 242, 255, 0.1); position: relative; }

/* Header */
.header { background: rgba(22, 27, 34, 0.95); padding: 12px 15px; font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--primary); color: var(--primary); position: sticky; top:0; z-index: 1000; backdrop-filter: blur(10px); box-shadow: 0 0 15px rgba(0,242,255,0.3); }
.header-logo { width: 35px; height: 35px; border-radius: 50%; background: white; border: 2px solid var(--primary); }

/* Profile & Timer */
.profile-card { background: linear-gradient(135deg, #1c2333, #0b0e14); margin: 15px; padding: 20px; border-radius: 20px; border: 1px solid rgba(0, 242, 255, 0.2); text-align: left; }
.profile-card h2 { margin: 5px 0; font-size: 32px; color: var(--primary); }

.timer-container { background: var(--card-bg); margin: 0 15px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--glass); }
#time { font-size: 32px; color: var(--secondary); font-weight: 900; font-family: 'Courier New', Courier, monospace; }

/* Lock Overlay for last 5 seconds */
#lockOverlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.4); display: none; z-index: 100;
    pointer-events: all;
}

/* Result Animation Area */
.result-area { margin: 25px auto; width: 90%; position: relative;}
.centerGame { 
    width: 100%; height: 150px; background: #1a1f29; border-radius: 20px; 
    border: 2px solid var(--primary); display: flex; align-items: center; 
    justify-content: center; font-size: 80px; font-weight: 900; position: relative;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
}
.count-overlay {
    position: absolute; font-size: 100px; color: var(--secondary);
    display: none; animation: pulse 1s infinite; z-index: 10;
}
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

/* 55Club Style Betting Popup */
.betPopup { position: fixed; bottom: -100%; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; z-index: 3000; transition: 0.4s; }
.betPopup.active { bottom: 0; }
.betBox { 
    background: white; width: 100%; border-radius: 25px 25px 0 0; 
    padding: 20px; color: #333; box-sizing: border-box; 
}
.bet-header { background: var(--green); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-weight: bold; }
.amount-chips { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
.chip { background: #f4f4f4; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; border: 1px solid #ddd; }
.chip.selected { background: var(--green); color: white; }

/* 55Club Win/Lose Popup */
.win-popup {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 300px; background: white; border-radius: 20px; text-align: center;
    padding: 20px; z-index: 10000; display: none; box-shadow: 0 0 50px rgba(0,0,0,0.5);
}
.win-header { color: #fccf31; font-size: 24px; font-weight: bold; }
.win-amt { font-size: 40px; color: #e74c3c; font-weight: 900; margin: 10px 0; }

/* History & Buttons (Keep your original styling) */
.numbers button { height: 50px; width: 50px; border-radius: 50%; margin: 5px; border: none; font-weight: bold; color: white; cursor: pointer; }
.ball-0 { background: linear-gradient(to bottom right, var(--red) 50%, var(--violet) 50%); }
.ball-5 { background: linear-gradient(to bottom right, var(--green) 50%, var(--violet) 50%); }
.ball-odd { background: var(--green); }
.ball-even { background: var(--red); }
</style>
</head>
<body>

<div class="app">
    <div id="lockOverlay"></div> <div class="header">
        <span>4449 WIN</span>
    </div>

    <div class="profile-card">
        <p>Wallet Balance</p>
        <h2 id="balance">₹ 0.00</h2>
    </div>

    <div class="timer-container">
        <div>⏱ WINGO 30S</div>
        <div id="time">00:30</div>
    </div>

    <div class="result-area">
        <div class="count-overlay" id="bigCounter">5</div>
        <div class="centerGame" id="ball">
            <span id="resText">?</span>
        </div>
    </div>

    <div class="colors" style="display:flex; gap:10px; padding:10px;">
        <button onclick="openClubBet('green')" style="flex:1; background:var(--green); border:none; padding:15px; border-radius:10px; color:white; font-weight:bold;">Green</button>
        <button onclick="openClubBet('violet')" style="flex:1; background:var(--violet); border:none; padding:15px; border-radius:10px; color:white; font-weight:bold;">Violet</button>
        <button onclick="openClubBet('red')" style="flex:1; background:var(--red); border:none; padding:15px; border-radius:10px; color:white; font-weight:bold;">Red</button>
    </div>

    <div class="numbers">
        <button class="ball-0" onclick="openClubBet(0)">0</button>
        <button class="ball-odd" onclick="openClubBet(1)">1</button>
        <button class="ball-even" onclick="openClubBet(2)">2</button>
        <button class="ball-odd" onclick="openClubBet(3)">3</button>
        <button class="ball-even" onclick="openClubBet(4)">4</button>
        <button class="ball-5" onclick="openClubBet(5)">5</button>
        <button class="ball-even" onclick="openClubBet(6)">6</button>
        <button class="ball-odd" onclick="openClubBet(7)">7</button>
        <button class="ball-even" onclick="openClubBet(8)">8</button>
        <button class="ball-odd" onclick="openClubBet(9)">9</button>
    </div>

    <div class="history">
        <h4 style="color:var(--primary)">Recent History</h4>
        <div id="historyList"></div>
    </div>
</div>

<div class="betPopup" id="clubPopup">
    <div class="betBox">
        <div class="bet-header" id="popHeader">Select 0</div>
        <p>Amount</p>
        <div class="amount-chips">
            <div class="chip selected" onclick="setAmt(1, this)">1</div>
            <div class="chip" onclick="setAmt(10, this)">10</div>
            <div class="chip" onclick="setAmt(100, this)">100</div>
            <div class="chip" onclick="setAmt(1000, this)">1000</div>
        </div>
        <div style="display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0;">
            <button onclick="changeQty(-1)" style="width:40px; height:40px; border-radius:50%; border:1px solid #ddd;">-</button>
            <input type="number" id="betQty" value="1" style="width: 60px; text-align: center; font-size: 20px; border:none;">
            <button onclick="changeQty(1)" style="width:40px; height:40px; border-radius:50%; border:1px solid #ddd;">+</button>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="closeClubBet()" style="flex:1; padding:15px; border:none; border-radius:10px; background:#eee;">Cancel</button>
            <button onclick="confirmClubBet()" id="totalBtn" style="flex:1; padding:15px; border:none; border-radius:10px; background:var(--green); color:white; font-weight:bold;">Total ₹1</button>
        </div>
    </div>
</div>

<div class="win-popup" id="winNotify">
    <div class="win-header">Congratulations</div>
    <div style="margin:10px 0; color:#333;">Bonus</div>
    <div class="win-amt" id="winDisplay">₹0.00</div>
    <button onclick="this.parentElement.style.display='none'" style="background:var(--green); color:white; border:none; padding:10px 30px; border-radius:20px;">Close</button>
</div>

<script type="module">
// ... (Keep your Firebase Import and Config exactly same as your original file)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,doc,getDoc,updateDoc,collection,addDoc,query,orderBy,limit,onSnapshot,serverTimestamp,setDoc,increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain:"win2-512e1.firebaseapp.com", projectId:"win2-512e1" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let balance=0, userId="", currentBet=null, betBase=1, selectedValue=null;

// Timer Logic with 5-second Lock
function updateTimer() {
    const now = new Date();
    const remaining = 30 - (now.getSeconds() % 30);
    
    document.getElementById("time").innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);
    
    // 5-Second Lock Logic
    if (remaining <= 5) {
        document.getElementById("lockOverlay").style.display = "block";
        document.getElementById("bigCounter").style.display = "block";
        document.getElementById("bigCounter").innerText = remaining;
        closeClubBet(); // Close popup if open
    } else {
        document.getElementById("lockOverlay").style.display = "none";
        document.getElementById("bigCounter").style.display = "none";
    }

    if (remaining === 30) { processResult(); }
}
setInterval(updateTimer, 1000);

// Popup Functions
window.openClubBet = (v) => {
    selectedValue = v;
    document.getElementById("popHeader").innerText = "Select " + v.toString().toUpperCase();
    document.getElementById("clubPopup").classList.add("active");
};

window.closeClubBet = () => {
    document.getElementById("clubPopup").classList.remove("active");
};

window.setAmt = (amt, el) => {
    betBase = amt;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    updateTotal();
};

window.changeQty = (n) => {
    let q = document.getElementById("betQty");
    let val = parseInt(q.value) + n;
    if(val < 1) val = 1;
    q.value = val;
    updateTotal();
};

function updateTotal() {
    let q = parseInt(document.getElementById("betQty").value);
    document.getElementById("totalBtn").innerText = "Total ₹" + (betBase * q);
}

window.confirmClubBet = async () => {
    let total = betBase * parseInt(document.getElementById("betQty").value);
    if(balance < total) { alert("Insufficient Balance"); return; }
    
    // Firebase Update (Same as your original logic)
    balance -= total;
    document.getElementById("balance").innerText = "₹ " + balance.toFixed(2);
    currentBet = selectedValue;
    let betAmount = total;
    
    await updateDoc(doc(db,"users",userId), { balance: balance });
    closeClubBet();
};

// Result and Winning Animation
async function processResult() {
    let resText = document.getElementById("resText");
    resText.innerText = "⏳";
    
    // Mocking result fetch (logic remains your firebase manual/auto check)
    let result = Math.floor(Math.random() * 10); 
    let color = (result===0||result===5)?"violet":([1,3,7,9].includes(result)?"green":"red");
    
    setTimeout(async () => {
        resText.innerText = result;
        resText.style.color = (color === 'green' ? '#2ecc71' : '#e74c3c');
        
        if(currentBet !== null) {
            let win = (currentBet === result || currentBet === color);
            if(win) {
                let winAmt = (currentBet === result) ? (betBase * 9) : (betBase * 2);
                document.getElementById("winDisplay").innerText = "₹" + winAmt;
                document.getElementById("winNotify").style.display = "block";
                // Update Firebase here as per your original logic
            }
            currentBet = null;
        }
    }, 1000);
}

// User Auth Snapshot (Your original code)
onAuthStateChanged(auth, user => {
    if(user){
        userId = user.uid;
        onSnapshot(doc(db,"users",userId), snap => {
            if(snap.exists()){
                balance = snap.data().balance || 0;
                document.getElementById("balance").innerText = "₹ " + balance.toFixed(2);
            }
        });
    }
});
</script>
</body>
</html>
