<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN</title>

<style>

body{
margin:0;
font-family:Arial;
background:#9fa3ad;
display:flex;
justify-content:center;
}

.app{
width:420px;
background:white;
min-height:100vh;
text-align:center;
padding-bottom:90px;
}

.header{
background:#ff6b6b;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.wallet{
background:#f2f2f2;
margin:15px;
padding:15px;
border-radius:12px;
font-size:18px;
}

.timer{
background:#ff6b6b;
color:white;
margin:10px;
padding:10px;
border-radius:10px;
font-size:18px;
}

.centerGame{
margin:20px auto;
width:120px;
height:120px;
border-radius:50%;
background:#eee;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
font-weight:bold;
}

.colors{
display:flex;
gap:10px;
padding:10px;
}

.colors button{
flex:1;
padding:12px;
border:none;
color:white;
border-radius:8px;
font-size:16px;
}

.green{background:#2ecc71;}
.red{background:#e74c3c;}
.violet{background:#9b59b6;}

.numbers{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
padding:10px;
}

.numbers button{
padding:15px;
border-radius:50%;
border:none;
font-size:18px;
background:#eee;
cursor:pointer;
}

.history{
margin:15px;
text-align:left;
}

.historyItem{
background:#eee;
margin-bottom:6px;
padding:8px;
border-radius:6px;
}

.bottomWallet{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:360px;
background:white;
border-radius:25px;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.25);
}

.navBtn{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
}

.icon{
width:48px;
height:48px;
border-radius:50%;
background:#ff6b6b;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:white;
}

.label{
font-size:13px;
margin-top:4px;
font-weight:bold;
}

/* POPUP */

.betPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.betBox{
background:white;
padding:25px;
border-radius:18px;
width:260px;
text-align:center;
animation:zoomPop .35s ease;
}

@keyframes zoomPop{
0%{transform:scale(.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

.betBox input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
text-align:center;
margin-top:10px;
}

.betBtn{
margin-top:15px;
padding:12px;
background:#ff6b6b;
color:white;
border:none;
width:100%;
border-radius:10px;
font-size:16px;
}

/* ACCOUNT MODAL */
.accountModal{
display:none;
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.accountModalContent{
background:white;
width:320px;
border-radius:18px;
padding:25px;
text-align:center;
animation:fadeInModal 0.5s ease;
}

.accountModalContent img{
height:32px;
animation:bounceRotate 2s infinite;
}

@keyframes fadeInModal {0%{opacity:0;transform:translateY(-20px);}100%{opacity:1;transform:translateY(0);}}
@keyframes bounceRotate {0%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-10px) rotate(180deg);}100%{transform:translateY(0) rotate(360deg);}}

.accountModalContent .info{
margin:10px 0;
font-size:16px;
}

.accountModalContent .help-link{
display:block;
margin-top:20px;
color:#ff5c5c;
font-weight:bold;
text-decoration:none;
}

.accountModalContent button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:12px;
background:#ff5c5c;
color:white;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<div class="app">

<div class="header">4449 WIN</div>

<div class="wallet">
Balance <span id="balance">0</span>
</div>

<div class="timer">
Next Result In <span id="time">60</span>s
</div>

<div class="centerGame" id="ball">?</div>

<div class="colors">
<button class="green" onclick="selectBet('green')">Green</button>
<button class="violet" onclick="selectBet('violet')">Violet</button>
<button class="red" onclick="selectBet('red')">Red</button>
</div>

<div class="numbers">
<button onclick="selectBet(0)">0</button>
<button onclick="selectBet(1)">1</button>
<button onclick="selectBet(2)">2</button>
<button onclick="selectBet(3)">3</button>
<button onclick="selectBet(4)">4</button>
<button onclick="selectBet(5)">5</button>
<button onclick="selectBet(6)">6</button>
<button onclick="selectBet(7)">7</button>
<button onclick="selectBet(8)">8</button>
<button onclick="selectBet(9)">9</button>
</div>

<div class="history">
<h3>Last Results</h3>
<div id="historyList"></div>
</div>

</div>

<div class="bottomWallet">

<div class="navBtn" onclick="openWallet()">
<div class="icon">💳</div>
<div class="label">Wallet</div>
</div>

<div class="navBtn" onclick="openHelp()">
<div class="icon">🎧</div>
<div class="label">Help</div>
</div>

<div class="navBtn" onclick="logout()">
<div class="icon">🚪</div>
<div class="label">Logout</div>
</div>

<!-- NEW ACCOUNT BUTTON -->
<div class="navBtn" onclick="openAccount()">
<div class="icon">👤</div>
<div class="label">Account</div>
</div>

</div>

<div class="betPopup" id="betPopup">
<div class="betBox">
<h3>Enter Bet Amount</h3>
<input type="number" id="betInput" placeholder="Amount">
<button class="betBtn" onclick="placeBet()">Place Bet</button>
</div>
</div>

<!-- ACCOUNT MODAL -->
<div class="accountModal" id="accountModal">
  <div class="accountModalContent">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:15px;">
      <img src="logo.png" alt="Logo">
      <span style="font-weight:bold;font-size:18px;">4449 WIN</span>
    </div>
    <h3>My Account</h3>
    <div class="info">User ID: <span id="accUserId"></span></div>
    <div class="info">Balance: <span id="accBalance" class="balance">0</span></div>
    <a href="help.html" class="help-link">Help Centre</a>
    <button onclick="goToWallet()">Deposit</button>
    <button onclick="closeAccount()" style="background:#999;margin-top:10px;">Close</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth,onAuthStateChanged,signOut} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {getFirestore,doc,getDoc,updateDoc} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A",
authDomain: "win2-512e1.firebaseapp.com",
projectId: "win2-512e1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let balance=0;
let userId="";
let currentBet=null;
let betAmount=0;
let selectedValue=null;

onAuthStateChanged(auth, async (user)=>{
  if(user){
    userId=user.uid;
    let ref=doc(db,"users",userId);
    let snap=await getDoc(ref);
    if(snap.exists()){
      balance=snap.data().balance || 0;
      document.getElementById("balance").innerText=balance;
    }
  }
});

function getColor(n){
  if(n==0 || n==5) return "violet";
  if([1,3,7,9].includes(n)) return "green";
  if([2,4,6,8].includes(n)) return "red";
}

window.selectBet=function(v){
  selectedValue=v;
  document.getElementById("betPopup").style.display="flex";
}

window.placeBet=function(){
  let amt=parseInt(document.getElementById("betInput").value);
  if(balance<amt){
    alert("Low Balance");
    return;
  }
  balance-=amt;
  document.getElementById("balance").innerText=balance;
  currentBet=selectedValue;
  betAmount=amt;
  document.getElementById("betPopup").style.display="none";
}

function addHistory(num,color){
  let div=document.createElement("div");
  div.className="historyItem";
  div.innerHTML="Result: "+num+" ("+color+")";
  document.getElementById("historyList").prepend(div);
}

let time=60;
setInterval(async ()=>{
  time--;
  document.getElementById("time").innerText=time;
  if(time<=0){
    time=60;
    let resultDoc = await getDoc(doc(db,"wingo","result"));
    let result = resultDoc.data().number;
    let color=getColor(result);
    document.getElementById("ball").innerText=result;
    addHistory(result,color);
    if(currentBet!=null){
      if(currentBet===result){
        let winAmount = betAmount * (result==0?2:result);
        balance += winAmount;
        alert("You Win ₹"+winAmount);
      } else if(currentBet===color){
        balance += betAmount*2;
        alert("Color Win ₹"+betAmount*2);
      } else{
        alert("You Lose");
      }
      document.getElementById("balance").innerText=balance;
      await updateDoc(doc(db,"users",userId),{balance:balance});
      currentBet=null;
      betAmount=0;
    }
  }
},1000);

window.openWallet=function(){
  window.location.href="wallet.html";
}

window.openHelp=function(){
  window.location.href="help.html";
}

window.logout=function(){
  signOut(auth);
  window.location.href="login.html";
}

// ACCOUNT BUTTON FUNCTIONS
const accUserId = document.getElementById('accUserId');
const accBalance = document.getElementById('accBalance');
const accountModal = document.getElementById('accountModal');

function openAccount(){
  const user = auth.currentUser;
  if(!user){
    alert("Please login first!");
    return;
  }
  const uid = user.uid;
  accUserId.innerText = uid;

  getDoc(doc(db,"users",uid)).then(snap=>{
    if(snap.exists()){
      let bal = snap.data().balance || 0;
      animateAccountBalance(0, bal, 800);
      accountModal.style.display = 'flex';
    }
  });
}

function closeAccount(){
  accountModal.style.display = 'none';
}

function goToWallet(){
  window.location.href="wallet.html";
}

function animateAccountBalance(start,end,duration){
  let startTime=null;
  function step(currentTime){
    if(!startTime) startTime=currentTime;
    let progress = currentTime - startTime;
    let value = Math.min(Math.floor(start + (end-start)*(progress/duration)),end);
    accBalance.innerText = value;
    if(progress<duration) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

</script>

</body>
</html>
