<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | 4449 WIN</title>
<style>
:root { 
    --primary: #00f2ff; 
    --secondary: #ff007a; 
    --bg: #0b0e14; 
    --card-bg: #161b22; 
    --success: #2ecc71;
    --violet: #9b59b6;
    --glass: rgba(255, 255, 255, 0.05);
}

body {
    font-family: 'Segoe UI', Arial; 
    background: var(--bg); 
    color: white; 
    margin: 0; 
    display: flex; 
    flex-direction: column; 
    min-height: 100vh;
}

/* Header & Nav */
.header { background: var(--card-bg); padding: 15px 25px; display: flex; align-items: center; gap: 15px; border-bottom: 2px solid var(--primary); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
.header-logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); }
.header span { font-size: 22px; font-weight: 800; color: var(--primary); }
.nav-bar { display: flex; background: #05070a; justify-content: space-around; padding: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--glass); }
.nav-item { padding: 10px 20px; cursor: pointer; border-radius: 12px; font-weight: 600; color: #8b949e; transition: 0.3s; }
.nav-item.active { background: var(--primary); color: black; box-shadow: 0 0 15px var(--primary); }

.container { max-width: 1000px; margin: 20px auto; padding: 0 15px; flex: 1; width: 100%; box-sizing: border-box; }
.card { background: var(--card-bg); padding: 20px; margin-bottom: 20px; border-radius: 20px; border: 1px solid var(--glass); }

/* Table Styling */
table { width: 100%; border-collapse: collapse; }
th { text-align: left; color: var(--primary); font-size: 11px; text-transform: uppercase; padding: 12px; border-bottom: 1px solid var(--glass); }
td { padding: 12px; border-bottom: 1px solid var(--glass); font-size: 14px; }
.win-text { color: var(--success); font-size: 11px; font-weight: bold; display: block; }

/* Buttons */
.edit-btn { background: var(--primary); color: black; border:none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor:pointer; }
.del-btn { background: var(--secondary); color: white; border:none; padding: 6px 12px; border-radius: 6px; cursor:pointer; font-weight: bold; }

/* ANIMATED MODAL (POPUP) */
#editModal {
    display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); align-items: center; justify-content: center;
}
.modal-content {
    background: var(--card-bg); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px;
    border: 1px solid var(--primary); box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
    animation: zoomIn 0.3s ease-out;
}
@keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-content h3 { margin-top: 0; color: var(--primary); text-align: center; }
.modal-content label { display: block; margin: 10px 0 5px; font-size: 12px; color: #8b949e; }
.modal-content input {
    width: 100%; padding: 12px; background: #0b0e14; border: 1px solid var(--glass);
    border-radius: 10px; color: white; margin-bottom: 15px; box-sizing: border-box; outline: none;
}
.modal-content input:focus { border-color: var(--primary); }
.modal-actions { display: flex; gap: 10px; }
.modal-actions button { flex: 1; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; }
.btn-save { background: var(--primary); color: black; }
.btn-cancel { background: #333; color: white; }

/* Stats & Result Control (Original) */
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
.stat { background: var(--card-bg); padding: 20px; border-radius: 15px; text-align: center; border-top: 4px solid var(--secondary); }
.stat b { font-size: 28px; color: var(--secondary); }
.result-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.result-grid button { padding: 15px; background: #0b0e14; border: 1px solid var(--primary); color: var(--primary); border-radius: 10px; cursor: pointer; }
.section { display: none; }
.section.active { display: block; animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<script>
var password = prompt("Enter Admin Password");
if(password !== "@1Aankit"){ alert("Wrong Password"); window.location = "index.html"; }
</script>

<div id="editModal">
    <div class="modal-content">
        <h3>Edit User Balance</h3>
        <input type="hidden" id="editUid">
        <label>MAIN BALANCE (₹)</label>
        <input type="number" id="editMainBal">
        <label>WINNING BALANCE (₹)</label>
        <input type="number" id="editWinBal">
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" id="saveBtn">Update Now</button>
        </div>
    </div>
</div>

<div class="header">
    <img src="logo.png" alt="Logo" class="header-logo">
    <span>4449 WIN ADMIN</span>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showSection('dash')">Dash</div>
    <div class="nav-item" onclick="showSection('users')">Users</div>
    <div class="nav-item" onclick="showSection('deposits')">Deposit</div>
    <div class="nav-item" onclick="showSection('withdraws')">Withdraw</div>
    <div class="nav-item" onclick="showSection('issues')">Support</div>
</div>

<div class="container">
    <div id="dash" class="section active">
        <div class="stats">
            <div class="stat">TOTAL USERS<br><b id="totalUsers">0</b></div>
            <div class="stat">ONLINE NOW<br><b id="activeUsers">0</b></div>
        </div>
        <div class="card">
            <h3 style="color:var(--primary)">🎯 CONTROL NEXT RESULT</h3>
            <div class="result-grid">
                <button onclick="setResult(0)">0</button><button onclick="setResult(1)">1</button>
                <button onclick="setResult(2)">2</button><button onclick="setResult(3)">3</button>
                <button onclick="setResult(4)">4</button><button onclick="setResult(5)">5</button>
                <button onclick="setResult(6)">6</button><button onclick="setResult(7)">7</button>
                <button onclick="setResult(8)">8</button><button onclick="setResult(9)">9</button>
            </div>
        </div>
    </div>

    <div id="users" class="section">
        <div class="card">
            <h3>👥 USER DATABASE</h3>
            <input type="text" id="userSearch" oninput="filterUsers()" class="search-box" style="width:100%; padding:10px; margin-bottom:10px; background:#05070a; color:white; border:1px solid var(--glass); border-radius:10px;" placeholder="Search User...">
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>Status</th><th>User Info</th><th>Balance & Win</th><th>Action</th></tr></thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="deposits" class="section">
        <div class="card"><h3>💰 DEPOSIT REQUESTS</h3><div id="depositList"></div></div>
    </div>
    <div id="withdraws" class="section">
        <div class="card"><h3>💸 WITHDRAW REQUESTS</h3><div id="withdrawList"></div></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain:"win2-512e1.firebaseapp.com", projectId:"win2-512e1" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.showSection = (id) => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

// Result Setting
window.setResult = async (num) => {
    await setDoc(doc(db, "wingo", "result"), { number: num, time: Date.now(), manual: true });
    alert("Result set to " + num);
};

// Listen Users
onSnapshot(collection(db, "users"), (snap) => {
    const body = document.getElementById("userTableBody");
    body.innerHTML = "";
    document.getElementById("totalUsers").innerText = snap.size;
    snap.forEach(d => {
        const u = d.data(); const uid = d.id;
        const isOnline = (Date.now() - (u.lastActive || 0)) < 120000;
        body.innerHTML += `<tr>
            <td><span style="color:${isOnline?'#2ecc71':'#555'}">●</span></td>
            <td><small>${u.email || uid}</small></td>
            <td><b>₹${u.balance || 0}</b><span class="win-text">Win: ₹${u.winning || 0}</span></td>
            <td>
                <button class="edit-btn" onclick="openEditModal('${uid}', ${u.balance || 0}, ${u.winning || 0})">Edit</button>
                <button class="del-btn" onclick="deleteUser('${uid}')">Del</button>
            </td>
        </tr>`;
    });
});

// MODAL LOGIC
window.openEditModal = (uid, bal, win) => {
    document.getElementById('editUid').value = uid;
    document.getElementById('editMainBal').value = bal;
    document.getElementById('editWinBal').value = win;
    document.getElementById('editModal').style.display = 'flex';
}
window.closeModal = () => { document.getElementById('editModal').style.display = 'none'; }

document.getElementById('saveBtn').onclick = async () => {
    const uid = document.getElementById('editUid').value;
    const b = parseInt(document.getElementById('editMainBal').value);
    const w = parseInt(document.getElementById('editWinBal').value);
    
    try {
        await updateDoc(doc(db, "users", uid), { balance: b, winning: w });
        closeModal();
        alert("Updated!");
    } catch(e) { alert(e.message); }
}

window.deleteUser = async (uid) => { if(confirm("Delete?")) await deleteDoc(doc(db, "users", uid)); };

// Basic logic for other tabs
function listenReq(coll, el, act) {
    onSnapshot(collection(db, coll), (snap) => {
        const list = document.getElementById(el); list.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            if(data.status === "pending") {
                list.innerHTML += `<div style="background:#05070a; padding:10px; margin-bottom:5px; border-radius:10px; display:flex; justify-content:space-between;">
                    <span>₹${data.amount} (${data.user})</span>
                    <button class="edit-btn" onclick="${act}('${d.id}','${data.user}',${data.amount})">Approve</button>
                </div>`;
            }
        });
    });
}
window.approveDeposit = async (id, user, amt) => {
    const ref = doc(db,"users",user);
    const snap = await getDoc(ref);
    await updateDoc(ref, {balance: (snap.data().balance || 0) + amt});
    await updateDoc(doc(db,"depositRequests",id), {status:"approved"});
};
listenReq("depositRequests", "depositList", "approveDeposit");
</script>
</body>
</html>
