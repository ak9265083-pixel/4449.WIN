<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

h2{
color:#00ffcc;
}

.box{
background:#222;
padding:10px;
margin:10px 0;
border-radius:8px;
}

button{
padding:6px 12px;
background:#00ffcc;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<h1>ADMIN PANEL</h1>

<h2>Deposit Requests</h2>
<div id="deposits"></div>

<h2>Withdraw Requests</h2>
<div id="withdraws"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A",
authDomain: "win2-512e1.firebaseapp.com",
projectId: "win2-512e1",
storageBucket: "win2-512e1.firebasestorage.app",
messagingSenderId: "577913579227",
appId: "1:577913579227:web:1e073059c2d3d881720efe",
measurementId: "G-4V1SCSMTM6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// Deposit Requests

const depositDiv=document.getElementById("deposits")

const depositSnap=await getDocs(collection(db,"depositRequests"))

depositSnap.forEach(doc=>{

let data=doc.data()

let div=document.createElement("div")

div.className="box"

div.innerHTML=`
User: ${data.user} <br>
Amount: ${data.amount} <br>
Status: ${data.status}
<button>Approve</button>
`

depositDiv.appendChild(div)

})


// Withdraw Requests

const withdrawDiv=document.getElementById("withdraws")

const withdrawSnap=await getDocs(collection(db,"withdrawRequests"))

withdrawSnap.forEach(doc=>{

let data=doc.data()

let div=document.createElement("div")

div.className="box"

div.innerHTML=`
User: ${data.user} <br>
Amount: ${data.amount} <br>
Status: ${data.status}
<button>Approve</button>
`

withdrawDiv.appendChild(div)

})

</script>

</body>
</html>
