<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel</title>
<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.header{background:#ff6b6b;color:white;padding:15px;font-size:22px;text-align:center;font-weight:bold;}
.container{max-width:1000px;margin:auto;padding:20px;}
.card{background:white;padding:15px;margin-bottom:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
button{padding:8px 15px;background:#ff6b6b;border:none;color:white;border-radius:5px;margin:3px;cursor:pointer;}
.item{background:#eee;padding:10px;margin:8px 0;border-radius:6px;}
.stats{display:flex;gap:20px;margin-bottom:20px;}
.stat{background:#ff6b6b;color:white;padding:15px;border-radius:10px;flex:1;text-align:center;}
.backBtn{margin:15px;padding:12px 30px;background:#444;color:white;border:none;border-radius:25px;cursor:pointer;}

/* User Management Table Styling */
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{text-align:left;padding:12px;border-bottom:1px solid #ddd;font-size:14px;}
th{background:#f8f8f8;}
.online-status{color:#2ecc71;font-weight:bold;}
.offline-status{color:#95a5a6;}
.edit-btn{background:#3498db;}
</style>
</head>
<body>

<script>
var password = prompt("Enter Admin Password");
if(password !== "@1Aankit"){ alert("Wrong Password"); window.location = "index.html"; }
</script>

<button class="backBtn" onclick="window.history.back()">⬅ Back</button>
<div class="header">ADMIN PANEL (PRO)</div>

<div class="container">

<div class="stats">
<div class="stat">Total Users<br><span id="totalUsers">0</span></div>
<div class="stat">Online Now<br><span id="activeUsers">0</span></div>
</div>

<div class="card">
<h3>Set Wingo Result</h3>
<button onclick="setResult(0)">0</button>
<button onclick="setResult(1)">1</button>
<button onclick="setResult(2)">2</button>
<button onclick="setResult(3)">3</button>
<button onclick="setResult(4)">4</button>
<button onclick="setResult(5)">5</button>
<button onclick="setResult(6)">6</button>
<button onclick="setResult(7)">7</button>
<button onclick="setResult(8)">8</button>
<button onclick="setResult(9)">9</button>
</div>

<div class="card">
<h3>User Management (All Users)</h3>
<div style="overflow-x:auto;">
    <table>
        <thead>
            <tr>
                <th>Status</th>
                <th>UID / Phone</th>
                <th>Balance</th>
                <th>Last Seen</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            <tr><td colspan="5">Loading Users...</td></tr>
        </tbody>
    </table>
</div>
</div>

<div class="card">
<h3>Deposit Requests</h3>
<div id="depositList"></div>
</div>

<div class="card">
<h3>Withdraw Requests</h3>
<div id="withdrawList"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A",
authDomain:"win2-512e1.firebaseapp.com",
projectId:"win2-512e1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Initial Load
loadStats();
loadDeposits();
loadWithdraws();
listenToUsers(); // Naya function

// Sabhi Users ko Real-time monitor karne ke liye
async function listenToUsers() {
    onSnapshot(collection(db, "users"), (snapshot) => {
        const tableBody = document.getElementById("userTableBody");
        tableBody.innerHTML = "";
        let onlineCount = 0;
        document.getElementById("totalUsers").innerText = snapshot.size;

        snapshot.forEach((docSnap) => {
            const u = docSnap.data();
            const uid = docSnap.id;
            
            // Online logic: Agar user ne pichle 2 min (120000ms) mein koi action kiya ho
            const lastSeen = u.lastActive || 0;
            const isOnline = (Date.now() - lastSeen) < 120000;
            if(isOnline) onlineCount++;

            let tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${isOnline ? '<span class="online-status">● Online</span>' : '<span class="offline-status">○ Offline</span>'}</td>
                <td><small>${uid}</small><br><b>${u.phone || 'N/A'}</b></td>
                <td>₹${u.balance || 0}</td>
                <td>${lastSeen ? new Date(lastSeen).toLocaleTimeString() : 'Never'}</td>
                <td><button class="edit-btn" onclick="editUserBalance('${uid}', ${u.balance || 0})">Edit Bal</button></td>
            `;
            tableBody.appendChild(tr);
        });
        document.getElementById("activeUsers").innerText = onlineCount;
    });
}

// User Balance Edit karne ka function
window.editUserBalance = async function(uid, oldBal) {
    let newBal = prompt("Enter new balance for this user:", oldBal);
    if(newBal !== null && !isNaN(newBal)) {
        await updateDoc(doc(db, "users", uid), { balance: parseInt(newBal) });
        alert("Balance Updated!");
    }
}

async function loadStats(){
    let users = await getDocs(collection(db,"users"));
    document.getElementById("totalUsers").innerText = users.size;
}

async function loadDeposits(){
    let snap = await getDocs(collection(db,"depositRequests"));
    let list = document.getElementById("depositList");
    list.innerHTML = "";
    snap.forEach(docSnap=>{
        let d = docSnap.data();
        if(d.status==="pending"){
            let div = document.createElement("div");
            div.className="item";
            div.innerHTML=`User: ${d.user}<br>Amount: ${d.amount}<br>UTR: ${d.utr}<br>
            <button onclick='approveDeposit("${docSnap.id}","${d.user}",${d.amount})'>Approve</button>`;
            list.appendChild(div);
        }
    });
}

async function loadWithdraws(){
    let snap = await getDocs(collection(db,"withdrawRequests"));
    let list = document.getElementById("withdrawList");
    list.innerHTML = "";
    snap.forEach(docSnap=>{
        let d = docSnap.data();
        if(d.status==="pending"){
            let div = document.createElement("div");
            div.className="item";
            div.innerHTML=`User: ${d.user}<br>Amount: ${d.amount}<br>UPI: ${d.upi}<br>
            <button onclick='approveWithdraw("${docSnap.id}","${d.user}",${d.amount})'>Approve</button>`;
            list.appendChild(div);
        }
    });
}

window.approveDeposit = async function(id,user,amount){
    let ref = doc(db,"users",user);
    let snap = await getDoc(ref);
    let bal = snap.data().balance || 0;
    let bonus = 0;
    if(amount == 100) bonus = amount * 0.20;
    if(amount == 200) bonus = amount * 0.20;
    if(amount == 500) bonus = amount * 0.50;
    let total = amount + bonus;
    await updateDoc(ref,{balance: bal + total});
    await updateDoc(doc(db,"depositRequests",id),{status:"approved"});
    alert("Deposit Approved With Bonus");
    loadDeposits();
}

window.approveWithdraw = async function(id,user,amount){
    let ref = doc(db,"users",user);
    let snap = await getDoc(ref);
    let bal = snap.data().balance || 0;
    let newBal = Math.max(0, bal - amount);
    await updateDoc(ref,{balance: newBal});
    await updateDoc(doc(db,"withdrawRequests",id),{status:"approved"});
    alert("Withdraw Approved");
    loadWithdraws();
}

window.setResult = async function(num){
    await setDoc(doc(db,"wingo","result"),{
        number:num,
        time:Date.now()
    });
    alert("Result Updated to: " + num);
}
</script>
</body>
</html>
