<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

h2{
color:#00ffcc;
}

.box{
background:#222;
padding:10px;
margin:10px 0;
border-radius:8px;
}

button{
padding:6px 12px;
background:#00ffcc;
border:none;
cursor:pointer;
margin:3px;
}
</style>

</head>

<body>

<h1>ADMIN PANEL</h1>

<div id="loginBox">
<input type="password" id="pass" placeholder="Enter Admin Password">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none">

<h2>Set Result</h2>

<button onclick="setResult(0)">0</button>
<button onclick="setResult(1)">1</button>
<button onclick="setResult(2)">2</button>
<button onclick="setResult(3)">3</button>
<button onclick="setResult(4)">4</button>
<button onclick="setResult(5)">5</button>
<button onclick="setResult(6)">6</button>
<button onclick="setResult(7)">7</button>
<button onclick="setResult(8)">8</button>
<button onclick="setResult(9)">9</button>

<h2>Deposit Requests</h2>
<div id="deposits"></div>

<h2>Withdraw Requests</h2>
<div id="withdraws"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A",
authDomain: "win2-512e1.firebaseapp.com",
projectId: "win2-512e1",
storageBucket: "win2-512e1.firebasestorage.app",
messagingSenderId: "577913579227",
appId: "1:577913579227:web:1e073059c2d3d881720efe",
measurementId: "G-4V1SCSMTM6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login=function(){

let p=document.getElementById("pass").value

if(p=="@1Aankit"){

document.getElementById("loginBox").style.display="none"
document.getElementById("panel").style.display="block"

loadDeposits()
loadWithdraws()

}else{

alert("Wrong Password")

}

}

// RESULT CONTROL

window.setResult=async function(num){

await updateDoc(doc(db,"system","result"),{
value:num
})

alert("Result set "+num)

}


// DEPOSIT APPROVAL

async function loadDeposits(){

let div=document.getElementById("deposits")

div.innerHTML=""

let snap=await getDocs(collection(db,"depositRequests"))

snap.forEach(d=>{

let data=d.data()

if(data.status!="pending") return

let box=document.createElement("div")

box.className="box"

box.innerHTML=`
User: ${data.user}<br>
Amount: ${data.amount}<br>
UTR: ${data.utr}<br>
<button onclick="approveDeposit('${d.id}','${data.user}',${data.amount})">Approve</button>
`

div.appendChild(box)

})

}

window.approveDeposit=async function(id,user,amount){

let userRef=doc(db,"users",user)

let snap=await getDoc(userRef)

let bal=snap.data().balance || 0

await updateDoc(userRef,{
balance:bal+amount
})

await updateDoc(doc(db,"depositRequests",id),{
status:"approved"
})

alert("Deposit Approved")

loadDeposits()

}


// WITHDRAW APPROVAL

async function loadWithdraws(){

let div=document.getElementById("withdraws")

div.innerHTML=""

let snap=await getDocs(collection(db,"withdrawRequests"))

snap.forEach(d=>{

let data=d.data()

if(data.status!="pending") return

let box=document.createElement("div")

box.className="box"

box.innerHTML=`
User: ${data.user}<br>
Amount: ${data.amount}<br>
UPI: ${data.upi}<br>
<button onclick="approveWithdraw('${d.id}','${data.user}',${data.amount})">Approve</button>
`

div.appendChild(box)

})

}

window.approveWithdraw=async function(id,user,amount){

let userRef=doc(db,"users",user)

let snap=await getDoc(userRef)

let bal=snap.data().balance || 0

if(bal<amount){
alert("User balance low")
return
}

await updateDoc(userRef,{
balance:bal-amount
})

await updateDoc(doc(db,"withdrawRequests",id),{
status:"approved"
})

alert("Withdraw Approved")

loadWithdraws()

}

</script>

</body>
</html>
