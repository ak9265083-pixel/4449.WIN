<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel | 4449 WIN</title>
<style>
:root { 
    --primary: #00f2ff; 
    --secondary: #ff007a; 
    --bg: #0b0e14; 
    --card-bg: #161b22; 
    --success: #2ecc71;
    --glass: rgba(255, 255, 255, 0.05);
}

body {
    font-family: 'Segoe UI', Arial; 
    background: var(--bg); 
    color: white; 
    margin: 0; 
    display: flex; 
    flex-direction: column; 
    min-height: 100vh;
}

/* Header */
.header {
    background: var(--card-bg); 
    padding: 15px 25px; 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    border-bottom: 2px solid var(--primary);
    box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
}
.header-logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); box-shadow: 0 0 10px var(--primary); }
.header span { font-size: 22px; font-weight: 800; letter-spacing: 1px; color: var(--primary); }

/* Nav Bar */
.nav-bar { 
    display: flex; 
    background: #05070a; 
    justify-content: space-around; 
    padding: 10px; 
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid var(--glass);
}
.nav-item { 
    padding: 10px 20px; cursor: pointer; border-radius: 12px; 
    font-weight: 600; color: #8b949e; transition: 0.3s; 
}
.nav-item.active { background: var(--primary); color: black; box-shadow: 0 0 15px var(--primary); }

.container { max-width: 1000px; margin: 20px auto; padding: 0 15px; flex: 1; width: 100%; box-sizing: border-box; }
.card { 
    background: var(--card-bg); padding: 20px; margin-bottom: 20px; 
    border-radius: 20px; border: 1px solid var(--glass);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Stats */
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
.stat { 
    background: var(--card-bg); padding: 20px; border-radius: 15px; 
    text-align: center; border-top: 4px solid var(--secondary); 
}
.stat b { font-size: 28px; color: var(--secondary); text-shadow: 0 0 10px var(--secondary); }

/* Result Grid */
.result-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.result-grid button { 
    padding: 15px; background: #0b0e14; border: 1px solid var(--primary); 
    color: var(--primary); border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
}
.result-grid button:hover { background: var(--primary); color: black; box-shadow: 0 0 15px var(--primary); }

/* Tables */
.search-box { 
    width: 100%; padding: 12px; background: #05070a; border: 1px solid var(--glass); 
    border-radius: 10px; color: white; margin-bottom: 15px; outline: none;
}
table { width: 100%; border-collapse: collapse; }
th { text-align: left; color: var(--primary); font-size: 11px; text-transform: uppercase; padding: 12px; border-bottom: 1px solid var(--glass); }
td { padding: 12px; border-bottom: 1px solid var(--glass); font-size: 14px; }

.ref-badge { 
    background: rgba(255, 0, 122, 0.1); color: var(--secondary); 
    padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: bold;
}

.edit-btn { background: var(--primary); color: black; border:none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor:pointer; }
.del-btn { background: var(--secondary); color: white; border:none; padding: 6px 12px; border-radius: 6px; cursor:pointer; }

.section { display: none; }
.section.active { display: block; animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.item-request { 
    background: #05070a; padding: 15px; border-radius: 12px; margin-bottom: 10px; 
    display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary);
}
</style>
</head>
<body>

<script>
var password = prompt("Enter Admin Password");
if(password !== "@1Aankit"){ alert("Wrong Password"); window.location = "index.html"; }
</script>

<div class="header">
    <img src="logo.png" alt="Logo" class="header-logo">
    <span>4449 WIN ADMIN</span>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showSection('dash')">Dash</div>
    <div class="nav-item" onclick="showSection('users')">Users</div>
    <div class="nav-item" onclick="showSection('deposits')">Deposit</div>
    <div class="nav-item" onclick="showSection('withdraws')">Withdraw</div>
    <div class="nav-item" onclick="showSection('issues')">Support</div>
</div>

<div class="container">
    <div id="dash" class="section active">
        <div class="stats">
            <div class="stat">TOTAL USERS<br><b id="totalUsers">0</b></div>
            <div class="stat">ONLINE NOW<br><b id="activeUsers">0</b></div>
        </div>
        <div class="card">
            <h3 style="color:var(--primary)">🎯 CONTROL NEXT RESULT</h3>
            <div class="result-grid">
                <button onclick="setResult(0)">0</button><button onclick="setResult(1)">1</button>
                <button onclick="setResult(2)">2</button><button onclick="setResult(3)">3</button>
                <button onclick="setResult(4)">4</button><button onclick="setResult(5)">5</button>
                <button onclick="setResult(6)">6</button><button onclick="setResult(7)">7</button>
                <button onclick="setResult(8)">8</button><button onclick="setResult(9)">9</button>
            </div>
        </div>
    </div>

    <div id="users" class="section">
        <div class="card">
            <h3>👥 USER DATABASE</h3>
            <input type="text" id="userSearch" class="search-box" placeholder="Search by UID or Email...">
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>Status</th><th>User Info</th><th>Balance</th><th>Refers</th><th>Action</th></tr></thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="deposits" class="section">
        <div class="card"><h3>💰 DEPOSIT REQUESTS</h3><div id="depositList">Loading...</div></div>
    </div>
    
    <div id="withdraws" class="section">
        <div class="card"><h3>💸 WITHDRAW REQUESTS</h3><div id="withdrawList">Loading...</div></div>
    </div>

    <div id="issues" class="section">
        <div class="card"><h3>📩 TICKETS</h3><div id="ticketList"></div></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc, setDoc, deleteDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain:"win2-512e1.firebaseapp.com", projectId:"win2-512e1" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.showSection = function(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

// Logic to Fix Result
window.setResult = async (num) => {
    try {
        await setDoc(doc(db, "wingo", "result"), { 
            number: num, 
            manual: true 
        });
        alert("Success: Next result fixed to " + num);
    } catch (e) { alert("Error: " + e.message); }
};

// Listeners (User Table, Stats, etc.)
onSnapshot(collection(db, "users"), async (snap) => {
    const body = document.getElementById("userTableBody");
    body.innerHTML = ""; let online = 0;
    document.getElementById("totalUsers").innerText = snap.size;

    snap.forEach(d => {
        const u = d.data();
        const isOnline = (Date.now() - (u.lastActive || 0)) < 120000;
        if(isOnline) online++;
        body.innerHTML += `<tr>
            <td>${isOnline ? '<span style="color:var(--success)">●</span>' : '<span style="color:gray">○</span>'}</td>
            <td><small>${u.email || d.id}</small></td>
            <td>₹${u.balance || 0}</td>
            <td><span class="ref-badge">0 Refs</span></td>
            <td><button class="edit-btn" onclick="editBal('${d.id}', ${u.balance})">Edit</button></td>
        </tr>`;
    });
    document.getElementById("activeUsers").innerText = online;
});

window.editBal = async (uid, old) => {
    let n = prompt("New Balance?", old);
    if(n !== null) await updateDoc(doc(db, "users", uid), { balance: parseInt(n) });
};
</script>
</body>
</html>
