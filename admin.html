<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | 4449 WIN</title>
    <style>
        :root { 
            --primary: #00f2ff; 
            --secondary: #ff007a; 
            --bg: #0b0e14; 
            --card-bg: #161b22; 
            --success: #2ecc71;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
        }

        /* Header & Nav */
        .header { background: var(--card-bg); padding: 15px 25px; display: flex; align-items: center; gap: 15px; border-bottom: 2px solid var(--primary); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .header-logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); }
        .header span { font-size: 22px; font-weight: 800; color: var(--primary); letter-spacing: 1px; }

        .nav-bar { display: flex; background: #05070a; justify-content: space-around; padding: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--glass); }
        .nav-item { padding: 10px 20px; cursor: pointer; border-radius: 12px; font-weight: 600; color: #8b949e; transition: 0.3s; }
        .nav-item.active { background: var(--primary); color: black; box-shadow: 0 0 15px var(--primary); }

        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; flex: 1; width: 100%; box-sizing: border-box; }
        .card { background: var(--card-bg); padding: 20px; margin-bottom: 20px; border-radius: 20px; border: 1px solid var(--glass); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* --- Stats Section Styling --- */
        .stats-btn {
            width: 100%; padding: 15px; margin-bottom: 15px; 
            background: linear-gradient(90deg, #161b22, #1f2630);
            border: 1px solid var(--primary); color: var(--primary);
            border-radius: 15px; font-weight: bold; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .stats-btn:hover { background: var(--primary); color: black; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }

        .stats-grid {
            display: none; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;
            animation: slideIn 0.4s ease-out;
        }
        .stat-box {
            background: var(--card-bg); padding: 20px; border-radius: 18px;
            border: 1px solid var(--glass); text-align: center;
            position: relative; overflow: hidden;
        }
        .stat-box h4 { margin: 0; font-size: 11px; color: #8b949e; text-transform: uppercase; }
        .stat-box .val { font-size: 26px; font-weight: 800; display: block; margin-top: 5px; }
        
        .live-indicator {
            position: absolute; top: 12px; right: 12px; width: 8px; height: 8px;
            background: var(--success); border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: blink 1.2s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        /* ---------------------------- */

        .search-container { margin-bottom: 15px; position: relative; }
        .search-input { width: 100%; padding: 12px 15px; background: #0b0e14; border: 1px solid var(--primary); border-radius: 10px; color: white; outline: none; box-sizing: border-box; font-size: 14px; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--primary); font-size: 11px; text-transform: uppercase; padding: 12px; border-bottom: 1px solid var(--glass); }
        td { padding: 12px; border-bottom: 1px solid var(--glass); font-size: 14px; vertical-align: middle; }
        .win-text { color: var(--success); font-size: 11px; font-weight: bold; display: block; margin-top: 2px; }

        #editModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 24px; width: 90%; max-width: 380px; border: 1px solid var(--primary); box-shadow: 0 0 40px rgba(0, 242, 255, 0.3); animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalPop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-content h3 { margin: 0 0 20px; color: var(--primary); text-align: center; font-size: 20px; }
        .modal-content label { display: block; margin-bottom: 8px; font-size: 12px; color: #8b949e; font-weight: bold; }
        .modal-content input { width: 100%; padding: 14px; background: #0b0e14; border: 1px solid var(--glass); border-radius: 12px; color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; font-size: 16px; }
        
        .edit-btn { background: var(--primary); color: black; border:none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor:pointer; margin-right: 5px; }
        .del-btn { background: var(--secondary); color: white; border:none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor:pointer; }
        .rej-btn { background: #ff4757; color: white; border:none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor:pointer; }
        
        .result-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .result-grid button { padding: 15px; background: #0b0e14; border: 1px solid var(--primary); color: var(--primary); border-radius: 10px; font-weight: bold; cursor: pointer; }
        .result-grid button:hover { background: var(--primary); color: black; }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<script>
    var password = prompt("Enter Admin Password");
    if(password !== "@1Aankit"){ alert("Wrong Password"); window.location = "index.html"; }
</script>

<div id="editModal">
    <div class="modal-content">
        <h3>Update User Funds</h3>
        <input type="hidden" id="editUid">
        <label>MAIN BALANCE (Deposit)</label>
        <input type="number" id="editMainBal" placeholder="0">
        <label>WINNING BALANCE (Profit)</label>
        <input type="number" id="editWinBal" placeholder="0">
        <div class="modal-actions" style="display:flex; gap:10px;">
            <button onclick="closeModal()" style="flex:1; padding:12px; border-radius:10px; border:none; background:#2a2f3a; color:white; cursor:pointer;">Cancel</button>
            <button id="saveBtn" style="flex:1; padding:12px; border-radius:10px; border:none; background:var(--primary); color:black; font-weight:bold; cursor:pointer;">Save Changes</button>
        </div>
    </div>
</div>

<div class="header">
    <img src="logo.png" alt="Logo" class="header-logo">
    <span>4449 WIN ADMIN</span>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showSection('dash')">Dash</div>
    <div class="nav-item" onclick="showSection('users')">Users</div>
    <div class="nav-item" onclick="showSection('deposits')">Deposit</div>
    <div class="nav-item" onclick="showSection('withdraws')">Withdraw</div>
</div>

<div class="container">
    <div id="dash" class="section active">
        <button class="stats-btn" onclick="toggleStats()">
            <span>📊</span> View Site Statistics
        </button>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-box">
                <h4>Total Registered</h4>
                <span class="val" id="totalUserCount">0</span>
            </div>
            <div class="stat-box">
                <div class="live-indicator"></div>
                <h4>Active Players</h4>
                <span class="val" id="liveUserCount" style="color:var(--success)">0</span>
            </div>
        </div>

        <div class="card">
            <h3 style="color:var(--primary)">🎯 CONTROL NEXT RESULT</h3>
            <div class="result-grid">
                <button onclick="setResult(0)">0</button><button onclick="setResult(1)">1</button>
                <button onclick="setResult(2)">2</button><button onclick="setResult(3)">3</button>
                <button onclick="setResult(4)">4</button><button onclick="setResult(5)">5</button>
                <button onclick="setResult(6)">6</button><button onclick="setResult(7)">7</button>
                <button onclick="setResult(8)">8</button><button onclick="setResult(9)">9</button>
            </div>
        </div>
    </div>

    <div id="users" class="section">
        <div class="card">
            <h3 style="color:var(--primary)">👥 USER MANAGEMENT</h3>
            <div class="search-container">
                <input type="text" id="userSearch" class="search-input" placeholder="Search by UID or Email..." onkeyup="filterUsers()">
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr><th>Status</th><th>User ID / Email</th><th>Current Balance</th><th>Action</th></tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="deposits" class="section">
        <div class="card"><h3>💰 PENDING DEPOSITS</h3><div id="depositList"></div></div>
    </div>

    <div id="withdraws" class="section">
        <div class="card"><h3>💸 PENDING WITHDRAWS</h3><div id="withdrawList"></div></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain:"win2-512e1.firebaseapp.com", projectId:"win2-512e1" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Toggle Stats Logic
window.toggleStats = () => {
    const grid = document.getElementById('statsGrid');
    grid.style.display = (grid.style.display === 'grid') ? 'none' : 'grid';
};

// Search Logic
window.filterUsers = () => {
    let input = document.getElementById("userSearch").value.toUpperCase();
    let rows = document.getElementById("userTableBody").getElementsByTagName("tr");
    for (let i = 0; i < rows.length; i++) {
        rows[i].style.display = (rows[i].innerText.toUpperCase().indexOf(input) > -1) ? "" : "none";
    }
};

// Navigation
window.showSection = (id) => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(event) event.currentTarget.classList.add('active');
};

// Result Control
window.setResult = async (num) => {
    try {
        await setDoc(doc(db, "wingo", "result"), { number: num, time: Date.now(), manual: true });
        alert("Next result set to: " + num);
    } catch(e) { alert("Error: " + e.message); }
};

// REAL-TIME USER FETCH & AUTO-LIVE CALCULATION
onSnapshot(collection(db, "users"), (snap) => {
    const body = document.getElementById("userTableBody");
    body.innerHTML = "";
    
    let total = 0;
    let dbOnline = 0;
    const now = Date.now();

    snap.forEach(d => {
        total++;
        const u = d.data(); const uid = d.id;
        const isOnline = (now - (u.lastActive || 0)) < 120000; // 2 min threshold
        if(isOnline) dbOnline++;

        body.innerHTML += `<tr>
            <td><span style="color:${isOnline ? 'var(--success)' : '#555'}">●</span></td>
            <td><small>${u.email || uid}</small><br><code style="color:var(--primary); font-size:10px;">${uid}</code></td>
            <td><b>₹${u.balance || 0}</b><span class="win-text">Winning: ₹${u.winning || 0}</span></td>
            <td>
                <button class="edit-btn" onclick="openEditModal('${uid}', ${u.balance || 0}, ${u.winning || 0})">Edit</button>
                <button class="del-btn" onclick="deleteUser('${uid}')">Del</button>
            </td>
        </tr>`;
    });

    // Update Counts
    document.getElementById('totalUserCount').innerText = total;
    
    // Smart Display Logic: Agar DB mein koi online nahi hai (aapke case ki tarah), 
    // toh total users ka ek random percentage dikhayega animation ke liye.
    let displayOnline = dbOnline;
    if(dbOnline === 0 && total > 0) {
        displayOnline = Math.floor(total * 0.15) + Math.floor(Math.random() * 3); // 15% users + small random
        if(displayOnline === 0) displayOnline = 1; // Kam se kam 1 (Aap khud)
    }
    document.getElementById('liveUserCount').innerText = displayOnline;

    filterUsers();
});

// Modal Actions
window.openEditModal = (uid, bal, win) => {
    document.getElementById('editUid').value = uid;
    document.getElementById('editMainBal').value = bal;
    document.getElementById('editWinBal').value = win;
    document.getElementById('editModal').style.display = 'flex';
};
window.closeModal = () => document.getElementById('editModal').style.display = 'none';

document.getElementById('saveBtn').onclick = async () => {
    const uid = document.getElementById('editUid').value;
    const newBal = parseInt(document.getElementById('editMainBal').value) || 0;
    const newWin = parseInt(document.getElementById('editWinBal').value) || 0;
    try {
        await updateDoc(doc(db, "users", uid), { balance: newBal, winning: newWin });
        closeModal();
        alert("Updated!");
    } catch(e) { alert("Error"); }
};

window.deleteUser = async (uid) => { if(confirm("Are you sure?")) await deleteDoc(doc(db, "users", uid)); };

// Requests Listener
function listenReq(coll, el, approveAct, rejectAct) {
    onSnapshot(collection(db, coll), (snap) => {
        const list = document.getElementById(el);
        list.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            if(data.status === "pending") {
                list.innerHTML += `
                <div style="background:#0b0e14; padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid var(--glass);">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div><b style="color:var(--success); font-size:18px;">₹${data.amount}</b><br><small style="opacity:0.6;">User: ${data.user}</small></div>
                        <div>
                            <button class="edit-btn" onclick="${approveAct}('${d.id}','${data.user}',${data.amount})">Approve</button>
                            ${rejectAct ? `<button class="rej-btn" onclick="${rejectAct}('${d.id}','${data.user}',${data.amount})">Reject</button>` : ''}
                        </div>
                    </div>
                    <div style="margin-top:10px; color:var(--primary); font-size:12px;">${data.upi ? '<b>UPI:</b> '+data.upi : '<b>UTR:</b> '+data.utr}</div>
                </div>`;
            }
        });
    });
}

window.approveDeposit = async (id, user, amt) => {
    const ref = doc(db, "users", user);
    const snap = await getDoc(ref);
    if(snap.exists()) {
        await updateDoc(ref, { balance: (snap.data().balance || 0) + amt });
        await updateDoc(doc(db, "depositRequests", id), { status: "approved" });
        alert("Approved!");
    }
};

window.approveWithdraw = async (id, user, amt) => {
    await updateDoc(doc(db, "withdrawRequests", id), { status: "approved" });
    alert("Approved!");
};

window.rejectWithdraw = async (id, user, amt) => {
    const ref = doc(db, "users", user);
    const snap = await getDoc(ref);
    if(snap.exists()) {
        await updateDoc(ref, { winning: (snap.data().winning || 0) + amt });
        await updateDoc(doc(db, "withdrawRequests", id), { status: "rejected" });
        alert("Rejected!");
    }
};

listenReq("depositRequests", "depositList", "approveDeposit", null);
listenReq("withdrawRequests", "withdrawList", "approveWithdraw", "rejectWithdraw");

</script>
</body>
</html>
