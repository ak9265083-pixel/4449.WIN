<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel | 4449 WIN</title>
<style>
:root { 
    --primary: #00f2ff; 
    --secondary: #ff007a; 
    --bg: #0b0e14; 
    --card-bg: #161b22; 
    --success: #2ecc71;
    --glass: rgba(255, 255, 255, 0.05);
}

body {
    font-family: 'Segoe UI', Arial; 
    background: var(--bg); 
    color: white; 
    margin: 0; 
    display: flex; 
    flex-direction: column; 
    min-height: 100vh;
}

/* Header */
.header {
    background: var(--card-bg); 
    padding: 15px 25px; 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    border-bottom: 2px solid var(--primary);
    box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
}
.header-logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); box-shadow: 0 0 10px var(--primary); }
.header span { font-size: 22px; font-weight: 800; letter-spacing: 1px; color: var(--primary); }

/* Nav Bar */
.nav-bar { 
    display: flex; 
    background: #05070a; 
    justify-content: space-around; 
    padding: 10px; 
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid var(--glass);
}
.nav-item { 
    padding: 10px 20px; cursor: pointer; border-radius: 12px; 
    font-weight: 600; color: #8b949e; transition: 0.3s; 
}
.nav-item.active { background: var(--primary); color: black; box-shadow: 0 0 15px var(--primary); }

.container { max-width: 1000px; margin: 20px auto; padding: 0 15px; flex: 1; width: 100%; box-sizing: border-box; }
.card { 
    background: var(--card-bg); padding: 20px; margin-bottom: 20px; 
    border-radius: 20px; border: 1px solid var(--glass);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Stats */
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
.stat { 
    background: var(--card-bg); padding: 20px; border-radius: 15px; 
    text-align: center; border-top: 4px solid var(--secondary); 
}
.stat b { font-size: 28px; color: var(--secondary); text-shadow: 0 0 10px var(--secondary); }

/* Result Buttons */
.result-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.result-grid button { 
    padding: 15px; background: #0b0e14; border: 1px solid var(--primary); 
    color: var(--primary); border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
}
.result-grid button:hover { background: var(--primary); color: black; box-shadow: 0 0 15px var(--primary); }

/* Tables */
.search-box { 
    width: 100%; padding: 12px; background: #05070a; border: 1px solid var(--glass); 
    border-radius: 10px; color: white; margin-bottom: 15px; outline: none;
}
table { width: 100%; border-collapse: collapse; }
th { text-align: left; color: var(--primary); font-size: 11px; text-transform: uppercase; padding: 12px; border-bottom: 1px solid var(--glass); }
td { padding: 12px; border-bottom: 1px solid var(--glass); font-size: 14px; }

.ref-badge { 
    background: rgba(255, 0, 122, 0.1); color: var(--secondary); 
    padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: bold;
}

.edit-btn { background: var(--primary); color: black; border:none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor:pointer; }
.del-btn { background: var(--secondary); color: white; border:none; padding: 6px 12px; border-radius: 6px; cursor:pointer; }

.section { display: none; }
.section.active { display: block; animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.item-request { 
    background: #05070a; padding: 15px; border-radius: 12px; margin-bottom: 10px; 
    display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary);
}
</style>
</head>
<body>

<script>
var password = prompt("Enter Admin Password");
if(password !== "@1Aankit"){ alert("Wrong Password"); window.location = "index.html"; }
</script>

<div class="header">
    <img src="logo.png" alt="Logo" class="header-logo">
    <span>4449 WIN ADMIN</span>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showSection('dash')">Dash</div>
    <div class="nav-item" onclick="showSection('users')">Users</div>
    <div class="nav-item" onclick="showSection('deposits')">Deposit</div>
    <div class="nav-item" onclick="showSection('withdraws')">Withdraw</div>
    <div class="nav-item" onclick="showSection('issues')">Support</div>
</div>

<div class="container">

    <div id="dash" class="section active">
        <div class="stats">
            <div class="stat">TOTAL USERS<br><b id="totalUsers">0</b></div>
            <div class="stat">ONLINE NOW<br><b id="activeUsers">0</b></div>
        </div>
        <div class="card">
            <h3 style="color:var(--primary)">🎯 CONTROL NEXT RESULT</h3>
            <div class="result-grid">
                <button onclick="setResult(0)">0</button><button onclick="setResult(1)">1</button>
                <button onclick="setResult(2)">2</button><button onclick="setResult(3)">3</button>
                <button onclick="setResult(4)">4</button><button onclick="setResult(5)">5</button>
                <button onclick="setResult(6)">6</button><button onclick="setResult(7)">7</button>
                <button onclick="setResult(8)">8</button><button onclick="setResult(9)">9</button>
            </div>
        </div>
    </div>

    <div id="users" class="section">
        <div class="card">
            <h3>👥 USER DATABASE</h3>
            <input type="text" id="userSearch" class="search-box" placeholder="Type User ID or Email to search..." oninput="filterUsers()">
            <div style="overflow-x:auto;">
                <table id="userTable">
                    <thead><tr><th>Status</th><th>User Info</th><th>Balance</th><th>Refers</th><th>Action</th></tr></thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="deposits" class="section">
        <div class="card"><h3>💰 DEPOSIT REQUESTS</h3><div id="depositList">Loading...</div></div>
    </div>

    <div id="withdraws" class="section">
        <div class="card"><h3>💸 WITHDRAW REQUESTS</h3><div id="withdrawList">Loading...</div></div>
    </div>

    <div id="issues" class="section">
        <div class="card"><h3>📩 TICKETS</h3><div id="ticketList"></div></div>
        <div class="card"><h3>📸 SCREENSHOTS</h3><div id="screenshotList"></div></div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc, setDoc, deleteDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain:"win2-512e1.firebaseapp.com", projectId:"win2-512e1" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.showSection = function(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-bar .nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

// Result Setting
window.setResult = async (num) => {
    try {
        await setDoc(doc(db, "wingo", "result"), { 
            number: num, 
            time: Date.now(),
            manual: true 
        });
        alert("Success: Next result fixed to " + num);
    } catch (e) { alert("Error: " + e.message); }
};

// Search Logic
window.filterUsers = function() {
    let input = document.getElementById("userSearch").value.toUpperCase();
    let table = document.getElementById("userTableBody");
    let tr = table.getElementsByTagName("tr");
    for (let i = 0; i < tr.length; i++) {
        let td = tr[i].getElementsByTagName("td")[1]; 
        if (td) {
            let txtValue = td.textContent || td.innerText;
            if (txtValue.toUpperCase().indexOf(input) > -1) { tr[i].style.display = ""; } 
            else { tr[i].style.display = "none"; }
        }
    }
}

// Listeners & REFERRAL LOGIC
onSnapshot(collection(db, "users"), async (snap) => {
    const body = document.getElementById("userTableBody");
    body.innerHTML = ""; let online = 0;
    document.getElementById("totalUsers").innerText = snap.size;
    const usersData = [];
    snap.forEach(d => usersData.push({id: d.id, ...d.data()}));

    for (const u of usersData) {
        const q = query(collection(db, "users"), where("invitedBy", "==", u.referralCode || "---"));
        const refSnap = await getDocs(q);
        const refCount = refSnap.size;

        if(refCount >= 10 && !u.referralBonusClaimed) {
            await updateDoc(doc(db, "users", u.id), {
                balance: (u.balance || 0) + 500,
                referralBonusClaimed: true
            });
        }
        const isOnline = (Date.now() - (u.lastActive || 0)) < 120000;
        if(isOnline) online++;

        body.innerHTML += `<tr>
            <td>${isOnline ? '<span style="color:var(--success)">●</span>' : '<span style="color:gray">○</span>'}</td>
            <td><small>${u.email || u.id}</small><br><small style="color:var(--primary)">${u.id}</small></td>
            <td>₹${u.balance || 0}</td>
            <td><span class="ref-badge">${refCount} Refs</span></td>
            <td><button class="edit-btn" onclick="editBal('${u.id}', ${u.balance})">Edit</button></td>
        </tr>`;
    }
    document.getElementById("activeUsers").innerText = online;
    filterUsers();
});

// APPROVE DEPOSIT
window.approveDeposit = async (id, user, amt) => {
    const ref = doc(db,"users",user);
    const snap = await getDoc(ref);
    if(snap.exists()){
        await updateDoc(ref, {balance: (snap.data().balance || 0) + amt});
        await updateDoc(doc(db,"depositRequests",id), {status:"approved"});
        alert("Deposit Approved!");
    }
};

// NEW: APPROVE WITHDRAW
window.approveWithdraw = async (id, user, amt) => {
    if(confirm("Mark this withdrawal as paid?")) {
        try {
            await updateDoc(doc(db, "withdrawRequests", id), { status: "approved" });
            alert("Withdrawal Approved!");
        } catch(e) { alert("Error: " + e.message); }
    }
};

window.editBal = async (uid, old) => {
    let n = prompt("New Balance for " + uid, old);
    if(n !== null && n !== "") await updateDoc(doc(db, "users", uid), { balance: parseInt(n) });
};

// MODIFIED LISTENER FOR BOTH
function listenRequests(coll, elementId, action) {
    onSnapshot(collection(db, coll), (snap) => {
        const list = document.getElementById(elementId);
        list.innerHTML = "";
        if(snap.empty) { list.innerHTML = "No requests found."; return; }
        
        snap.forEach(d => {
            const data = d.data();
            if(data.status === "pending") {
                let info = data.upi ? `<br><small style="color:var(--secondary)">UPI: ${data.upi}</small>` : (data.utr ? `<br><small style="color:var(--primary)">UTR: ${data.utr}</small>` : "");
                
                list.innerHTML += `<div class="item-request">
                    <div><b>₹${data.amount}</b><br><small>${data.user}</small>${info}</div>
                    <button class="edit-btn" onclick='${action}("${d.id}","${data.user}",${data.amount})'>Approve</button>
                </div>`;
            }
        });
        if(list.innerHTML === "") list.innerHTML = "No pending requests.";
    });
}

// Start Listeners
listenRequests("depositRequests", "depositList", "approveDeposit");
listenRequests("withdrawRequests", "withdrawList", "approveWithdraw");

onSnapshot(collection(db, "tickets"), (snap) => {
    const list = document.getElementById("ticketList");
    list.innerHTML = "";
    snap.forEach(d => {
        const t = d.data();
        list.innerHTML += `<div class="item-request" style="flex-direction:column; align-items:flex-start;">
            <p><b>User:</b> ${t.name} | <b>Message:</b> ${t.message}</p>
            <button class="del-btn" onclick="deleteDocData('tickets','${d.id}')">Delete</button>
        </div>`;
    });
});

window.deleteDocData = async (coll, id) => {
    if(confirm("Delete this?")) await deleteDoc(doc(db, coll, id));
};
</script>
</body>
</html>
