<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wingo Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:#9fa3ad;
display:flex;
justify-content:center;
}

.app{
width:420px;
background:white;
min-height:100vh;
text-align:center;
padding-bottom:80px;
}

.header{
background:#ff6b6b;
color:white;
padding:15px;
font-size:22px;
}

.balance{
background:#eee;
margin:15px;
padding:10px;
border-radius:10px;
}

.numbers{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:20px;
}

.numbers button{
padding:15px;
border-radius:50%;
border:none;
font-size:18px;
background:#eee;
}

.result{
font-size:50px;
margin:20px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">Wingo</div>

<div class="balance">
Balance ₹ <span id="balance">0</span>
</div>

<div class="result" id="ball">?</div>

<div class="numbers">

<button onclick="bet(0)">0</button>
<button onclick="bet(1)">1</button>
<button onclick="bet(2)">2</button>
<button onclick="bet(3)">3</button>
<button onclick="bet(4)">4</button>
<button onclick="bet(5)">5</button>
<button onclick="bet(6)">6</button>
<button onclick="bet(7)">7</button>
<button onclick="bet(8)">8</button>
<button onclick="bet(9)">9</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A",
authDomain:"win2-512e1.firebaseapp.com",
projectId:"win2-512e1"
};

const app=initializeApp(firebaseConfig)
const auth=getAuth(app)
const db=getFirestore(app)

let balance=0
let uid=""
let currentBet=null
let betAmount=0

onAuthStateChanged(auth,async(user)=>{

if(user){

uid=user.uid

let snap=await getDoc(doc(db,"users",uid))

balance=snap.data().balance||0

document.getElementById("balance").innerText=balance

}

})

window.bet=function(num){

let amt=prompt("Enter Amount")

amt=parseInt(amt)

if(balance<amt){

alert("Low Balance")
return

}

balance-=amt

document.getElementById("balance").innerText=balance

currentBet=num
betAmount=amt

}

onSnapshot(doc(db,"wingoResults","current"),async(d)=>{

let result=d.data().number

document.getElementById("ball").innerText=result

if(currentBet!=null){

if(currentBet==result){

balance+=betAmount*2
alert("Win")

}else{

alert("Lose")

}

document.getElementById("balance").innerText=balance

await updateDoc(doc(db,"users",uid),{
balance:balance
})

currentBet=null

}

})

</script>

</body>
</html>
