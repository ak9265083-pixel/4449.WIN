<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4449 WIN - REFER</title>
    <style>
        :root { --primary: #00f2ff; --secondary: #ff007a; --accent: #fccf31; --bg: #0b0e14; --card-bg: #161b22; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; min-height: 100vh; background: #0b0e14; padding-bottom: 50px; }
        .header { background: #161b22; padding: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--primary); position: sticky; top:0; z-index: 100; }
        .header img { width: 35px; border-radius: 50%; border: 2px solid var(--primary); }
        .link-card { margin: 20px 15px; padding: 20px; background: #161b22; border-radius: 15px; border: 1px dashed var(--primary); text-align: center; }
        .link-box { background: #000; padding: 12px; border-radius: 8px; color: var(--primary); margin: 10px 0; font-size: 13px; word-break: break-all; border: 1px solid #333; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .copy-btn { background: var(--primary); color: #000; }
        .share-btn { background: #fff; color: #000; }
        .mission-card { margin: 20px 15px; padding: 20px; background: linear-gradient(135deg, #1c2333, #0b0e14); border-radius: 20px; border: 1px solid var(--secondary); position: relative; }
        .reward-tag { position: absolute; top: -12px; right: 15px; background: var(--accent); color: #000; padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: 900; }
        .bar-bg { background: rgba(255,255,255,0.1); height: 10px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--secondary), var(--primary)); transition: 1s; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 0 15px; }
        .s-item { background: #161b22; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #222; }
        .list-box { margin: 20px 15px; background: #161b22; border-radius: 15px; overflow: hidden; }
        .list-h { padding: 12px; background: #222; font-size: 13px; font-weight: bold; color: var(--primary); }
        .user-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; font-size: 13px; }
        .badge { font-size: 9px; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .active { color: #2ecc71; border: 1px solid #2ecc71; }
        .pending { color: #888; border: 1px solid #444; }
    </style>
</head>
<body>
<div class="app">
    <div class="header"><img src="logo.png"><span>AFFILIATE CENTER</span></div>
    <div class="link-card">
        <div class="link-box" id="referLink">Loading Link...</div>
        <div class="btn-group">
            <button class="copy-btn" onclick="copyLink()">COPY</button>
            <button class="share-btn" onclick="shareLink()">SHARE</button>
        </div>
    </div>
    <div class="mission-card">
        <div class="reward-tag">₹500 REWARD</div>
        <div style="font-weight:900;">MEGA MISSION</div>
        <div style="font-size:11px; color:#8b949e;">Invite 6 active friends (₹20+ bet)</div>
        <div class="bar-bg"><div class="bar-fill" id="progBar"></div></div>
        <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:bold;">
            <span id="progText">PROGRESS: 0/6</span>
            <span id="remainText" style="color:var(--secondary)">LEFT: 6</span>
        </div>
    </div>
    <div class="stats">
        <div class="s-item"><h3 id="totalInvited" style="margin:0; color:var(--primary);">0</h3><p style="margin:5px 0 0; font-size:10px; opacity:0.5;">JOINED</p></div>
        <div class="s-item"><h3 id="activeInvited" style="margin:0; color:var(--secondary);">0</h3><p style="margin:5px 0 0; font-size:10px; opacity:0.5;">ACTIVE</p></div>
    </div>
    <div class="list-box">
        <div class="list-h">REFERRAL DETAILS</div>
        <div id="referralList"><p style="padding:20px; text-align:center; font-size:11px; opacity:0.3;">No Joins Yet</p></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, collection, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain: "win2-512e1.firebaseapp.com", projectId: "win2-512e1" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, user => {
        if(user) {
            const myId = user.uid.substring(0, 8).toUpperCase();
            // CORRECT VERCEL LINK
            const myLink = `https://4449-win.vercel.app/index.html?ref=${myId}`;
            document.getElementById("referLink").innerText = myLink;

            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if(snap.exists()) {
                    const d = snap.data();
                    const active = d.activeRefer || 0;
                    document.getElementById("totalInvited").innerText = d.totalRefer || 0;
                    document.getElementById("activeInvited").innerText = active;
                    document.getElementById("progBar").style.width = (active/6*100) + "%";
                    document.getElementById("progText").innerText = `PROGRESS: ${active}/6`;
                    document.getElementById("remainText").innerText = `LEFT: ${active >= 6 ? 0 : 6-active}`;
                }
            });

            const q = query(collection(db, "users"), where("referredBy", "==", myId));
            onSnapshot(q, (snap) => {
                const list = document.getElementById("referralList");
                if(snap.empty) return;
                list.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    list.innerHTML += `<div class="user-row">
                        <div><b>${u.email.split('@')[0]}</b><br><small style="opacity:0.4;">ID: ${d.id.substring(0,6)}</small></div>
                        <div class="badge ${u.firstBetDone ? 'active' : 'pending'}">${u.firstBetDone ? 'ACTIVE' : 'PENDING'}</div>
                    </div>`;
                });
            });
        } else { window.location.href = "login.html"; }
    });

    window.copyLink = () => {
        navigator.clipboard.writeText(document.getElementById("referLink").innerText);
        alert("Link Copied!");
    };
    window.shareLink = () => {
        const link = document.getElementById("referLink").innerText;
        window.open(`https://wa.me/?text=Join 4449 WIN and claim bonus: ${link}`);
    };
</script>
</body>
</html>
