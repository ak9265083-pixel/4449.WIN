<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4449 WIN - Wallet</title>

<style>
:root { 
    --primary: #00f2ff;
    --secondary: #ff007a;
    --bg: #0b0e14; 
    --card-bg: #161b22; 
    --glass: rgba(255, 255, 255, 0.05);
}

body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); display: flex; justify-content: center; color: white; }
.app { width: 420px; background: var(--bg); min-height: 100vh; text-align: center; padding-bottom: 50px; border-left: 1px solid rgba(0, 242, 255, 0.1); border-right: 1px solid rgba(0, 242, 255, 0.1); position: relative; overflow-x: hidden; }

/* Header */
.header { background: rgba(22, 27, 34, 0.95); padding: 15px; font-size: 20px; font-weight: bold; border-bottom: 1px solid var(--primary); color: var(--primary); backdrop-filter: blur(10px); box-shadow: 0 0 15px rgba(0,242,255,0.3); position: sticky; top: 0; z-index: 1000; }
.logo-top { position: absolute; top: 8px; left: 15px; width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); box-shadow: 0 0 10px var(--primary); background: white; }

/* Balance Box */
.box { background: linear-gradient(135deg, #1c2333, #0b0e14); margin: 15px; padding: 20px; border-radius: 20px; border: 1px solid rgba(0, 242, 255, 0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
#balance { font-size: 32px; color: var(--primary); font-weight: 900; text-shadow: 0 0 15px rgba(0,242,255,0.4); display: block; margin-top: 5px; }

/* Buttons */
.btn { padding: 12px 25px; background: transparent; color: var(--primary); border: 1px solid var(--primary); border-radius: 12px; margin: 10px 5px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
.btn:hover { background: var(--primary); color: black; box-shadow: 0 0 20px var(--primary); }
.btn-submit { background: var(--primary); color: black; width: 90%; margin-top: 20px; border: none; }

/* Package Grid Added */
.pkg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; padding: 0 15px; }
.pkg-card { background: rgba(255, 0, 122, 0.1); border: 1px solid var(--secondary); padding: 10px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
.pkg-card:active { transform: scale(0.95); }
.pkg-card.active { background: var(--secondary); color: white; }
.pkg-amt { font-weight: bold; font-size: 16px; display: block;}
.pkg-bonus { font-size: 10px; color: #00ffaa; text-transform: uppercase; display: block;}

/* Inputs */
input { padding: 12px; width: 85%; background: #05070a; border: 1px solid rgba(0, 242, 255, 0.2); color: white; border-radius: 10px; margin: 8px 0; outline: none; text-align: center; }

/* History */
.history-box { margin: 15px; padding: 15px; background: var(--card-bg); border-radius: 20px; border: 1px solid var(--glass); text-align: left; }
.history-item { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 15px 0; }
.history-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.history-details { font-size: 11px; color: #8b949e; margin-top: 2px; }

.history-pending { color: #fccf31; text-shadow: 0 0 5px #fccf31; }
.history-approved { color: #2ecc71; text-shadow: 0 0 5px #2ecc71; }
.history-rejected { color: #e74c3c; text-shadow: 0 0 5px #e74c3c; }

/* Popup */
.bet-popup { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--secondary); color: white; padding: 12px 25px; border-radius: 50px; display: none; z-index: 5000; font-weight: bold; box-shadow: 0 0 20px rgba(255,0,122,0.4); }
</style>
</head>

<body>

<div class="app">
    <div class="header">
        <img src="logo.png" class="logo-top">
        <span>ACCOUNT WALLET</span>
    </div>

    <div class="box">
        <span style="font-size: 11px; opacity: 0.6; letter-spacing: 2px;">WALLET BALANCE</span>
        <span id="balance">₹ 0.00</span>
    </div>

    <div style="display: flex; justify-content: center; padding: 0 10px;">
        <button class="btn" style="flex:1" onclick="showDeposit()">Deposit</button>
        <button class="btn" style="flex:1" onclick="showWithdraw()">Withdraw</button>
    </div>

    <div id="withdrawBox" class="box" style="display:none; border-color: var(--primary);">
        <h3 style="color:var(--primary); font-size: 14px; margin-top:0;">WITHDRAWAL REQUEST</h3>
        <input type="number" id="wamt" placeholder="Enter Amount">
        <input type="text" id="upi" placeholder="Enter UPI ID (e.g. name@upi)">
        <button class="btn btn-submit" onclick="sendWithdraw()">Confirm Withdrawal</button>
    </div>

    <div id="depositBox" class="box" style="display:none; border-color: var(--secondary);">
        <h3 style="color:var(--secondary); font-size: 14px; margin-top:0;">DEPOSIT PACKAGES</h3>
        
        <div class="pkg-grid">
            <div class="pkg-card" onclick="selectPkg(100)">
                <span class="pkg-amt">₹100</span>
                <span class="pkg-bonus">+20% BONUS</span>
            </div>
            <div class="pkg-card" onclick="selectPkg(200)">
                <span class="pkg-amt">₹200</span>
                <span class="pkg-bonus">+25% BONUS</span>
            </div>
            <div class="pkg-card" onclick="selectPkg(300)">
                <span class="pkg-amt">₹300</span>
                <span class="pkg-bonus">+30% BONUS</span>
            </div>
            <div class="pkg-card" onclick="selectPkg(500)">
                <span class="pkg-amt">₹500</span>
                <span class="pkg-bonus">+50% BONUS</span>
            </div>
        </div>

        <img src="ui.png" style="width:150px; border:2px solid white; border-radius:10px; margin:10px 0;">
        <input type="number" id="amt" placeholder="Amount">
        <input type="text" id="utr" placeholder="12 Digit UTR Number">
        <button class="btn btn-submit" onclick="sendDeposit()" style="background:var(--secondary);">Submit Deposit</button>
    </div>

    <div class="history-box">
        <h3 style="color:var(--primary); font-size: 12px; margin-top:0; border-bottom:1px solid var(--glass); padding-bottom:10px;">WITHDRAWAL HISTORY</h3>
        <div id="historyList">
            <p style="font-size:12px; opacity:0.5; text-align:center;">Loading history...</p>
        </div>
    </div>

    <div class="bet-popup" id="popupMessage"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, addDoc, collection, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A",
    authDomain: "win2-512e1.firebaseapp.com",
    projectId: "win2-512e1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = "";
let balance = 0;

onAuthStateChanged(auth, async (user) => {
    if(user) {
        currentUser = user.uid;
        let ref = doc(db, "users", user.uid);
        let snap = await getDoc(ref);
        if(snap.exists()) {
            balance = snap.data().balance || 0;
            document.getElementById("balance").innerText = "₹ " + balance.toFixed(2);
        }
        loadWithdrawHistory();
    }
});

// Select Package Logic
window.selectPkg = (val) => {
    document.getElementById("amt").value = val;
};

window.showDeposit = () => {
    document.getElementById("depositBox").style.display = "block";
    document.getElementById("withdrawBox").style.display = "none";
};

window.showWithdraw = () => {
    document.getElementById("withdrawBox").style.display = "block";
    document.getElementById("depositBox").style.display = "none";
};

window.sendWithdraw = async () => {
    let amt = parseInt(document.getElementById("wamt").value);
    let upi = document.getElementById("upi").value;
    
    if(!amt || !upi) return showPopup("Please enter all details!");
    if(amt < 100) return showPopup("Min Withdraw ₹100");
    if(amt > balance) return showPopup("Insufficient Credits!");

    try {
        balance -= amt;
        document.getElementById("balance").innerText = "₹ " + balance.toFixed(2);
        await updateDoc(doc(db, "users", currentUser), { balance: balance });

        await addDoc(collection(db, "withdrawRequests"), {
            user: currentUser,
            amount: amt,
            upi: upi,
            status: "pending",
            createdAt: serverTimestamp()
        });

        showPopup("Request Sent Successfully!");
        document.getElementById("wamt").value = "";
        document.getElementById("upi").value = "";
        loadWithdrawHistory(); 
    } catch (e) {
        showPopup("Error: Check Connection");
    }
};

// --- FIX: Updated Send Deposit with immediate Balance + Bonus Credit ---
window.sendDeposit = async () => {
    let amt = parseInt(document.getElementById("amt").value);
    let utr = document.getElementById("utr").value;
    
    if(!amt || !utr) return showPopup("Enter Amount & UTR!");
    if(utr.length < 12) return showPopup("Enter valid 12-digit UTR!");

    // Bonus Logic
    let bonus = 0;
    if(amt === 100) bonus = amt * 0.20;
    else if(amt === 200) bonus = amt * 0.25;
    else if(amt === 300) bonus = amt * 0.30;
    else if(amt === 500) bonus = amt * 0.50;

    let finalAmount = amt + bonus;

    try {
        // 1. Record the request in the database
        await addDoc(collection(db, "depositRequests"), {
            user: currentUser,
            amount: amt,
            bonus: bonus,
            totalWithBonus: finalAmount,
            utr: utr,
            status: "approved", // Set to approved because we are adding balance immediately
            createdAt: serverTimestamp()
        });

        // 2. UPDATE THE BALANCE (Adding bonus to the current balance)
        balance += finalAmount;
        await updateDoc(doc(db, "users", currentUser), { balance: balance });

        // 3. Update the UI
        document.getElementById("balance").innerText = "₹ " + balance.toFixed(2);
        
        let msg = bonus > 0 ? `Deposit Added! Bonus ₹${bonus} credited.` : "Deposit Added!";
        showPopup(msg);
        
        document.getElementById("amt").value = "";
        document.getElementById("utr").value = "";
    } catch (e) {
        console.error(e);
        showPopup("Error: Transaction Failed");
    }
};
// --- END FIX ---

async function loadWithdrawHistory() {
    try {
        let q = query(collection(db, "withdrawRequests"), where("user", "==", currentUser));
        let snap = await getDocs(q);
        let container = document.getElementById("historyList");
        container.innerHTML = "";

        if (snap.empty) {
            container.innerHTML = "<p style='font-size:12px; opacity:0.4; text-align:center;'>No transaction history found.</p>";
            return;
        }

        let docsArray = [];
        snap.forEach(d => docsArray.push(d.data()));
        docsArray.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

        docsArray.forEach(d => {
            let date = d.createdAt ? d.createdAt.toDate().toLocaleString() : "Syncing...";
            let status = d.status || "pending";
            let div = document.createElement("div");
            div.className = "history-item";
            div.innerHTML = `
                <div class="history-row">
                    <span style="font-weight:900; color:white; font-size:16px;">₹${d.amount}</span>
                    <span class="history-${status}" style="font-size:11px; font-weight:bold; letter-spacing:1px;">${status.toUpperCase()}</span>
                </div>
                <div class="history-details">UPI: ${d.upi}</div>
                <div class="history-details" style="opacity:0.4;">${date}</div>
            `;
            container.appendChild(div);
        });
    } catch (e) {
        console.log(e);
    }
}

function showPopup(msg) {
    let p = document.getElementById("popupMessage");
    p.innerText = msg;
    p.style.display = "block";
    setTimeout(() => { p.style.display = "none"; }, 3000);
}
</script>

</body>
</html>
