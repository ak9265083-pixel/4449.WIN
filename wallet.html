<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wallet</title>

<style>

body{
margin:0;
font-family:Arial;
background:#8f939c;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:420px;
background:#f5f5f5;
min-height:100vh;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.header{
background:#ff6b6b;
color:white;
padding:15px;
font-size:20px;
font-weight:bold;
text-align:center;
}

.box{
background:white;
margin:15px;
padding:20px;
border-radius:12px;
text-align:center;
}

.btn{
padding:12px 20px;
background:#ff6b6b;
color:white;
border:none;
border-radius:8px;
margin:10px;
font-size:16px;
cursor:pointer;
}

input{
padding:10px;
width:80%;
max-width:250px;
border-radius:6px;
border:1px solid #ccc;
margin:5px;
}

.qr{
width:200px;
display:block;
margin:auto;
}

</style>

</head>

<body>

<div class="app">

<div class="header">
Wallet
</div>

<div class="box">
Balance ₹ <span id="balance">0</span>
</div>

<div class="box">

<button class="btn" onclick="showDeposit()">Deposit</button>
<button class="btn" onclick="showWithdraw()">Withdraw</button>

</div>

<div id="depositBox" class="box" style="display:none">

<h3>Deposit</h3>

<img src="ui.png" class="qr">

<br>

<input type="number" id="amt" placeholder="Amount">

<br><br>

<button class="btn" onclick="sendDeposit()">Submit</button>

</div>

<div id="withdrawBox" class="box" style="display:none">

<h3>Withdraw</h3>

<input type="number" id="wamt" placeholder="Amount">

<br>

<input type="text" id="upi" placeholder="UPI ID">

<br><br>

<button class="btn" onclick="sendWithdraw()">Submit</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A",
  authDomain: "win2-512e1.firebaseapp.com",
  projectId: "win2-512e1",
  storageBucket: "win2-512e1.firebasestorage.app",
  messagingSenderId: "577913579227",
  appId: "1:577913579227:web:1e073059c2d3d881720efe",
  measurementId: "G-4V1SCSMTM6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=""
let balance=0

onAuthStateChanged(auth, async (user)=>{

if(user){

currentUser=user.uid

let ref=doc(db,"users",user.uid)

let snap=await getDoc(ref)

if(!snap.exists()){

await setDoc(ref,{
balance:0
})

}

let data=(await getDoc(ref)).data()

balance=data.balance

document.getElementById("balance").innerText=balance

}

})

window.showDeposit=function(){

document.getElementById("depositBox").style.display="block"
document.getElementById("withdrawBox").style.display="none"

}

window.showWithdraw=function(){

document.getElementById("withdrawBox").style.display="block"
document.getElementById("depositBox").style.display="none"

}

window.sendDeposit=async function(){

let amt=parseInt(document.getElementById("amt").value)

if(!amt) return alert("Enter amount")

balance+=amt

await updateDoc(doc(db,"users",currentUser),{
balance:balance
})

document.getElementById("balance").innerText=balance

alert("Deposit added")

}

window.sendWithdraw=async function(){

let amt=parseInt(document.getElementById("wamt").value)

if(!amt) return alert("Enter amount")

if(amt>balance) return alert("Not enough balance")

balance-=amt

await updateDoc(doc(db,"users",currentUser),{
balance:balance
})

document.getElementById("balance").innerText=balance

alert("Withdraw successful")

}

</script>

</body>
</html>
