<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>4449 WIN Login</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2c0d00,#7a2d00);
}

/* LOGIN BOX */

.login-container{

width:360px;
background:#ff8c3a;
padding:35px;
border-radius:16px;
text-align:center;
box-shadow:0 10px 35px rgba(0,0,0,0.4);

animation:fadeIn 1s ease;

}

/* LOGO */

.logo{
width:220px;
margin-bottom:20px;
}

/* INPUT */

.input-field{

width:100%;
padding:12px;
margin:10px 0;

border:none;
border-radius:6px;

font-size:15px;

box-sizing:border-box;

outline:none;

}

/* BUTTON */

.login-button{

width:100%;
padding:12px;

border:none;

border-radius:6px;

background:#c23b00;

color:white;

font-size:16px;

cursor:pointer;

transition:0.3s;

}

.login-button:hover{

transform:scale(1.05);

background:#a83200;

}

/* LINKS */

.links{

margin-top:15px;

font-size:13px;

}

.links a{

color:white;

text-decoration:none;

}

/* WELCOME SCREEN */

#welcomeScreen{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:#1a0600;

display:none;

justify-content:center;

align-items:center;

flex-direction:column;

z-index:999;

}

.welcome-logo{

width:280px;

margin-bottom:30px;

}

.welcome-text{

font-size:70px;

font-weight:bold;

text-align:center;

color:#ff8c3a;

animation:glow 2s infinite alternate;

}

/* ANIMATION */

@keyframes fadeIn{

from{opacity:0; transform:translateY(30px);}

to{opacity:1; transform:translateY(0);}

}

@keyframes glow{

from{text-shadow:0 0 20px #ff6600;}

to{text-shadow:0 0 40px #ffa64d;}

}

/* MOBILE */

@media (max-width:600px){

.login-container{

width:90%;

padding:25px;

}

.logo{

width:180px;

}

.welcome-text{

font-size:40px;

}

.welcome-logo{

width:200px;

}

}

</style>

</head>

<body>

</html>
