<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>4449 WIN - Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif
}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#06123a,#1b46d1);
}

/* main card */

.container{
width:92%;
max-width:380px;
background:#ffffff;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
overflow:hidden;
}

/* header */

.header{
background:linear-gradient(90deg,#ff4d6d,#ff7a7a);
padding:18px;
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:bold;
color:white;
}

.logo{
height:32px
}

/* content */

.content{
padding:25px
}

h3{
text-align:center;
margin-top:0;
margin-bottom:20px
}

label{
font-size:13px;
font-weight:bold
}

.input-box{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-top:6px;
margin-bottom:15px;
}

.input-box:focus{
outline:none;
border-color:#ff6b6b
}

.checkbox{
display:flex;
align-items:center;
gap:8px;
font-size:13px;
margin-bottom:18px
}

/* button */

.signup-btn{
width:100%;
padding:14px;
border:none;
border-radius:25px;
background:#ff5c5c;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.signup-btn:active{
transform:scale(.98)
}

.login-link{
text-align:center;
margin-top:15px;
font-size:14px
}

.login-link a{
color:#ff5c5c;
text-decoration:none;
font-weight:bold
}

/* popup */

.success-popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
color:white;
padding:25px 30px;
border-radius:12px;
font-size:18px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png" class="logo">
<span>4449 WIN</span>
</div>

<div class="content">

<h3>Create Account</h3>

<label>Email</label>
<input type="email" class="input-box" id="email" placeholder="Enter your email">

<label>Password</label>
<input type="password" class="input-box" id="password" placeholder="Create password">

<label>Invitation Code</label>
<input type="text" class="input-box" id="invite" placeholder="Enter invitation code">

<div class="checkbox">
<input type="checkbox" id="terms">
<label for="terms">I accept Terms & Conditions</label>
</div>

<button class="signup-btn" onclick="signup()">Sign Up</button>

<div class="login-link">
Already have an account? <a href="login.html">Login</a>
</div>

</div>
</div>

<div id="successPopup" class="success-popup">
Signup Successful
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A",
authDomain: "win2-512e1.firebaseapp.com",
projectId: "win2-512e1",
storageBucket: "win2-512e1.firebasestorage.app",
messagingSenderId: "577913579227",
appId: "1:577913579227:web:1e073059c2d3d881720efe",
measurementId: "G-4V1SCSMTM6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup=function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;
const terms=document.getElementById("terms").checked;

if(!terms){
alert("Please accept Terms & Conditions");
return;
}

createUserWithEmailAndPassword(auth,email,password)

.then(()=>{

document.getElementById("successPopup").style.display="block";

setTimeout(()=>{
window.location.href="login.html";
},1500);

})

.catch(error=>{
alert(error.message);
});

}

</script>

</body>
</html>
