<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="8mGNrLs_MQIxb5axw0tFUpU4HSSktCEYAVg3vklU0" />
    <title>4449 WIN - Official Register & Gaming Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0b0e14">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        :root { --primary: #00f2ff; --secondary: #ff007a; --bg: #0b0e14; --card-bg: #161b22; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg); color: white; }
        .container { width: 92%; max-width: 400px; background: var(--card-bg); border-radius: 24px; border: 1px solid rgba(0, 242, 255, 0.1); overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .header { background: rgba(22, 27, 34, 0.95); padding: 18px 25px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--primary); }
        .logo { height: 40px; width: 40px; border-radius: 50%; border: 2px solid var(--primary); }
        .header span { font-size: 20px; font-weight: 800; color: var(--primary); text-transform: uppercase; }
        .content { padding: 30px; }
        h3 { text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; margin-top: 0; }
        label { font-size: 11px; color: var(--primary); text-transform: uppercase; display: block; margin-bottom: 8px; font-weight: bold; }
        .input-box { width: 100%; padding: 14px; background: #05070a; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; margin-bottom: 20px; outline: none; }
        .input-box:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        .signup-btn { width: 100%; padding: 16px; border-radius: 12px; background: transparent; border: 1px solid var(--primary); color: var(--primary); font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-bottom: 15px; }
        .signup-btn:hover { background: var(--primary); color: black; box-shadow: 0 0 20px var(--primary); }
        .signup-btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        .login-box { text-align: center; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 5px; }
        .login-text { font-size: 13px; color: #8b949e; }
        .login-link { color: var(--secondary); text-decoration: none; font-weight: bold; margin-left: 5px; transition: 0.3s; }
        .login-link:hover { text-decoration: underline; color: #ff3399; }
        .success-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--card-bg); border: 2px solid var(--primary); color: var(--primary); padding: 20px 40px; border-radius: 15px; display: none; z-1000; text-align: center; }

        /* Custom Download Pop-up Style */
        #install-banner { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 380px; background: #161b22; border: 2px solid #00f2ff; padding: 12px 18px; border-radius: 18px; z-index: 10000; box-shadow: 0 10px 40px rgba(0,0,0,0.9); align-items: center; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><img src="logo.png" class="logo"><span>4449 WIN</span></div>
        <div class="content">
            <h1 style="font-size: 0.1px; color: transparent; position: absolute;">4449 WIN Register Account</h1>
            <h3>Create Account</h3>
            <label>Email Address</label>
            <input type="email" class="input-box" id="email" placeholder="Enter your email">
            <label>Password</label>
            <input type="password" class="input-box" id="password" placeholder="Enter password">
            <label>Invite Code (Auto-filled)</label>
            <input type="text" class="input-box" id="invite" placeholder="No code detected">
            <button class="signup-btn" id="submitBtn" onclick="signup()">SIGN UP</button>
            <div class="login-box">
                <span class="login-text">Already have an account?</span>
                <a href="login.html" class="login-link">Login Now</a>
            </div>
        </div>
    </div>

    <div id="install-banner">
        <div style="display: flex; align-items: center; gap: 12px;">
            <img src="icon-192.png" style="width: 45px; height: 45px; border-radius: 10px; border: 1px solid #00f2ff;">
            <div>
                <div style="color: #00f2ff; font-weight: 800; font-size: 14px;">4449 WIN APP</div>
                <div style="color: #8b949e; font-size: 11px;">Fast & Secure Gaming</div>
            </div>
        </div>
        <button id="install-button" style="background: #00f2ff; color: #000; border: none; padding: 10px 18px; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 12px; text-transform: uppercase;">Install</button>
    </div>

    <div id="successPopup" class="success-popup">
        🚀 REGISTRATION SUCCESS!<br>
        <small style="color:white">Taking you to Login...</small>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, updateDoc, increment, collection, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAqL8jdzvLLnjdTYPO0Gjg6WF0m4w9K79A", authDomain: "win2-512e1.firebaseapp.com", projectId: "win2-512e1" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const ref = params.get('ref');
        if (ref) { document.getElementById("invite").value = ref.toUpperCase(); }
    };

    window.signup = async function() {
        const btn = document.getElementById("submitBtn");
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const inviteCode = document.getElementById("invite").value.trim().toUpperCase();

        if(!email || !password) { alert("Please fill details!"); return; }

        btn.disabled = true;
        btn.innerText = "PROCESSING...";

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            
            const userData = {
                email: email,
                uid: user.uid,
                referralCode: user.uid.substring(0, 8).toUpperCase(),
                referredBy: inviteCode || "NONE",
                totalRefer: 0, 
                activeRefer: 0, 
                firstBetDone: false, 
                createdAt: serverTimestamp()
            };

            await setDoc(doc(db, "users", user.uid), userData);

            if(inviteCode && inviteCode !== "NONE") {
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("referralCode", "==", inviteCode));
                const querySnapshot = await getDocs(q);
                if (!querySnapshot.empty) {
                    const referrerDoc = querySnapshot.docs[0];
                    await updateDoc(doc(db, "users", referrerDoc.id), { totalRefer: increment(1) });
                }
            }

            document.getElementById("successPopup").style.display = "block";
            setTimeout(() => { window.location.href = "login.html"; }, 1500);

        } catch(err) { 
            console.error("Signup Error:", err.code);
            alert(err.message);
            btn.disabled = false;
            btn.innerText = "SIGN UP";
        }
    }
</script>

<script>
  let deferredPrompt;
  const installBanner = document.getElementById('install-banner');
  const installButton = document.getElementById('install-button');

  // Service Worker Registration
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker registered!'))
        .catch(err => console.log('Service Worker failed', err));
    });
  }

  // Handle Install Prompt
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBanner.style.display = 'flex';
  });

  installButton.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        console.log('User accepted the install');
      }
      deferredPrompt = null;
      installBanner.style.display = 'none';
    }
  });

  window.addEventListener('appinstalled', () => {
    installBanner.style.display = 'none';
  });
</script>

</body>
</html>
